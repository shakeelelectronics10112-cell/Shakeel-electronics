<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{
    --paper:#F4F5F2;
    --panel:#FFFFFF;
    --ink:#16211F;
    --muted:#6B7975;
    --faint:#9AA6A2;
    --line:#E2E6E1;
    --line-strong:#CDD4CF;
    --green:#10564A;
    --green-hi:#0C453B;
    --green-soft:#E7F0EC;
    --paid:#2E7D5B;
    --warn:#B8492C;
    --warn-soft:#F7E9E1;
    --gold:#B08A3E;
    --shadow:0 1px 2px rgba(22,33,31,.04),0 8px 24px rgba(22,33,31,.06);
    --radius:14px;
    --ease:cubic-bezier(.22,.61,.36,1);
    --spring:cubic-bezier(.34,1.56,.64,1);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:"Inter",system-ui,-apple-system,sans-serif;
    -webkit-font-smoothing:antialiased;
    line-height:1.5;
    min-height:100vh;
  }
  .mono{font-family:"JetBrains Mono",ui-monospace,monospace;font-variant-numeric:tabular-nums;}
  .grot{font-family:"Space Grotesk",system-ui,sans-serif;}

  /* ---------- Shell ---------- */
  .wrap{max-width:1120px;margin:0 auto;padding:0 20px 80px;}
  header.top{
    position:sticky;top:0;z-index:20;
    background:rgba(244,245,242,.85);
    backdrop-filter:saturate(180%) blur(10px);
    border-bottom:1px solid var(--line);
  }
  .top-inner{
    max-width:1120px;margin:0 auto;padding:14px 20px;
    display:flex;align-items:center;gap:16px;flex-wrap:wrap;
  }
  .brand{display:flex;align-items:baseline;gap:10px;margin-right:auto;cursor:default}
  .brand .mark{
    font-family:"Space Grotesk";font-weight:700;font-size:20px;letter-spacing:-.02em;
    color:var(--ink);
  }
  .brand .mark b{color:var(--green)}
  .brand .org{
    font-size:12.5px;color:var(--muted);border-left:1px solid var(--line-strong);
    padding-left:10px;max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .brand .org.editable{cursor:text}
  .actions{display:flex;gap:8px;flex-wrap:wrap}

  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  .btn{
    display:inline-flex;align-items:center;gap:7px;
    font-size:13.5px;font-weight:600;
    padding:9px 14px;border-radius:10px;border:1px solid var(--line-strong);
    background:var(--panel);color:var(--ink);transition:.15s;white-space:nowrap;
  }
  .btn:hover{border-color:var(--faint);transform:translateY(-1px)}
  .btn:active{transform:translateY(0)}
  .btn.primary{background:var(--green);color:#fff;border-color:var(--green)}
  .btn.primary:hover{background:var(--green-hi)}
  .btn.ghost{border-color:transparent;background:transparent;color:var(--muted);padding:9px 10px}
  .btn.ghost:hover{background:var(--line);color:var(--ink)}
  .btn.danger{color:var(--warn);border-color:transparent}
  .btn.danger:hover{background:var(--warn-soft)}
  .btn svg{width:16px;height:16px}
  .btn.sm{padding:6px 11px;font-size:12.5px}

  :focus-visible{outline:2px solid var(--green);outline-offset:2px;border-radius:6px}

  /* ---------- Summary ---------- */
  .summary{
    display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:26px 0 20px;
  }
  .stat{
    background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:16px 18px;box-shadow:var(--shadow);position:relative;overflow:hidden;
  }
  .stat .lab{
    font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);
    display:flex;align-items:center;gap:6px;
  }
  .stat .val{font-size:26px;font-weight:600;margin-top:8px;letter-spacing:-.01em}
  .stat .val .cur{font-size:14px;color:var(--faint);margin-right:2px;font-weight:500}
  .stat .sub{font-size:12px;color:var(--muted);margin-top:3px}
  .stat.accent{border-color:#D8C9A6;background:linear-gradient(180deg,#FCFAF4,#FFFFFF)}
  .stat.accent .val{color:var(--green)}
  .stat.warn .val{color:var(--warn)}
  .stat .tick{position:absolute;top:0;left:0;height:100%;width:3px}
  .stat.accent .tick{background:var(--gold)}
  .stat.warn .tick{background:var(--warn)}

  /* ---------- Toolbar ---------- */
  .toolbar{display:flex;gap:12px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
  .search{
    flex:1;min-width:200px;display:flex;align-items:center;gap:9px;
    background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:0 12px;
  }
  .search:focus-within{border-color:var(--faint)}
  .search svg{width:16px;height:16px;color:var(--faint);flex-shrink:0}
  .search input{
    border:none;outline:none;background:none;font-family:inherit;font-size:14px;color:var(--ink);
    padding:11px 0;width:100%;
  }
  .segmented{display:flex;background:var(--line);border-radius:10px;padding:3px;gap:2px}
  .segmented button{
    font-size:12.5px;font-weight:600;color:var(--muted);padding:7px 13px;border-radius:8px;transition:.15s;
  }
  .segmented button.on{background:var(--panel);color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.06)}
  .seg-count{font-size:10.5px;opacity:.7;margin-left:5px}

  /* ---------- Table ---------- */
  .board{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
  .thead,.trow{
    display:grid;
    grid-template-columns:minmax(170px,2.3fr) 1.15fr .85fr .85fr .85fr 88px 44px;
    align-items:center;gap:12px;padding:0 20px;
  }
  .thead{
    height:44px;border-bottom:1px solid var(--line);
    font-size:10.5px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);
  }
  .thead .r,.trow .r{text-align:right}
  .trow{
    min-height:64px;border-bottom:1px solid var(--line);transition:background .12s;cursor:pointer;
  }
  .trow:last-child{border-bottom:none}
  .trow:hover{background:#FAFBF9}
  .m-name{font-weight:600;font-size:14.5px;display:flex;align-items:center;gap:9px}
  .m-sub{font-size:12px;color:var(--muted);margin-top:2px}
  .avatar{
    width:34px;height:34px;border-radius:9px;flex-shrink:0;display:grid;place-items:center;
    font-family:"Space Grotesk";font-weight:600;font-size:13px;color:var(--green);
    background:var(--green-soft);
  }
  .contact{font-size:13px;color:var(--muted)}
  .figure{font-size:14px;text-align:right}
  .figure.pos{color:var(--warn);font-weight:600}
  .figure.zero{color:var(--faint)}
  .figure.credit{color:var(--paid);font-weight:600}
  .pill{
    display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;
    padding:3px 9px;border-radius:20px;white-space:nowrap;
  }
  .pill.overdue{background:var(--warn-soft);color:var(--warn)}
  .pill.owing{background:#FBF3E2;color:#8a6a1e}
  .pill.clear{background:var(--green-soft);color:var(--paid)}
  .dot{width:6px;height:6px;border-radius:50%;background:currentColor}
  .row-actions{display:flex;justify-content:flex-end;gap:2px}
  .chev{color:var(--faint);transition:transform .2s}
  /* WhatsApp quick action */
  .wa-btn{
    width:34px;height:34px;border-radius:9px;display:grid;place-items:center;flex-shrink:0;
    background:#EAF7EF;color:#1F9D55;border:1px solid #D3EEDD;transition:.15s;
  }
  .wa-btn:hover{background:#25D366;color:#fff;border-color:#25D366;transform:translateY(-1px)}
  .wa-btn:disabled{background:var(--line);color:var(--faint);border-color:transparent;cursor:not-allowed;transform:none}
  .wa-btn svg{width:17px;height:17px}
  .btn.wa{background:#25D366;color:#fff;border-color:#25D366}
  .btn.wa:hover{background:#1Fb457;border-color:#1Fb457}
  .btn.wa svg{width:16px;height:16px}

  /* ---------- Empty ---------- */
  .empty{padding:64px 24px;text-align:center;color:var(--muted)}
  .empty .big{font-family:"Space Grotesk";font-size:19px;color:var(--ink);font-weight:600;margin-bottom:6px}
  .empty p{max-width:360px;margin:0 auto 18px;font-size:14px}
  .empty .ledger-lines{margin:0 auto 22px;width:120px;height:2px;background:
    repeating-linear-gradient(180deg,var(--line) 0 1px,transparent 1px 14px);
    height:56px;border-radius:2px}

  /* ---------- Footer bar ---------- */

<script>
/* ============================================================
   Dues Management — "Ledger"
   Persists to window.storage (Claude artifact storage) with an
   in-memory fallback so it also runs standalone.
   ============================================================ */

const KEY = "dues:data:v1";
let hasStore = (typeof window !== "undefined" && window.storage && typeof window.storage.get === "function");

const State = {
  settings: { org: "Shakeel Electronics", currency: "Rs", countryCode: "92", slipNumber: "0312-6617887", accountsSeeded: false },
  members: [],       // {id,name,unit,phone,email,createdAt}
  transactions: [],  // {id,memberId,type:'charge'|'payment',amount,description,date,dueDate,accountId,createdAt}
  accounts: [],      // {id,provider,type:'wallet'|'bank',number,holder,color}
};

let ui = { search: "", filter: "all", openMemberId: null, flashId: null };

/* ---------- storage ---------- */
/* ---------- storage ----------
   Three layers, most-durable wins on load:
   1) window.storage  (Claude artifact storage — only inside the app preview)
   2) localStorage    (this device's browser — works when the file is opened directly)
   3) chosen folder   (a real file on disk — see Folder auto-save)
   This makes data survive reopening and PC restarts wherever the app runs.        */
async function load(){
  let d = null;
  // prefer artifact storage when present
  if(hasStore){
    try{
      const r = await window.storage.get(KEY);
      if(r && r.value) d = JSON.parse(r.value);
    }catch(e){ /* key not set yet */ }
  }
  // fall back to this device's localStorage (standalone / downloaded file)
  if(!d) d = lsLoad();
  if(d){
    State.settings = Object.assign(State.settings, d.settings||{});
    State.members = d.members||[];
    State.transactions = d.transactions||[];
    State.accounts = d.accounts||[];
  }
  seedAccounts();
}

function lsLoad(){
  try{ const s = localStorage.getItem(KEY); return s ? JSON.parse(s) : null; }
  catch(e){ return null; }
}
function lsSave(){
  try{ localStorage.setItem(KEY, JSON.stringify(State)); return true; }
  catch(e){ return false; }
}

function seedAccounts(){
  if(State.settings.accountsSeeded) return;
  State.accounts = [
    { id:uid(), provider:"Easypaisa",   type:"wallet", number:"0328-0995780",  holder:"Husnain Ali",    color:"#1CA63A" },
    { id:uid(), provider:"JazzCash",    type:"wallet", number:"0310-1666888",  holder:"Husnain Ali",    color:"#E11A2C" },
    { id:uid(), provider:"Meezan Bank", type:"bank",   number:"04820104330529",holder:"Shakeel Ashraf", color:"#00563F" },
    { id:uid(), provider:"UBL Bank",    type:"bank",   number:"1940313671528", holder:"Husnain Ali",    color:"#0A4DA1" },
  ];
  State.settings.accountsSeeded = true;
  save();
}
let saveTimer=null;
let storageOK = true;
async function save(){
  let ok = false;
  if(hasStore){
    try{ await window.storage.set(KEY, JSON.stringify(State)); ok = true; }catch(e){}
  }
  // always keep a copy in this device's browser storage
  if(lsSave()) ok = true;
  storageOK = ok;
  updateStorageNote();
}
function persist(){ // debounce a touch
  State.settings.updatedAt=Date.now();
  clearTimeout(saveTimer);
  saveTimer=setTimeout(save, 120);
  if(dirHandle) writeToFolder(false);   // also mirror to the chosen folder
}

function updateStorageNote(){
  const el = document.getElementById("storageNote");
  if(!el) return;
  if(!storageOK){
    el.innerHTML = `<span style="color:var(--warn)">⚠ Couldn't save on this device — use “Backup data”, or your browser may be blocking storage (private mode?).</span>`;
  }else if(dirHandle && State.settings.autoSaveFolder){
    el.textContent = "";
  }else{
    el.textContent = "Saved automatically on this device.";
  }
}

/* ---------- Folder auto-save (File System Access API) ---------- */
const FS_SUPPORTED = (typeof window !== "undefined" && "showDirectoryPicker" in window);
let dirHandle = null;      // FileSystemDirectoryHandle
let fsTimer = null;
let fsLastSaved = null;
const DATA_FILE = "shakeel-electronics-ledger.json";
const CSV_FILE  = "dues-summary.csv";

// tiny IndexedDB store for the directory handle (guarded — never throws to caller)
function idb(op, val){
  return new Promise((res)=>{
    try{
      const r = indexedDB.open("ledger-fs", 1);
      r.onupgradeneeded = ()=> r.result.createObjectStore("h");
      r.onerror = ()=> res(null);
      r.onsuccess = ()=>{
        const db = r.result;
        const mode = op==="get" ? "readonly" : "readwrite";
        const tx = db.transaction("h", mode);
        const st = tx.objectStore("h");
        let rq;
        if(op==="get") rq = st.get("dir");
        else if(op==="set") rq = st.put(val, "dir");
        else rq = st.delete("dir");
        rq.onsuccess = ()=>{ const out = op==="get"? rq.result : true; tx.oncomplete=()=>{db.close();res(out);}; };
        rq.onerror = ()=>{ db.close(); res(null); };
      };
    }catch(e){ res(null); }
  });
}

async function ensurePerm(h){
  try{
    const opts = {mode:"readwrite"};
    if((await h.queryPermission(opts))==="granted") return true;
    if((await h.requestPermission(opts))==="granted") return true;
  }catch(e){}
  return false;
}
async function writeFile(dir, name, text){
  const fh = await dir.getFileHandle(name, {create:true});
  const w = await fh.createWritable();
  await w.write(text);
  await w.close();
}
async function writeToFolder(immediate){
  if(!dirHandle) return;
  const doWrite = async ()=>{
    if(!(await ensurePerm(dirHandle))){ setAutoSaveState("warn"); return; }
    try{
      await writeFile(dirHandle, DATA_FILE, JSON.stringify(State,null,2));
      await writeFile(dirHandle, CSV_FILE, buildMembersCsv());
      fsLastSaved = new Date();
      setAutoSaveState("on");
    }catch(e){ console.warn("folder write failed", e); setAutoSaveState("warn"); }
  };
  clearTimeout(fsTimer);
  if(immediate) return doWrite();
  fsTimer = setTimeout(doWrite, 500);
}

async function pickFolder(){
  if(!FS_SUPPORTED){
    flash("Folder auto-save needs Chrome or Edge — open this file there");
    return;
  }
  try{
    const h = await window.showDirectoryPicker({mode:"readwrite", id:"ledger-autosave"});
    dirHandle = h;
    await idb("set", h);
    State.settings.autoSaveFolder = h.name;
    persist();
    await writeToFolder(true);
    toast(`Auto-saving to “${h.name}”`);
  }catch(e){
    if(e && e.name==="AbortError") return;              // user cancelled the picker
    flash("Your browser blocked folder access here. Open the downloaded file directly in Chrome or Edge.");
  }
}

async function turnOffAutoSave(){
  dirHandle = null; fsLastSaved = null;
  State.settings.autoSaveFolder = null;
  await idb("del");
  persist();
  setAutoSaveState("off");
  toast("Auto-save to folder turned off");
}

function setAutoSaveState(state){
  const btn = document.getElementById("autoSaveBtn");
  const note = document.getElementById("autoSaveNote");
  if(!btn) return;
  const folder = State.settings.autoSaveFolder;
  const dot = c => `<span class="as-dot ${c}"></span>`;
  if(state==="on"){
    btn.innerHTML = dot("on") + `Saving to “${esc(folder||"folder")}”`;
    const t = fsLastSaved ? fsLastSaved.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"}) : "";

    btn.innerHTML = dot("warn") + `Reconnect folder “${esc(folder||"")}”`;

    btn.innerHTML = dot("off") + `Auto-save to folder`;

}

/* ---------- helpers ---------- */
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
function localISO(d){
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
const todayISO = () => localISO(new Date());
function cur(n){
  const s = Math.abs(n).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
  return (n<0?"-":"") + s;
}
function initials(name){
  const p = name.trim().split(/\s+/);
  return ((p[0]?.[0]||"") + (p[1]?.[0]||"")).toUpperCase() || "?";
}
function fmtDate(iso){
  if(!iso) return "";
  const d = new Date(iso+"T00:00:00");
  return d.toLocaleDateString(undefined,{day:"numeric",month:"short",year:"numeric"});
}
function esc(s){ return String(s??"").replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

/* ---------- Accounts ---------- */
function accountById(id){ return State.accounts.find(a=>a.id===id) || null; }
function accColor(a){ return (a&&a.color) || (a&&a.type==="bank" ? "#0A4DA1" : "#10564A"); }
function accInitials(a){
  if(!a) return "?";
  const p = a.provider.trim().split(/\s+/);
  return ((p[0]?.[0]||"")+(p[1]?.[0]||"")).toUpperCase() || "?";
}
function accBadge(a, sm){
  return `<span class="acc-badge ${sm?"sm":""}" style="background:${accColor(a)}">${esc(accInitials(a))}</span>`;
}
function daysAgoISO(days){
  const d = new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate()-(days-1));
  return localISO(d);
}
// Collections grouped by account within a window (days=null => all time).
function collections(days){
  const start = days==null ? null : daysAgoISO(days);
  const pays = State.transactions.filter(t=>t.type==="payment" && (start==null || (t.date||"") >= start));
  const byAcc = new Map();
  let total = 0;
  for(const p of pays){
    total += p.amount;
    const key = p.accountId || "__none__";
    if(!byAcc.has(key)) byAcc.set(key, {accountId:p.accountId||null, total:0, count:0});
    const g = byAcc.get(key); g.total += p.amount; g.count++;
  }
  const groups = [...byAcc.values()].sort((a,b)=>b.total-a.total);
  return { total, count: pays.length, groups, pays };
}
// The shareable "where to pay" block, mirroring the shop's own format.
function payDetailsText(){
  const wallets = State.accounts.filter(a=>a.type==="wallet");
  const banks = State.accounts.filter(a=>a.type==="bank");
  let s = `💎 ACCOUNT DETAILS 💎\n`;
  for(const a of wallets){ s += `\n📲 ${a.provider}: ${a.number}\n👤 ${a.holder}`; }
  for(const a of banks){ s += `\n🏦 ${a.provider}: ${a.number}\n👤 ${a.holder}`; }
  if(State.settings.slipNumber) s += `\n\n📩 Share payment slip: ${State.settings.slipNumber}`;
  s += `\n⚡ ${State.settings.org}`;
  return s;
}

/* ---------- WhatsApp ---------- */
// Convert a locally-typed number to international format for wa.me (digits only, no +).
function waNumber(phone){
  if(!phone) return "";
  let d = String(phone).replace(/[^\d+]/g,"");
  const cc = (State.settings.countryCode||"92").replace(/\D/g,"");
  if(d.startsWith("+")) d = d.slice(1);
  else if(d.startsWith("00")) d = d.slice(2);
  else if(d.startsWith("0")) d = cc + d.slice(1);      // local 03xx -> 923xx
  else if(!d.startsWith(cc) && d.length<=10) d = cc + d; // bare number -> prefix cc
  return d;
}
function reminderText(m){
  const f = figures(m.id);
  const C = State.settings.currency, org = State.settings.org;
  const bal = `${C} ${cur(Math.max(0,f.balance))}`;
  if(f.balance<=0.0001){
    return `Dear ${m.name}, thank you — your account with ${org} is fully settled. We appreciate your business.`;
  }
  const overdue = f.overdueAmt>0.0001 ? ` (${C} ${cur(f.overdueAmt)} of this is past its due date.)` : "";
  return `Dear ${m.name},\n`
    + `Kindly clear your outstanding payment of ${bal} with ${org} at your earliest convenience.${overdue}\n\n`
    + `You can pay into any of the accounts below:\n\n`
    + payDetailsText();
}
function openLink(url){
  const a = document.createElement("a");
  a.href=url; a.target="_blank"; a.rel="noopener noreferrer";
  document.body.appendChild(a); a.click(); a.remove();
}
function sendWhatsApp(m, text){
  const num = waNumber(m.phone);
  const msg = encodeURIComponent(text!=null ? text : reminderText(m));
  const url = num ? `https://wa.me/${num}?text=${msg}` : `https://wa.me/?text=${msg}`;
  openLink(url);
  toast(num ? "Opening WhatsApp…" : "Opening WhatsApp (no number on file)");
}

  doc.text("CHARGE", cols.charge, y, {align:"right"});
  doc.text("PAYMENT", cols.pay, y, {align:"right"});
  doc.text("BALANCE", cols.run, y, {align:"right"});
  y += 20;

  // Rows (chronological, running balance)
  const txns = State.transactions.filter(t=>t.memberId===m.id)
    .sort((a,b)=> (a.date||"").localeCompare(b.date||"") || a.createdAt-b.createdAt);

    else { doc.setTextColor(16,120,80); doc.text(cur(t.amount), cols.pay, y, {align:"right"}); }
    doc.setTextColor(...ink); doc.text(cur(run), cols.run, y, {align:"right"});
    doc.setDrawColor(...line); doc.setLineWidth(.5); doc.line(L, y+7, R, y+7);
    y += 22;

/* Compute per-member figures with FIFO payment allocation to detect overdue. */
function figures(memberId){
  const txns = State.transactions.filter(t=>t.memberId===memberId);
  const charges = txns.filter(t=>t.type==="charge").sort((a,b)=>(a.dueDate||a.date||"").localeCompare(b.dueDate||b.date||""));
  const payments = txns.filter(t=>t.type==="payment");
  const charged = charges.reduce((s,t)=>s+t.amount,0);
  const paid = payments.reduce((s,t)=>s+t.amount,0);
  const balance = charged - paid;
  // allocate payments oldest-first to find unpaid/overdue charges
  let pool = paid;
  const today = todayISO();
  let overdueAmt = 0, nextDue = null;
  for(const c of charges){
    const remaining = Math.max(0, c.amount - Math.min(pool, c.amount));
    pool = Math.max(0, pool - c.amount);
    if(remaining > 0.0001){
      if(c.dueDate && c.dueDate < today) overdueAmt += remaining;
      if(!nextDue || (c.dueDate||"") < nextDue) nextDue = c.dueDate || nextDue;
    }
  }
  const status = balance <= 0.0001 ? "clear" : (overdueAmt > 0.0001 ? "overdue" : "owing");
  return { charged, paid, balance, overdueAmt, nextDue, status, count: txns.length };
}

const prevCounts = {};
function countUp(){
  const reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  document.querySelectorAll("#summary [data-count]").forEach(el=>{
    const key = el.dataset.count;
    const target = parseFloat(el.dataset.target)||0;
    const isInt = el.dataset.int==="1";
    const from = prevCounts[key]==null ? (reduce?target:0) : prevCounts[key];
    prevCounts[key] = target;
    const fmt = v => isInt ? String(Math.round(v)) : cur(v);
    if(reduce || Math.abs(from-target)<0.005){ el.textContent = fmt(target); return; }
    const dur=680, t0=performance.now();
    (function step(now){
      let p=Math.min(1,(now-t0)/dur);
      p = 1-Math.pow(1-p,3);
      el.textContent = fmt(from + (target-from)*p);
      if(p<1) requestAnimationFrame(step);
    })(performance.now());
  });
}

      <div class="figure c-balance mono ${balClass}">${balText}</div>
      <div class="c-status">${status}</div>
      <div class="c-wa" style="justify-self:end">
        <button class="wa-btn" data-wa="${m.id}" title="${m.phone?`Send WhatsApp reminder to ${esc(m.name)}`:"No number on file — add one to send"}" ${m.phone?"":"disabled"}>${waIcon}</button>
      </div>
    </div>`;
  }).join("");

  board.innerHTML = head + body;
  ui.flashId = null;
  board.querySelectorAll(".trow").forEach(r=>{
    r.onclick = ()=>openMemberDetail(r.dataset.id);
  });
  board.querySelectorAll("[data-wa]").forEach(b=>{
    b.onclick = (e)=>{
      e.stopPropagation();
      const m = State.members.find(x=>x.id===b.dataset.wa);
      if(m) sendWhatsApp(m);
    };
  });
}

/* ============================================================
   Modals
   ============================================================ */
const scrim = document.getElementById("scrim");
function openScrim(html, {drawer=false}={}){
  scrim.innerHTML = `<div class="modal ${drawer?"drawer":""}">${html}</div>`;
  requestAnimationFrame(()=>scrim.classList.add("show"));
  scrim.querySelectorAll("[data-close]").forEach(b=>b.onclick=closeScrim);
}
function closeScrim(){
  scrim.classList.remove("show");
  setTimeout(()=>{ if(!scrim.classList.contains("show")) scrim.innerHTML=""; }, 220);
  ui.openMemberId=null;
}
scrim.addEventListener("click", e=>{ if(e.target===scrim) closeScrim(); });
document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeScrim(); });

/* ---- Add / edit member ---- */

        <label class="fld"><span class="lt">Phone <span style="font-weight:400;color:var(--faint)">(optional)</span></span>

      </div>
      <label class="fld"><span class="lt">Email <span style="font-weight:400;color:var(--faint)">(optional)</span></span>

    </div>
    <div class="m-foot">
      ${existing?`<button class="btn danger" id="f-delete" style="margin-right:auto">Delete member</button>`:""}
      <button class="btn" data-close>Cancel</button>
      <button class="btn primary" id="f-save">${existing?"Save changes":"Add member"}</button>
    </div>
  `);
  const nameEl = document.getElementById("f-name");
  nameEl.focus();
  document.getElementById("f-save").onclick = ()=>{
    const name = nameEl.value.trim();
    if(!name){ nameEl.focus(); nameEl.classList.add("inp"); flash("Please enter a name"); return; }
    const data = {
      name,
      unit: document.getElementById("f-unit").value.trim(),
      phone: document.getElementById("f-phone").value.trim(),
      email: document.getElementById("f-email").value.trim(),
    };
    if(existing){
      Object.assign(existing, data);
      ui.flashId = existing.id;
      toast("Member updated");
    }else{
      const nm = Object.assign({id:uid(),createdAt:Date.now()}, data);
      State.members.push(nm);
      ui.flashId = nm.id;
      toast("Member added");
    }
    persist(); render(); closeScrim();
  };
  if(existing){
    document.getElementById("f-delete").onclick = ()=>{

        State.members = State.members.filter(x=>x.id!==existing.id);
        State.transactions = State.transactions.filter(t=>t.memberId!==existing.id);
        persist(); render(); closeScrim(); toast("Member deleted");
      }
    };
  }
}

/* ---- Add charge ---- */
function openChargeForm(presetMemberId){
  if(State.members.length===0){ flash("Add a member first"); openMemberForm(); return; }
  const opts = State.members.slice().sort((a,b)=>a.name.localeCompare(b.name))
    .map(m=>`<option value="${m.id}" ${presetMemberId===m.id?"selected":""}>${esc(m.name)}${m.unit?` · ${esc(m.unit)}`:""}</option>`).join("");
  openScrim(`
    <div class="m-head"><h2>Add charge</h2><button class="btn ghost close" data-close>✕</button></div>
    <div class="m-body">
      <label class="checkline" for="c-all"><input type="checkbox" id="c-all"> Apply to every member (e.g. monthly dues)</label>

      <label class="fld"><span class="lt">Description</span>
        <input class="inp" id="c-desc" placeholder="e.g. Maintenance — July 2026"></label>
      <div class="two">
        <label class="fld"><span class="lt">Amount</span>
          <div class="money-inp"><span class="cursign">${esc(State.settings.currency)}</span>
          <input class="inp mono" id="c-amt" inputmode="decimal" placeholder="0.00"></div></label>
        <label class="fld"><span class="lt">Due date</span>
          <input class="inp" id="c-due" type="date" value="${todayISO()}"></label>
      </div>
    </div>
    <div class="m-foot">
      <button class="btn" data-close>Cancel</button>
      <button class="btn primary" id="c-save">Add charge</button>
    </div>
  `);
  const allBox = document.getElementById("c-all");
  const memWrap = document.getElementById("c-member-wrap");
  allBox.onchange = ()=> memWrap.style.display = allBox.checked ? "none" : "block";
  document.getElementById("c-desc").focus();
  document.getElementById("c-save").onclick = ()=>{
    const amt = parseFloat(document.getElementById("c-amt").value);
    const desc = document.getElementById("c-desc").value.trim() || "Charge";
    const due = document.getElementById("c-due").value || todayISO();
    if(!(amt>0)){ flash("Enter an amount greater than zero"); return; }
    const targets = allBox.checked ? State.members.map(m=>m.id) : [document.getElementById("c-member").value];
    for(const mid of targets){
      State.transactions.push({id:uid(),memberId:mid,type:"charge",amount:amt,description:desc,date:todayISO(),dueDate:due,createdAt:Date.now()});
    }
    persist();
    toast(allBox.checked ? `Charge added to ${targets.length} members` : "Charge added");
    closeScrim();
    if(ui.openMemberId && !allBox.checked && targets[0]===ui.openMemberId){ openMemberDetail(ui.openMemberId); }
    else { if(!allBox.checked) ui.flashId = targets[0]; render(); }
  };
}

  const sel = ui.lastAccountId || (State.accounts[0] && State.accounts[0].id) || "";

  });
  opts.push(`<option value="" ${!sel?"selected":""}>Cash / other</option>`);
  return opts.join("");
}

function statementMessage(m){
  const f = figures(m.id), C = State.settings.currency, org = State.settings.org;
  if(f.balance<=0.0001)
    return `Dear ${m.name}, please find attached your account statement from ${org}. Your account is fully settled — thank you.`;
  return `Dear ${m.name}, please find attached your account statement from ${org}. Your outstanding balance is ${C} ${cur(Math.max(0,f.balance))}. Kindly arrange payment at your convenience. Thank you.`;
}

/* ============================================================
   Collections (money received per account, by time window)
   ============================================================ */
let collWindow = 7; // 3 | 7 | 30 | null(all)
function openCollections(){
  renderCollections();
}
function renderCollections(){
  const C = State.settings.currency;
  const windows = [[3,"3 days"],[7,"7 days"],[30,"30 days"],[null,"All time"]];
  const data = collections(collWindow);
  const memberName = id => { const m = State.members.find(x=>x.id===id); return m?m.name:"—"; };

  const winLabel = (windows.find(w=>w[0]===collWindow)||[null,"All time"])[1];
  const rangeText = collWindow==null ? "all time" : `${fmtDate(daysAgoISO(collWindow))} – ${fmtDate(todayISO())}`;

  // per-account rows (include every account, even with 0 in window, plus Cash if present)
  const rowsData = State.accounts.map(a=>{
    const g = data.groups.find(x=>x.accountId===a.id);
    return { acc:a, total:g?g.total:0, count:g?g.count:0 };
  });
  const cashG = data.groups.find(x=>!x.accountId);
  if(cashG) rowsData.push({ acc:null, total:cashG.total, count:cashG.count });
  rowsData.sort((a,b)=>b.total-a.total);
  const max = Math.max(1, ...rowsData.map(r=>r.total));

  const accRows = rowsData.map(r=>{
    const a = r.acc;
    const badge = a ? accBadge(a) : `<span class="acc-badge" style="background:#6B7975">₨</span>`;
    const name = a ? a.provider : "Cash / other";
    const meta = a ? `${a.number} · ${a.holder}` : "Not tied to an account";
    const color = a ? accColor(a) : "#6B7975";
    const pct = data.total>0 ? Math.round(r.total/data.total*100) : 0;
    return `<div class="acc-row">
      ${badge}
      <div class="info">
        <div class="nm">${esc(name)} ${a?`<span class="type-chip">${a.type}</span>`:""}</div>
        <div class="meta">${esc(meta)}</div>
        <div class="bar"><i style="width:${data.total>0?(r.total/max*100):0}%;background:${color}"></i></div>
      </div>
      <div class="amt">
        <div class="big mono">${C} ${cur(r.total)}</div>
        <div class="cnt">${r.count} pmt${r.count===1?"":"s"} · ${pct}%</div>
      </div>
    </div>`;
  }).join("");

  const recent = data.pays.slice().sort((a,b)=> (b.date||"").localeCompare(a.date||"") || b.createdAt-a.createdAt).slice(0,12);
  const recentRows = recent.length ? recent.map(p=>{
    const a = p.accountId ? accountById(p.accountId) : null;
    return `<div class="payrow">
      ${a?accBadge(a,true):`<span class="acc-badge sm" style="background:#6B7975">₨</span>`}
      <div><div class="who">${esc(memberName(p.memberId))}</div><div class="when">${fmtDate(p.date)} · ${a?esc(a.provider):"Cash"}</div></div>
      <div class="pa mono">${C} ${cur(p.amount)}</div>
    </div>`;
  }).join("") : `<div style="color:var(--muted);font-size:13px;padding:14px 0">No payments received in this period.</div>`;

  openScrim(`
    <div class="m-head">
      <div>
        <h2>Collections</h2>
        <div style="font-size:12.5px;color:var(--muted)">${esc(rangeText)}</div>
      </div>
      <button class="btn ghost close" data-close aria-label="Close" style="margin-left:auto;align-self:flex-start">✕</button>
    </div>
    <div class="m-body">
      <div class="segmented" id="coll-win" style="width:100%;margin-bottom:18px">
        ${windows.map(([d,label])=>`<button class="${collWindow===d?"on":""}" data-w="${d==null?"all":d}" style="flex:1">${label}</button>`).join("")}
      </div>
      <div class="win-total">
        <div class="l">Received · ${esc(winLabel)}</div>
        <div class="v mono"><span class="cur">${C}</span>${cur(data.total)}</div>
        <div class="s">${data.count} payment${data.count===1?"":"s"} across ${rowsData.filter(r=>r.total>0).length} account${rowsData.filter(r=>r.total>0).length===1?"":"s"}</div>
      </div>
      <div class="ledger-title"><h3>By account</h3></div>
      ${accRows || '<div style="color:var(--muted);font-size:13px">No accounts yet.</div>'}
      <div class="ledger-title" style="margin-top:22px"><h3>Recent payments</h3></div>
      <div class="paylist">${recentRows}</div>
    </div>
    <div class="m-foot">
      <button class="btn" id="coll-manage">Manage accounts</button>
      <button class="btn primary" id="coll-share">Payment details</button>
    </div>
  `, {drawer:true});

  document.getElementById("coll-win").querySelectorAll("[data-w]").forEach(b=>{
    b.onclick = ()=>{ collWindow = b.dataset.w==="all"?null:parseInt(b.dataset.w,10); renderCollections(); };
  });
  document.getElementById("coll-manage").onclick = openAccounts;
  document.getElementById("coll-share").onclick = ()=>openPayShare();
}

/* ---- Account manager ---- */
function openAccounts(){
  const C = State.settings.currency;
  const list = State.accounts.length ? State.accounts.map(a=>{
    const allTime = collections(null).groups.find(g=>g.accountId===a.id);
    return `<div class="mini-acc">
      ${accBadge(a)}
      <div class="info">
        <div class="nm">${esc(a.provider)} <span class="type-chip">${a.type}</span></div>
        <div class="meta">${esc(a.number)} · ${esc(a.holder)}${allTime?` · ${C} ${cur(allTime.total)} lifetime`:""}</div>
      </div>
      <button class="btn ghost sm" data-edit-acc="${a.id}" title="Edit">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>
      </button>
    </div>`;
  }).join("") : `<div style="color:var(--muted);font-size:13px;margin-bottom:12px">No accounts yet.</div>`;

  openScrim(`
    <div class="m-head"><h2>Receiving accounts</h2><button class="btn ghost close" data-close style="margin-left:auto">✕</button></div>
    <div class="m-body">
      ${list}
      <button class="btn" id="acc-add" style="width:100%;justify-content:center;margin-top:6px">+ Add account</button>
      <label class="fld" style="margin-top:20px"><span class="lt">Slip sharing number (WhatsApp)</span>
        <input class="inp" id="acc-slip" value="${esc(State.settings.slipNumber||"")}" placeholder="0312-6617887"></label>
      <div class="acc-select-note">Customers send their payment slip to this number.</div>
    </div>
    <div class="m-foot">
      <button class="btn" data-close>Close</button>
      <button class="btn primary" id="acc-back">Back to collections</button>
    </div>
  `);
  document.getElementById("acc-add").onclick = ()=>openAccountForm();
  document.getElementById("acc-slip").addEventListener("change", e=>{ State.settings.slipNumber = e.target.value.trim(); persist(); });
  document.getElementById("acc-back").onclick = ()=>{ State.settings.slipNumber = document.getElementById("acc-slip").value.trim(); persist(); renderCollections(); };
  scrim.querySelectorAll("[data-edit-acc]").forEach(b=>{
    b.onclick = ()=> openAccountForm(accountById(b.dataset.editAcc));
  });
}

function openAccountForm(existing){
  const a = existing || {};
  openScrim(`
    <div class="m-head"><h2>${existing?"Edit account":"Add account"}</h2><button class="btn ghost close" data-close style="margin-left:auto">✕</button></div>
    <div class="m-body">
      <div class="two">
        <label class="fld"><span class="lt">Provider / bank</span>
          <input class="inp" id="a-provider" value="${esc(a.provider||"")}" placeholder="Easypaisa"></label>
        <label class="fld"><span class="lt">Type</span>
          <select class="inp" id="a-type">
            <option value="wallet" ${a.type==="wallet"?"selected":""}>Mobile wallet</option>
            <option value="bank" ${a.type==="bank"?"selected":""}>Bank account</option>
          </select></label>
      </div>
      <label class="fld"><span class="lt">Account / mobile number</span>
        <input class="inp mono" id="a-number" value="${esc(a.number||"")}" placeholder="0328-0995780"></label>
      <label class="fld"><span class="lt">Account holder name</span>
        <input class="inp" id="a-holder" value="${esc(a.holder||"")}" placeholder="Husnain Ali"></label>
      <label class="fld"><span class="lt">Colour tag</span>
        <input class="inp" id="a-color" type="color" value="${a.color||"#10564A"}" style="height:44px;padding:4px"></label>
    </div>
    <div class="m-foot">
      ${existing?`<button class="btn danger" id="a-del" style="margin-right:auto">Delete</button>`:""}
      <button class="btn" data-close>Cancel</button>
      <button class="btn primary" id="a-save">${existing?"Save":"Add account"}</button>
    </div>
  `);
  document.getElementById("a-save").onclick = ()=>{
    const provider = document.getElementById("a-provider").value.trim();
    const number = document.getElementById("a-number").value.trim();
    if(!provider || !number){ flash("Enter a provider and number"); return; }
    const data = {
      provider, number,
      type: document.getElementById("a-type").value,
      holder: document.getElementById("a-holder").value.trim(),
      color: document.getElementById("a-color").value,
    };
    if(existing){ Object.assign(existing, data); toast("Account updated"); }
    else { State.accounts.push(Object.assign({id:uid()}, data)); toast("Account added"); }
    persist(); openAccounts();
  };
  if(existing){
    document.getElementById("a-del").onclick = ()=>{
      const used = State.transactions.some(t=>t.accountId===existing.id);
      const msg = used ? `Delete ${existing.provider}? Past payments will show as "Cash / other".` : `Delete ${existing.provider}?`;
      if(confirm(msg)){
        State.accounts = State.accounts.filter(x=>x.id!==existing.id);
        persist(); openAccounts(); toast("Account deleted");
      }
    };
  }
}

/* ---- Share payment details ---- */
function openPayShare(prefillMember){
  const text = payDetailsText();
  openScrim(`
    <div class="m-head"><h2>Payment details</h2><button class="btn ghost close" data-close style="margin-left:auto">✕</button></div>
    <div class="m-body">
      <p style="font-size:13.5px;color:var(--muted);margin:0 0 14px">Send these account details to a customer so they know where to pay. Copy it, or open WhatsApp to share.</p>
      <div class="codeblock" id="pay-block">${esc(text)}</div>
    </div>
    <div class="m-foot">
      <button class="btn" id="pay-copy">Copy</button>
      <button class="btn wa" id="pay-wa">
        <svg viewBox="0 0 24 24" fill="currentColor" style="width:15px;height:15px"><path d="M17.5 14.4c-.3-.2-1.7-.9-2-1-.3-.1-.5-.1-.6.2-.2.3-.7.9-.8 1-.2.2-.3.2-.6.1-.3-.2-1.2-.5-2.3-1.4-.9-.8-1.4-1.7-1.6-2-.2-.3 0-.5.1-.6l.4-.5c.1-.2.2-.3.2-.5.1-.2 0-.4 0-.5 0-.2-.6-1.5-.9-2-.2-.5-.4-.4-.6-.5h-.5c-.2 0-.5.1-.7.3-.2.3-.9.9-.9 2.2s.9 2.5 1.1 2.7c.1.2 1.8 2.8 4.4 3.9.6.3 1.1.4 1.5.5.6.2 1.2.2 1.6.1.5-.1 1.7-.7 1.9-1.3.2-.7.2-1.2.2-1.3-.1-.2-.3-.2-.6-.4z"/><path d="M12 2a10 10 0 0 0-8.6 15l-1.3 4.8 4.9-1.3A10 10 0 1 0 12 2zm0 18a8 8 0 0 1-4.1-1.1l-.3-.2-3 .8.8-2.9-.2-.3A8 8 0 1 1 12 20z"/></svg>
        WhatsApp
      </button>
    </div>
  `);
  document.getElementById("pay-copy").onclick = ()=>{
    const t = payDetailsText();
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(t).then(()=>toast("Copied to clipboard")).catch(()=>fallbackCopy(t));
    } else fallbackCopy(t);
  };
  document.getElementById("pay-wa").onclick = ()=>{
    const t = payDetailsText();
    if(prefillMember && prefillMember.phone){ sendWhatsApp(prefillMember, t); }
    else { openLink(`https://wa.me/?text=${encodeURIComponent(t)}`); toast("Opening WhatsApp…"); }
    closeScrim();
  };
}
function fallbackCopy(t){
  const ta=document.createElement("textarea"); ta.value=t; document.body.appendChild(ta); ta.select();
  try{ document.execCommand("copy"); toast("Copied to clipboard"); }catch(e){ flash("Couldn't copy — select the text manually"); }
  ta.remove();
}

/* ============================================================
   Import / Export
   ============================================================ */
function exportJson(){
  const blob = new Blob([JSON.stringify(State,null,2)],{type:"application/json"});
  downloadBlob(blob, `ledger-backup-${todayISO()}.json`);
  toast("Backup downloaded");
}
function buildMembersCsv(){
  const rows = [["Name","Unit","Phone","Email","Charged","Paid","Balance","Status"]];
  for(const m of State.members){
    const f = figures(m.id);
    rows.push([m.name,m.unit||"",m.phone||"",m.email||"",f.charged.toFixed(2),f.paid.toFixed(2),f.balance.toFixed(2),f.status]);
  }
  return rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\r\n");
}
function exportCsv(){
  downloadBlob(new Blob([buildMembersCsv()],{type:"text/csv"}), `dues-summary-${todayISO()}.csv`);
  toast("CSV exported");
}
function downloadBlob(blob, name){
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href=url; a.download=name; document.body.appendChild(a); a.click();
  a.remove(); setTimeout(()=>URL.revokeObjectURL(url), 1000);
}
function importJson(file){
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const d = JSON.parse(reader.result);
      if(!d.members || !Array.isArray(d.members)) throw new Error("bad file");
      if(!confirm("Replace all current data with this backup? Your existing entries will be overwritten.")) return;
      State.settings = Object.assign({org:"Shakeel Electronics",currency:"Rs",countryCode:"92",slipNumber:"0312-6617887",accountsSeeded:true}, d.settings||{});
      State.members = d.members||[];
      State.transactions = d.transactions||[];
      State.accounts = d.accounts||[];
      persist(); render(); toast("Backup restored");
    }catch(e){ flash("That file isn't a valid Ledger backup"); }
  };
  reader.readAsText(file);
}

/* ============================================================
   Toast + flash
   ============================================================ */
let toastTimer=null;
function toast(msg){
  const t = document.getElementById("toast");
  t.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>${esc(msg)}`;
  t.classList.add("show");
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"), 2200);
}
function flash(msg){
  const t = document.getElementById("toast");
  t.innerHTML = esc(msg);
  t.style.background = "var(--warn)";
  t.classList.add("show");
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>{t.classList.remove("show"); setTimeout(()=>t.style.background="",250);}, 2200);
}

/* ============================================================
   Wire up
   ============================================================ */
document.getElementById("addMemberBtn").onclick = ()=>openMemberForm();
document.getElementById("addChargeBtn").onclick = ()=>openChargeForm();
document.getElementById("collectionsBtn").onclick = ()=>openCollections();
document.getElementById("searchInput").addEventListener("input", e=>{ ui.search=e.target.value; renderBoard(); });

  ui.filter=b.dataset.filter; renderFilters(); renderBoard({animate:true});

document.getElementById("exportJsonBtn").onclick = exportJson;
document.getElementById("exportCsvBtn").onclick = exportCsv;

document.getElementById("importFile").addEventListener("change", e=>{ if(e.target.files[0]) importJson(e.target.files[0]); e.target.value=""; });

/* ---------- Install as app (PWA) ---------- */
let deferredPrompt = null;
const installBtn = document.getElementById("installBtn");
const isStandalone = () =>
  (window.matchMedia && window.matchMedia("(display-mode: standalone)").matches) ||
  window.navigator.standalone === true;
const isIOS = () => /iphone|ipad|ipod/i.test(navigator.userAgent);

window.addEventListener("beforeinstallprompt", (e)=>{
  e.preventDefault();
  deferredPrompt = e;
  if(!isStandalone()) installBtn.style.display = "inline-flex";
});
window.addEventListener("appinstalled", ()=>{
  installBtn.style.display = "none";
  deferredPrompt = null;
  toast("App installed");
});
installBtn.onclick = async ()=>{
  if(deferredPrompt){
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    if(outcome==="accepted") toast("Installing…");
    deferredPrompt = null;
    installBtn.style.display = "none";
  }else{
    openInstallHelp();
  }
};
function openInstallHelp(){
  const ios = isIOS();
  const steps = ios ? [
    `Tap the <b>Share</b> button <span class="kbd">⬆︎</span> at the bottom of Safari.`,
    `Scroll down and tap <b>Add to Home Screen</b>.`,
    `Tap <b>Add</b> — the Ledger icon appears on your home screen.`,
  ] : [
    `Open the menu <span class="kbd">⋮</span> in the top-right of Chrome.`,
    `Tap <b>Install app</b> (or <b>Add to Home screen</b>).`,
    `Confirm — the Ledger icon appears on your home screen and opens full-screen.`,
  ];
  openScrim(`
    <div class="m-head"><h2>Install ${esc(State.settings.org)}</h2><button class="btn ghost close" data-close style="margin-left:auto">✕</button></div>
    <div class="m-body">
      <p style="font-size:13.5px;color:var(--muted);margin:0 0 6px">Add it to your ${ios?"iPhone":"phone"}'s home screen to open it like a normal app — full screen, with its own icon.</p>
      <ol class="ios-steps">${steps.map(s=>`<li><span>${s}</span></li>`).join("")}</ol>
      <p style="font-size:12px;color:var(--faint);margin:14px 0 0">Tip: for this to work, open the saved file in ${ios?"Safari":"Chrome or Edge"} (not inside the chat preview).</p>
    </div>
    <div class="m-foot"><button class="btn primary" data-close>Got it</button></div>
  `);
}
// Show a manual install affordance on iOS / unsupported prompt, when not already installed
if(!isStandalone() && isIOS()){ installBtn.style.display = "inline-flex"; }

// rename org inline
document.getElementById("orgName").addEventListener("click", function(){
  const cur = State.settings.org;
  const name = prompt("Organization name", cur);
  if(name!=null && name.trim()){ State.settings.org=name.trim(); persist(); render(); }
});

/* ---- init ---- */

/* ---------- auto-connect saving folder on open ---------- */
function applyLoaded(d){
  if(!d) return;
  State.settings=Object.assign(State.settings, d.settings||{});
  for(const k of Object.keys(State)){ if(k!=="settings" && Array.isArray(State[k]) && Array.isArray(d[k])) State[k]=d[k]; }
}
async function loadFromFolderAndSync(){
  let loaded=false;
  try{
    const fh=await dirHandle.getFileHandle(DATA_FILE);
    const text=await (await fh.getFile()).text();
    const d=JSON.parse(text);
    const folderTime=(d.settings&&d.settings.updatedAt)||0;
    const localTime=(State.settings&&State.settings.updatedAt)||0;
    if(folderTime>localTime){ applyLoaded(d); render(); loaded=true; }
  }catch(e){ /* no file in folder yet */ }
  fsLastSaved=new Date(); setAutoSaveState("on"); hideReconnectBar();
  writeToFolder(true);
  if(loaded) toast("Loaded latest from your folder");
}
async function autoConnectFolder(){
  setAutoSaveState("off");
  if(!FS_SUPPORTED) return;
  const h=await idb("get");
  if(!h) return;
  dirHandle=h;
  let perm="prompt";
  try{ perm=await h.queryPermission({mode:"readwrite"}); }catch(e){}
  if(perm==="granted"){ await loadFromFolderAndSync(); }
  else{ setAutoSaveState("warn"); showReconnectBar(); }
}
async function reconnectFolder(){
  if(!dirHandle){ pickFolder(); return; }
  if(await ensurePerm(dirHandle)){ await loadFromFolderAndSync(); toast("Folder reconnected"); }
  else flash("Couldn't get folder access");
}
function showReconnectBar(){
  if(document.getElementById("reconnectBar")) return;
  const bar=document.createElement("button");
  bar.id="reconnectBar"; bar.className="reconnect-bar";
  bar.innerHTML=`<span class="as-dot warn"></span> Tap to reconnect folder “${esc(State.settings.autoSaveFolder||"")}” & load latest`;
  bar.onclick=reconnectFolder;
  document.body.appendChild(bar);
}
function hideReconnectBar(){ const b=document.getElementById("reconnectBar"); if(b) b.remove(); }


(async function init(){
  document.body.classList.add("boot");
  await load();
  render({animate:true});
  autoConnectFolder();
  updateStorageNote();
  setTimeout(()=>document.body.classList.remove("boot"), 1400);
})();
</script>
