<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{
    --paper:#F4F5F2;--panel:#FFFFFF;--ink:#16211F;--muted:#6B7975;--faint:#9AA6A2;
    --line:#E2E6E1;--line-strong:#CDD4CF;--green:#10564A;--green-hi:#0C453B;--green-soft:#E7F0EC;
    --paid:#2E7D5B;--warn:#B8492C;--warn-soft:#F7E9E1;--gold:#B08A3E;--blue:#1F6F8B;--blue-soft:#E1EFF3;--amber:#B7791F;--amber-soft:#FBF0D9;
    --shadow:0 1px 2px rgba(22,33,31,.04),0 8px 24px rgba(22,33,31,.06);
    --radius:14px;--ease:cubic-bezier(.22,.61,.36,1);
  }
  *{box-sizing:border-box}html,body{margin:0}html{-webkit-text-size-adjust:100%}
  body{background:var(--paper);color:var(--ink);font-family:"Inter",system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;line-height:1.5;min-height:100vh;overscroll-behavior-y:none}
  .mono{font-family:"JetBrains Mono",ui-monospace,monospace;font-variant-numeric:tabular-nums}
  .grot{font-family:"Space Grotesk",system-ui,sans-serif}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;-webkit-tap-highlight-color:transparent}
  :focus-visible{outline:2px solid var(--green);outline-offset:2px;border-radius:6px}
  .wrap{max-width:920px;margin:0 auto;padding:0 16px 90px;padding-left:calc(16px + env(safe-area-inset-left));padding-right:calc(16px + env(safe-area-inset-right));padding-bottom:calc(90px + env(safe-area-inset-bottom))}
  header.top{position:sticky;top:0;z-index:20;background:rgba(244,245,242,.9);backdrop-filter:saturate(180%) blur(10px);border-bottom:1px solid var(--line)}
  .top-inner{max-width:920px;margin:0 auto;padding:12px 16px;padding-top:calc(12px + env(safe-area-inset-top));display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .brand{display:flex;align-items:baseline;gap:9px;margin-right:auto}
  .brand .mark{font-family:"Space Grotesk";font-weight:700;font-size:19px;letter-spacing:-.02em}
  .brand .mark b{color:var(--green)}
  .brand .org{font-size:12px;color:var(--muted);border-left:1px solid var(--line-strong);padding-left:9px;max-width:150px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:text}
  .btn{display:inline-flex;align-items:center;gap:7px;font-size:13.5px;font-weight:600;padding:9px 14px;border-radius:10px;border:1px solid var(--line-strong);background:var(--panel);color:var(--ink);transition:.15s;white-space:nowrap;user-select:none}
  .btn:hover{border-color:var(--faint);transform:translateY(-1px)}.btn:active{transform:translateY(0)}
  .btn.primary{background:var(--green);color:#fff;border-color:var(--green)}.btn.primary:hover{background:var(--green-hi)}
  .btn.primary:disabled{opacity:.45;cursor:not-allowed;transform:none}
  .btn.ghost{border-color:transparent;background:transparent;color:var(--muted);padding:9px 10px}.btn.ghost:hover{background:var(--line);color:var(--ink)}
  .btn.danger{color:var(--warn);border-color:transparent}.btn.danger:hover{background:var(--warn-soft)}
  .btn.install{background:var(--gold);color:#26200E;border-color:var(--gold);font-weight:700}.btn.install:hover{background:#C79B4A;border-color:#C79B4A}
  .btn.wa{background:#25D366;color:#fff;border-color:#25D366}.btn.wa:hover{background:#1Fb457}
  .btn svg{width:16px;height:16px}.btn.sm{padding:6px 11px;font-size:12.5px}

  /* tabs */
  .tabs{display:flex;gap:4px;background:var(--line);padding:4px;border-radius:12px;margin:16px 0}
  .tabs button{flex:1;font-size:13.5px;font-weight:600;color:var(--muted);padding:9px;border-radius:9px;transition:.15s;display:flex;align-items:center;justify-content:center;gap:6px;user-select:none}
  .tabs button.on{background:var(--panel);color:var(--green);box-shadow:0 1px 2px rgba(0,0,0,.06)}
  .tabs button svg{width:16px;height:16px}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .pad{padding:16px}
  .section-label{font-size:10.5px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:0 0 10px}

  .search{display:flex;align-items:center;gap:9px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:0 12px;margin-bottom:12px}
  .search:focus-within{border-color:var(--faint)}
  .search svg{width:16px;height:16px;color:var(--faint);flex-shrink:0}
  .search input{border:none;outline:none;background:none;font-family:inherit;font-size:14px;color:var(--ink);padding:11px 0;width:100%}

  /* product quick-add grid */
  .pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
  .pcard{border:1px solid var(--line);border-radius:12px;padding:12px;cursor:pointer;transition:.13s;background:#FCFDFB;text-align:left;position:relative}
  .pcard:hover{border-color:var(--green);transform:translateY(-2px);box-shadow:var(--shadow)}
  .pcard .nm{font-weight:600;font-size:13.5px;line-height:1.25}
  .pcard .pr{font-family:"JetBrains Mono",monospace;font-weight:600;color:var(--green);font-size:13px;margin-top:6px}
  .pcard .st{font-size:11px;color:var(--faint);margin-top:2px}
  .pcard .st.low{color:var(--warn)}
  .pcard .plus{position:absolute;top:8px;right:8px;width:22px;height:22px;border-radius:7px;background:var(--green-soft);color:var(--green);display:grid;place-items:center;font-weight:700;font-size:15px}

  /* cart */
  .cart-line{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--line)}
  .cart-line:last-child{border-bottom:none}
  .cart-line .nm{flex:1;min-width:0}
  .cart-line .nm .t{font-weight:600;font-size:14px}
  .cart-line .nm .p{font-size:12px;color:var(--muted);font-family:"JetBrains Mono",monospace}
  .stepper{display:flex;align-items:center;border:1px solid var(--line-strong);border-radius:9px;overflow:hidden;flex-shrink:0}
  .stepper button{width:30px;height:30px;display:grid;place-items:center;color:var(--green);font-size:16px;font-weight:600}
  .stepper button:hover{background:var(--green-soft)}
  .stepper .q{min-width:34px;text-align:center;font-family:"JetBrains Mono",monospace;font-weight:600;font-size:14px}
  .cart-line .lt{width:88px;text-align:right;font-family:"JetBrains Mono",monospace;font-weight:600;font-size:14px}
  .cart-line .rm{color:var(--warn);width:28px;height:28px;border-radius:8px;display:grid;place-items:center;flex-shrink:0}
  .cart-line .rm:hover{background:var(--warn-soft)}

  .totrow{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:14px}
  .totrow .lab{color:var(--muted)}
  .totrow.grand{border-top:1px solid var(--line);margin-top:6px;padding-top:12px}
  .totrow.grand .lab{font-weight:700;color:var(--ink);font-size:16px}
  .totrow.grand .v{font-family:"JetBrains Mono",monospace;font-weight:700;font-size:22px;color:var(--green)}
  .totrow .v{font-family:"JetBrains Mono",monospace;font-weight:600}
  .miniinp{width:110px;text-align:right}
  .inp{width:100%;font-family:inherit;font-size:14px;color:var(--ink);padding:10px 12px;border:1px solid var(--line-strong);border-radius:10px;background:#fff;transition:.15s}
  .inp:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px var(--green-soft)}
  .inp.mono{font-family:"JetBrains Mono",monospace}
  .inp.small{padding:7px 10px;font-size:13px}

  .chips{display:flex;gap:8px;flex-wrap:wrap}
  .chip{padding:9px 14px;border-radius:10px;border:1px solid var(--line-strong);font-size:13px;font-weight:600;color:var(--muted);transition:.13s;user-select:none}
  .chip.on{background:var(--green);color:#fff;border-color:var(--green)}
  .chip.credit.on{background:var(--amber);border-color:var(--amber)}

  .today-strip{display:flex;gap:12px;margin-bottom:14px}
  .today-strip .t{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px;box-shadow:var(--shadow)}
  .today-strip .l{font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:600}
  .today-strip .v{font-size:20px;font-weight:600;margin-top:4px;font-family:"JetBrains Mono",monospace}
  .today-strip .t.accent .v{color:var(--green)}

  /* sales history */
  .day-head{display:flex;justify-content:space-between;align-items:baseline;margin:18px 0 8px;font-size:13px}
  .day-head .d{font-weight:600}
  .day-head .tot{font-family:"JetBrains Mono",monospace;font-weight:700;color:var(--green)}
  .sale-row{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--line);cursor:pointer;transition:background .12s}
  .sale-row:last-child{border-bottom:none}.sale-row:hover{background:#FAFBF9}
  .sale-row .inv{font-family:"JetBrains Mono",monospace;font-weight:600;font-size:13px;color:var(--muted)}
  .sale-row .mid{flex:1;min-width:0}
  .sale-row .it{font-size:13.5px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .sale-row .mt{font-size:11.5px;color:var(--muted);margin-top:2px}
  .sale-row .amt{font-family:"JetBrains Mono",monospace;font-weight:700;font-size:15px;text-align:right}
  .tag{font-size:10px;font-weight:700;text-transform:uppercase;padding:2px 7px;border-radius:20px}
  .tag.credit{background:var(--amber-soft);color:var(--amber)}
  .tag.cash{background:var(--green-soft);color:var(--paid)}

  .empty{padding:52px 20px;text-align:center;color:var(--muted)}
  .empty .big{font-family:"Space Grotesk";font-size:18px;color:var(--ink);font-weight:600;margin-bottom:6px}
  .empty p{max-width:360px;margin:0 auto 16px;font-size:14px}

  .footbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-top:18px;flex-wrap:wrap}
  .footbar .note{font-size:12px;color:var(--faint)}
  .footbar .r{display:flex;gap:8px;flex-wrap:wrap}
  .as-dot{width:7px;height:7px;border-radius:50%;display:inline-block}
  .as-dot.off{background:var(--faint)}.as-dot.on{background:#22C55E;box-shadow:0 0 0 3px rgba(34,197,94,.18)}.as-dot.warn{background:var(--gold)}

  /* modal */
  .scrim{position:fixed;inset:0;background:rgba(22,33,31,.34);backdrop-filter:blur(2px);z-index:40;display:flex;opacity:0;pointer-events:none;transition:opacity .26s var(--ease)}
  .scrim.show{opacity:1;pointer-events:auto}
  .modal{background:var(--panel);border-radius:16px;box-shadow:0 20px 60px rgba(22,33,31,.28);width:min(460px,calc(100% - 28px));margin:auto;max-height:92vh;overflow:auto;transform:translateY(14px) scale(.97);opacity:0;transition:transform .3s var(--ease),opacity .3s var(--ease)}
  .scrim.show .modal{transform:none;opacity:1}
  .m-head{padding:18px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px}
  .m-head h2{font-family:"Space Grotesk";font-size:17px;font-weight:600;margin:0}
  .m-body{padding:18px 20px}.m-foot{padding:14px 20px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;background:#FCFDFB;flex-wrap:wrap}
  label.fld{display:block;margin-bottom:13px}
  label.fld .lt{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .hint{font-size:12px;color:var(--faint);margin:-4px 0 12px}
  .ios-steps{list-style:none;padding:0;margin:8px 0 0;counter-reset:s}
  .ios-steps li{display:flex;gap:11px;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--line);font-size:13.5px}
  .ios-steps li:last-child{border-bottom:none}
  .ios-steps li::before{counter-increment:s;content:counter(s);flex-shrink:0;width:24px;height:24px;border-radius:7px;background:var(--green-soft);color:var(--green);font-weight:700;font-size:12px;display:grid;place-items:center;font-family:"Space Grotesk"}
  .kbd{display:inline-flex;background:var(--line);border-radius:6px;padding:1px 6px;font-weight:600;font-size:12px}

  /* receipt */
  .receipt{font-family:"JetBrains Mono",monospace;font-size:12.5px;line-height:1.65;color:var(--ink);background:#fff;border:1px dashed var(--line-strong);border-radius:10px;padding:16px;white-space:pre-wrap}
  .receipt .rc-org{font-family:"Space Grotesk";font-size:16px;font-weight:700;text-align:center;letter-spacing:-.01em}
  .receipt .rc-c{text-align:center;color:var(--muted);font-size:11px}
  .receipt hr{border:none;border-top:1px dashed var(--line-strong);margin:8px 0}
  .rc-line{display:flex;justify-content:space-between;gap:10px}
  .rc-tot{font-weight:700;font-size:15px}

  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;font-size:13.5px;font-weight:500;padding:11px 18px;border-radius:11px;box-shadow:0 10px 30px rgba(0,0,0,.25);z-index:60;opacity:0;transition:.25s;display:flex;align-items:center;gap:9px}
  .toast.show{opacity:1;transform:translateX(-50%)}.toast svg{width:16px;height:16px;color:#7FDCB6}

  @media (max-width:560px){ .brand .org{max-width:100px} .miniinp{width:96px} .cart-line .lt{width:74px} }
  @media (display-mode:standalone){ header.top{background:var(--paper)} }
  @media (prefers-reduced-motion:reduce){ *{transition:none!important;animation:none!important} }

  /* print: show only receipt */
  #printArea{display:none}
  @media print{
    body *{visibility:hidden}
    #printArea, #printArea *{visibility:visible}
    #printArea{display:block;position:absolute;left:0;top:0;width:100%;padding:10px;font-family:"JetBrains Mono",monospace;font-size:12px}
  }
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<body>
<header class="top">
  <div class="top-inner">
    <div class="brand"><span class="mark grot">Reg<b>ister</b></span><span class="org" id="orgName" title="Click to rename">Shakeel Electronics</span></div>
    <button class="btn install" id="installBtn" style="display:none"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="m8 11 4 4 4-4"/><path d="M5 21h14"/></svg>Install</button>
    <button class="btn ghost sm" id="settingsBtn" title="Settings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
  </div>
</header>

<div class="wrap">
  <div class="tabs" id="tabs">
    <button data-tab="sell" class="on"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>Sell</button>
    <button data-tab="sales"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>Sales</button>
    <button data-tab="products"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 7h-9"/><path d="M14 17H5"/><circle cx="17" cy="17" r="3"/><circle cx="7" cy="7" r="3"/></svg>Products</button>
  </div>
  <div id="view"></div>
  <div class="footbar">
    <div style="display:flex;flex-direction:column;gap:3px">
      <span class="note" id="storageNote"></span><span class="note" id="autoSaveNote"></span>
    </div>
    <div class="r">
      <button class="btn ghost sm" id="autoSaveBtn"><span class="as-dot off"></span>Auto-save to folder</button>
      <button class="btn ghost sm" id="importBtn">Import backup</button>
      <button class="btn ghost sm" id="exportCsvBtn">Export sales CSV</button>
      <button class="btn ghost sm" id="exportJsonBtn">Backup data</button>
      <input type="file" id="importFile" accept="application/json" style="display:none"/>
    </div>
  </div>
</div>

<div class="scrim" id="scrim"></div>
<div class="toast" id="toast"></div>
<div id="printArea"></div>

<script>
/* ============================================================
   Register — simple POS: sell, receipts, sales history
   ============================================================ */
const KEY="pos:data:v1";
const hasStore=(typeof window!=="undefined" && window.storage && typeof window.storage.get==="function");
const DEFAULT_METHODS=["Cash","Easypaisa","JazzCash","Meezan Bank","UBL Bank","Credit"];
const State={
  settings:{ org:"Shakeel Electronics", currency:"Rs", taxPct:0, nextInvoice:1, countryCode:"92",
             receiptFooter:"Thank you! Visit again.", methods:DEFAULT_METHODS.slice(), autoSaveFolder:null },
  products:[], // {id,name,code,price,stock(null=untracked),createdAt}
  sales:[],    // {id,invoice,createdAt,items:[{name,code,qty,price}],subtotal,discount,taxPct,tax,total,method,paid,tendered,change,customer,phone,note}
};
let ui={ tab:"sell", cart:[], method:"Cash", search:"", psearch:"" };

/* ---------- storage (device + optional folder) ---------- */
async function load(){
  let d=null;
  if(hasStore){ try{ const r=await window.storage.get(KEY); if(r&&r.value) d=JSON.parse(r.value); }catch(e){} }
  if(!d) d=lsLoad();
  if(d){ State.settings=Object.assign(State.settings,d.settings||{}); State.products=d.products||[]; State.sales=d.sales||[]; }
  if(!State.settings.methods||!State.settings.methods.length) State.settings.methods=DEFAULT_METHODS.slice();
}
function lsLoad(){ try{ const s=localStorage.getItem(KEY); return s?JSON.parse(s):null; }catch(e){ return null; } }
function lsSave(){ try{ localStorage.setItem(KEY,JSON.stringify(State)); return true; }catch(e){ return false; } }
let saveTimer=null,storageOK=true;
async function save(){ let ok=false; if(hasStore){ try{ await window.storage.set(KEY,JSON.stringify(State)); ok=true; }catch(e){} } if(lsSave()) ok=true; storageOK=ok; updateStorageNote(); }
function persist(){ State.settings.updatedAt=Date.now(); clearTimeout(saveTimer); saveTimer=setTimeout(save,120); if(dirHandle) writeToFolder(false); }
function updateStorageNote(){ const el=document.getElementById("storageNote"); if(!el) return;
  if(!storageOK){ el.innerHTML=`<span style="color:var(--warn)">⚠ Couldn't save on this device — use “Backup data”.</span>`; }
  else if(dirHandle&&State.settings.autoSaveFolder){ el.textContent=""; } else { el.textContent="Saved automatically on this device."; } }

/* ---------- helpers ---------- */
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
function esc(s){ return String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
const C=()=>State.settings.currency;
function money(n){ const s=Math.abs(n).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}); return (n<0?"-":"")+s; }
function localISO(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }
const todayISO=()=>localISO(new Date());
function invNo(n){ return "INV-"+String(n).padStart(4,"0"); }
function waNumber(phone){ if(!phone) return ""; let d=String(phone).replace(/[^\d+]/g,""); const cc=(State.settings.countryCode||"92").replace(/\D/g,""); if(d.startsWith("+"))d=d.slice(1); else if(d.startsWith("00"))d=d.slice(2); else if(d.startsWith("0"))d=cc+d.slice(1); else if(!d.startsWith(cc)&&d.length<=10)d=cc+d; return d; }

function cartTotals(discount, taxPct){
  const subtotal=ui.cart.reduce((s,l)=>s+l.qty*l.price,0);
  const disc=Math.max(0, discount||0);
  const taxable=Math.max(0, subtotal-disc);
  const tax=+(taxable*(taxPct||0)/100);
  const total=+(taxable+tax);
  return { subtotal, disc, tax, total };
}

/* ---------- render root ---------- */
function render(){
  document.getElementById("orgName").textContent=State.settings.org;
  document.querySelectorAll("#tabs [data-tab]").forEach(b=>b.classList.toggle("on",b.dataset.tab===ui.tab));
  if(ui.tab==="sell") renderSell();
  else if(ui.tab==="sales") renderSales();
  else renderProducts();
}

/* ---------- SELL view ---------- */
let sellDiscount=0, sellTaxPct=null;
function renderSell(){
  if(sellTaxPct===null) sellTaxPct=State.settings.taxPct||0;
  const v=document.getElementById("view");
  const cur=C();
  // today totals
  const today=todayISO();
  let todaySum=0,todayCount=0;
  for(const s of State.sales){ if(localISO(new Date(s.createdAt))===today){ todaySum+=s.total; todayCount++; } }
  // product grid
  const q=ui.psearch.trim().toLowerCase();
  const prods=State.products.filter(p=>!q||(p.name+" "+(p.code||"")).toLowerCase().includes(q)).sort((a,b)=>a.name.localeCompare(b.name));
  const t=cartTotals(sellDiscount, sellTaxPct);
  const methods=State.settings.methods;
  const isCredit=ui.method==="Credit";

  v.innerHTML=`
    <div class="today-strip">
      <div class="t accent"><div class="l">Today's sales</div><div class="v">${cur} ${money(todaySum)}</div></div>
      <div class="t"><div class="l">Sales today</div><div class="v">${todayCount}</div></div>
    </div>

    <div class="card pad" style="margin-bottom:14px">
      <div class="section-label">Add products</div>
      <div class="search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="psearch" placeholder="Search products to add" value="${esc(ui.psearch)}" autocomplete="off"></div>
      ${prods.length?`<div class="pgrid">${prods.slice(0,24).map(p=>{
        const low=p.stock!=null&&p.stock<=2;
        return `<button class="pcard" data-add="${p.id}"><span class="plus">+</span>
          <div class="nm">${esc(p.name)}</div><div class="pr">${cur} ${money(p.price)}</div>
          ${p.stock!=null?`<div class="st ${low?"low":""}">${p.stock} in stock</div>`:""}</button>`;
      }).join("")}</div>`:`<div style="font-size:13px;color:var(--muted);padding:6px 0">No products yet. Add them in the <b>Products</b> tab, or use “Custom item”.</div>`}
      <button class="btn sm" id="customItem" style="margin-top:12px">＋ Custom item</button>
    </div>

    <div class="card pad" style="margin-bottom:14px">
      <div class="section-label">Cart</div>
      ${ui.cart.length? ui.cart.map((l,i)=>`
        <div class="cart-line">
          <div class="nm"><div class="t">${esc(l.name)}</div><div class="p">${cur} ${money(l.price)} each</div></div>
          <div class="stepper"><button data-cdec="${i}">−</button><span class="q">${l.qty}</span><button data-cinc="${i}">+</button></div>
          <div class="lt">${cur} ${money(l.qty*l.price)}</div>
          <button class="rm" data-crm="${i}">✕</button>
        </div>`).join("") : `<div style="font-size:13.5px;color:var(--muted);padding:8px 0">Cart is empty. Tap a product above to add it.</div>`}

      ${ui.cart.length?`<div style="margin-top:12px">
        <div class="totrow"><span class="lab">Subtotal</span><span class="v">${cur} ${money(t.subtotal)}</span></div>
        <div class="totrow"><span class="lab">Discount</span><input class="inp small miniinp mono" id="discount" inputmode="decimal" value="${sellDiscount||""}" placeholder="0"></div>
        <div class="totrow"><span class="lab">Tax %</span><input class="inp small miniinp mono" id="taxpct" inputmode="decimal" value="${sellTaxPct||""}" placeholder="0"></div>
        <div class="totrow grand"><span class="lab">Total</span><span class="v">${cur} ${money(t.total)}</span></div>
      </div>`:""}
    </div>

    ${ui.cart.length?`<div class="card pad" style="margin-bottom:14px">
      <div class="section-label">Payment</div>
      <div class="chips" id="methods">${methods.map(m=>`<button class="chip ${m==="Credit"?"credit":""} ${ui.method===m?"on":""}" data-method="${esc(m)}">${esc(m)}</button>`).join("")}</div>
      ${!isCredit?`<div class="two" style="margin-top:14px">
        <label class="fld" style="margin:0"><span class="lt">Amount received</span><input class="inp mono" id="tendered" inputmode="decimal" placeholder="${money(t.total)}"></label>
        <label class="fld" style="margin:0"><span class="lt">Change</span><input class="inp mono" id="change" value="" readonly style="background:#F7F8F6"></label>
      </div>`:`<div class="hint" style="margin-top:12px">Credit sale — recorded as unpaid. Add customer below.</div>`}
      <div class="two" style="margin-top:12px">
        <label class="fld" style="margin:0"><span class="lt">Customer ${isCredit?"":"<span style='font-weight:400;color:var(--faint)'>(optional)</span>"}</span><input class="inp" id="custname" placeholder="Name"></label>
        <label class="fld" style="margin:0"><span class="lt">Phone <span style="font-weight:400;color:var(--faint)">(optional)</span></span><input class="inp" id="custphone" placeholder="0300…"></label>
      </div>
      <div style="display:flex;gap:10px;margin-top:16px">
        <button class="btn" id="clearCart" style="flex:0 0 auto">Clear</button>
        <button class="btn primary" id="checkout" style="flex:1;justify-content:center;font-size:15px;padding:13px">Complete sale · ${cur} ${money(t.total)}</button>
      </div>
    </div>`:""}
  `;

  // wire
  const ps=document.getElementById("psearch");
  ps.oninput=e=>{ ui.psearch=e.target.value; const s=e.target.selectionStart; renderSell(); const n=document.getElementById("psearch"); n.focus(); try{n.setSelectionRange(s,s);}catch(_){} };
  v.querySelectorAll("[data-add]").forEach(b=>b.onclick=()=>addToCart(b.dataset.add));
  document.getElementById("customItem").onclick=openCustomItem;
  v.querySelectorAll("[data-cinc]").forEach(b=>b.onclick=()=>{ ui.cart[+b.dataset.cinc].qty++; renderSell(); });
  v.querySelectorAll("[data-cdec]").forEach(b=>b.onclick=()=>{ const i=+b.dataset.cdec; ui.cart[i].qty--; if(ui.cart[i].qty<=0) ui.cart.splice(i,1); renderSell(); });
  v.querySelectorAll("[data-crm]").forEach(b=>b.onclick=()=>{ ui.cart.splice(+b.dataset.crm,1); renderSell(); });
  const disc=document.getElementById("discount"); if(disc) disc.oninput=e=>{ sellDiscount=parseFloat(e.target.value)||0; updateTotalsInline(); };
  const tax=document.getElementById("taxpct"); if(tax) tax.oninput=e=>{ sellTaxPct=parseFloat(e.target.value)||0; updateTotalsInline(); };
  v.querySelectorAll("[data-method]").forEach(b=>b.onclick=()=>{ ui.method=b.dataset.method; renderSell(); });
  const tend=document.getElementById("tendered"); if(tend) tend.oninput=()=>{ const t2=cartTotals(sellDiscount,sellTaxPct); const val=parseFloat(tend.value)||0; document.getElementById("change").value=val>=t2.total?money(val-t2.total):""; };
  const co=document.getElementById("checkout"); if(co) co.onclick=checkout;
  const cc=document.getElementById("clearCart"); if(cc) cc.onclick=()=>{ if(confirm("Clear the cart?")){ ui.cart=[]; sellDiscount=0; renderSell(); } };
}
function updateTotalsInline(){ // light refresh of grand total + checkout label without losing focus
  const t=cartTotals(sellDiscount,sellTaxPct); const cur=C();
  const grand=document.querySelector(".totrow.grand .v"); if(grand) grand.textContent=`${cur} ${money(t.total)}`;
  const co=document.getElementById("checkout"); if(co) co.textContent=`Complete sale · ${cur} ${money(t.total)}`;
  const tend=document.getElementById("tendered"); const ch=document.getElementById("change");
  if(tend&&ch){ const val=parseFloat(tend.value)||0; ch.value=val>=t.total?money(val-t.total):""; }
}
function addToCart(pid){
  const p=State.products.find(x=>x.id===pid); if(!p) return;
  const ex=ui.cart.find(l=>l.productId===pid);
  if(ex) ex.qty++; else ui.cart.push({productId:pid,name:p.name,code:p.code||"",price:p.price,qty:1});
  renderSell();
}
function openCustomItem(){
  openScrim(`<div class="m-head"><h2>Custom item</h2><button class="btn ghost close" data-close style="margin-left:auto">✕</button></div>
    <div class="m-body">
      <label class="fld"><span class="lt">Item name</span><input class="inp" id="ci-name" placeholder="e.g. Repair charge"></label>
      <div class="two">
        <label class="fld"><span class="lt">Price</span><input class="inp mono" id="ci-price" inputmode="decimal" placeholder="0"></label>
        <label class="fld"><span class="lt">Qty</span><input class="inp mono" id="ci-qty" inputmode="numeric" value="1"></label>
      </div>
    </div>
    <div class="m-foot"><button class="btn" data-close>Cancel</button><button class="btn primary" id="ci-add">Add to cart</button></div>`);
  document.getElementById("ci-name").focus();
  document.getElementById("ci-add").onclick=()=>{
    const name=document.getElementById("ci-name").value.trim();
    const price=parseFloat(document.getElementById("ci-price").value)||0;
    const qty=Math.max(1,parseInt(document.getElementById("ci-qty").value,10)||1);
    if(!name){ flash("Enter a name"); return; }
    ui.cart.push({productId:null,name,code:"",price,qty}); closeScrim(); renderSell();
  };
}
function checkout(){
  const t=cartTotals(sellDiscount,sellTaxPct);
  if(!ui.cart.length){ flash("Cart is empty"); return; }
  const method=ui.method;
  const tenderedEl=document.getElementById("tendered");
  const tendered=tenderedEl?(parseFloat(tenderedEl.value)||0):0;
  const customer=(document.getElementById("custname")||{}).value?.trim()||"";
  const phone=(document.getElementById("custphone")||{}).value?.trim()||"";
  if(method==="Credit" && !customer){ flash("Enter customer name for credit sale"); return; }
  const paid = method!=="Credit";
  const change = paid && tendered>t.total ? tendered-t.total : 0;
  const sale={ id:uid(), invoice:invNo(State.settings.nextInvoice), createdAt:Date.now(),
    items:ui.cart.map(l=>({name:l.name,code:l.code,qty:l.qty,price:l.price})),
    subtotal:t.subtotal, discount:t.disc, taxPct:sellTaxPct||0, tax:t.tax, total:t.total,
    method, paid, tendered:paid?tendered:0, change, customer, phone, note:"" };
  State.sales.unshift(sale);
  State.settings.nextInvoice++;
  // reduce stock for tracked products
  for(const l of ui.cart){ if(l.productId){ const p=State.products.find(x=>x.id===l.productId); if(p&&p.stock!=null) p.stock=Math.max(0,p.stock-l.qty); } }
  persist();
  ui.cart=[]; sellDiscount=0;
  showReceipt(sale);
}

/* ---------- receipt ---------- */
function receiptText(sale){
  const cur=C(); const lines=[];
  lines.push(State.settings.org);
  lines.push("Receipt "+sale.invoice);
  lines.push(new Date(sale.createdAt).toLocaleString());
  lines.push("------------------------------");
  for(const it of sale.items){ lines.push(`${it.qty} x ${it.name}`); lines.push(`     ${cur} ${money(it.qty*it.price)}`); }
  lines.push("------------------------------");
  lines.push(`Subtotal: ${cur} ${money(sale.subtotal)}`);
  if(sale.discount) lines.push(`Discount: -${cur} ${money(sale.discount)}`);
  if(sale.tax) lines.push(`Tax (${sale.taxPct}%): ${cur} ${money(sale.tax)}`);
  lines.push(`TOTAL: ${cur} ${money(sale.total)}`);
  lines.push(`Paid by: ${sale.method}${sale.paid?"":" (UNPAID)"}`);
  if(sale.paid && sale.tendered){ lines.push(`Received: ${cur} ${money(sale.tendered)}  Change: ${cur} ${money(sale.change)}`); }
  if(State.settings.receiptFooter) lines.push(State.settings.receiptFooter);
  return lines.join("\n");
}

function printReceipt(sale){

function pdfReceipt(sale){
  if(!(window.jspdf&&window.jspdf.jsPDF)){ flash("PDF engine loading — try again"); return; }
  const { jsPDF }=window.jspdf; const cur=C();
  const doc=new jsPDF({unit:"pt",format:[220, 560]}); // narrow receipt
  let y=28; const L=14, R=206;
  doc.setFont("courier","bold"); doc.setFontSize(12); doc.text(State.settings.org, 110, y, {align:"center"}); y+=16;
  doc.setFont("courier","normal"); doc.setFontSize(8);
  doc.text(`Receipt ${sale.invoice}`,110,y,{align:"center"}); y+=11;
  doc.text(new Date(sale.createdAt).toLocaleString(),110,y,{align:"center"}); y+=12;
  if(sale.customer){ doc.text(`Customer: ${sale.customer}`,110,y,{align:"center"}); y+=12; }
  doc.text("------------------------------",110,y,{align:"center"}); y+=12;
  doc.setFontSize(9);
  for(const it of sale.items){ doc.text(`${it.qty} x ${it.name}`.slice(0,30),L,y); doc.text(`${money(it.qty*it.price)}`,R,y,{align:"right"}); y+=13; }
  doc.setFontSize(8); doc.text("------------------------------",110,y,{align:"center"}); y+=13;
  const row=(a,b,bold)=>{ doc.setFont("courier",bold?"bold":"normal"); doc.setFontSize(bold?11:9); doc.text(a,L,y); doc.text(b,R,y,{align:"right"}); y+=bold?16:13; };
  row("Subtotal",`${cur} ${money(sale.subtotal)}`);
  if(sale.discount) row("Discount",`-${cur} ${money(sale.discount)}`);
  if(sale.tax) row(`Tax ${sale.taxPct}%`,`${cur} ${money(sale.tax)}`);
  row("TOTAL",`${cur} ${money(sale.total)}`,true);
  doc.setFont("courier","normal"); doc.setFontSize(9);
  row("Paid by", sale.method+(sale.paid?"":" (UNPAID)"));
  if(sale.paid&&sale.tendered){ row("Received",`${cur} ${money(sale.tendered)}`); row("Change",`${cur} ${money(sale.change)}`); }
  y+=6; doc.setFontSize(8); if(State.settings.receiptFooter) doc.text(State.settings.receiptFooter,110,y,{align:"center"});
  doc.save(`${sale.invoice}.pdf`);
}

/* ---------- SALES view ---------- */
function renderSales(){
  const v=document.getElementById("view"); const cur=C();
  const q=ui.search.trim().toLowerCase();
  let list=State.sales.slice();
  if(q) list=list.filter(s=>(s.invoice+" "+(s.customer||"")+" "+s.items.map(i=>i.name).join(" ")).toLowerCase().includes(q));
  // stats
  const today=todayISO(); let tSum=0,tCnt=0,allSum=0;
  for(const s of State.sales){ allSum+=s.total; if(localISO(new Date(s.createdAt))===today){ tSum+=s.total; tCnt++; } }
  // group by day
  const byDay={};
  for(const s of list){ const d=localISO(new Date(s.createdAt)); (byDay[d]=byDay[d]||[]).push(s); }
  const days=Object.keys(byDay).sort((a,b)=>b.localeCompare(a));

  let html=`<div class="today-strip">
    <div class="t accent"><div class="l">Today</div><div class="v">${cur} ${money(tSum)}</div></div>
    <div class="t"><div class="l">Sales today</div><div class="v">${tCnt}</div></div>
    <div class="t"><div class="l">All-time</div><div class="v">${cur} ${money(allSum)}</div></div>
  </div>
  <div class="search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="ssearch" placeholder="Search invoice, customer or item" value="${esc(ui.search)}" autocomplete="off"></div>`;

  if(State.sales.length===0){
    html+=`<div class="card"><div class="empty"><div class="big grot">No sales yet</div><p>Go to the <b>Sell</b> tab, add items to the cart and complete a sale — it'll appear here with a receipt.</p></div></div>`;
  }else if(days.length===0){
    html+=`<div class="card"><div class="empty"><div class="big grot">No matches</div></div></div>`;
  }else{
    for(const d of days){
      const rows=byDay[d]; const dayTot=rows.reduce((s,x)=>s+x.total,0);
      const dd=new Date(d+"T00:00:00");
      html+=`<div class="day-head"><span class="d">${d===today?"Today":dd.toLocaleDateString(undefined,{weekday:"short",day:"numeric",month:"short"})}</span><span class="tot">${cur} ${money(dayTot)}</span></div><div class="card">`;
      for(const s of rows){
        html+=`<div class="sale-row" data-sale="${s.id}">
          <div class="inv">${esc(s.invoice)}</div>
          <div class="mid"><div class="it">${esc(s.items.map(i=>`${i.qty}× ${i.name}`).join(", "))}</div>
            <div class="mt">${new Date(s.createdAt).toLocaleTimeString([], {hour:"numeric",minute:"2-digit"})} · <span class="tag ${s.paid?"cash":"credit"}">${esc(s.method)}${s.paid?"":" · unpaid"}</span>${s.customer?" · "+esc(s.customer):""}</div>
          </div>
          <div class="amt">${cur} ${money(s.total)}</div>
        </div>`;
      }
      html+=`</div>`;
    }
  }
  v.innerHTML=html;
  const ss=document.getElementById("ssearch"); if(ss) ss.oninput=e=>{ ui.search=e.target.value; const p=e.target.selectionStart; renderSales(); const n=document.getElementById("ssearch"); if(n){n.focus(); try{n.setSelectionRange(p,p);}catch(_){}} };
  v.querySelectorAll("[data-sale]").forEach(r=>r.onclick=()=>openSale(State.sales.find(s=>s.id===r.dataset.sale)));

/* ---------- import / export ---------- */
function buildSalesCsv(){
  const rows=[["Invoice","Date","Customer","Items","Subtotal","Discount","Tax","Total","Method","Paid"]];
  for(const s of State.sales){ rows.push([s.invoice,new Date(s.createdAt).toLocaleString(),s.customer||"",s.items.map(i=>`${i.qty}x ${i.name}`).join("; "),s.subtotal.toFixed(2),(s.discount||0).toFixed(2),(s.tax||0).toFixed(2),s.total.toFixed(2),s.method,s.paid?"Yes":"No"]); }
  return rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\r\n");
}
function downloadBlob(b,n){ const u=URL.createObjectURL(b); const a=document.createElement("a"); a.href=u; a.download=n; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(u),1000); }
function exportCsv(){ downloadBlob(new Blob([buildSalesCsv()],{type:"text/csv"}),`sales-${todayISO()}.csv`); toast("Sales CSV exported"); }
function exportJson(){ downloadBlob(new Blob([JSON.stringify(State,null,2)],{type:"application/json"}),`register-backup-${todayISO()}.json`); toast("Backup downloaded"); }
function importJson(file){ const r=new FileReader(); r.onload=()=>{ try{ const d=JSON.parse(r.result); if(!Array.isArray(d.sales)||!Array.isArray(d.products)) throw 0; if(!confirm("Replace all POS data with this backup?")) return; State.settings=Object.assign(State.settings,d.settings||{}); State.products=d.products||[]; State.sales=d.sales||[]; persist(); render(); toast("Backup restored"); }catch(e){ flash("Not a valid Register backup"); } }; r.readAsText(file); }

/* ---------- folder auto-save ---------- */
const FS_SUPPORTED=(typeof window!=="undefined" && "showDirectoryPicker" in window);
let dirHandle=null,fsTimer=null,fsLastSaved=null;
const DATA_FILE="register-pos.json",CSV_FILE="sales.csv";
function idb(op,val){ return new Promise(res=>{ try{ const r=indexedDB.open("register-fs",1); r.onupgradeneeded=()=>r.result.createObjectStore("h"); r.onerror=()=>res(null); r.onsuccess=()=>{ const db=r.result; const tx=db.transaction("h",op==="get"?"readonly":"readwrite"); const st=tx.objectStore("h"); let rq=op==="get"?st.get("dir"):op==="set"?st.put(val,"dir"):st.delete("dir"); rq.onsuccess=()=>{ const out=op==="get"?rq.result:true; tx.oncomplete=()=>{db.close();res(out);}; }; rq.onerror=()=>{db.close();res(null);}; }; }catch(e){ res(null); } }); }
async function ensurePerm(h){ try{ const o={mode:"readwrite"}; if((await h.queryPermission(o))==="granted") return true; if((await h.requestPermission(o))==="granted") return true; }catch(e){} return false; }
async function writeFile(dir,name,text){ const fh=await dir.getFileHandle(name,{create:true}); const w=await fh.createWritable(); await w.write(text); await w.close(); }
async function writeToFolder(immediate){ if(!dirHandle) return; const doWrite=async()=>{ if(!(await ensurePerm(dirHandle))){ setAutoSaveState("warn"); return; } try{ await writeFile(dirHandle,DATA_FILE,JSON.stringify(State,null,2)); await writeFile(dirHandle,CSV_FILE,buildSalesCsv()); fsLastSaved=new Date(); setAutoSaveState("on"); }catch(e){ setAutoSaveState("warn"); } }; clearTimeout(fsTimer); if(immediate) return doWrite(); fsTimer=setTimeout(doWrite,500); }
async function pickFolder(){ if(!FS_SUPPORTED){ flash("Folder auto-save needs Chrome or Edge"); return; } try{ const h=await window.showDirectoryPicker({mode:"readwrite",id:"register-autosave"}); dirHandle=h; await idb("set",h); State.settings.autoSaveFolder=h.name; persist(); await writeToFolder(true); toast(`Auto-saving to “${h.name}”`); }catch(e){ if(e&&e.name==="AbortError") return; flash("Browser blocked folder access — open in Chrome/Edge."); } }
async function turnOffAutoSave(){ dirHandle=null; fsLastSaved=null; State.settings.autoSaveFolder=null; await idb("del"); persist(); setAutoSaveState("off"); toast("Auto-save to folder off"); }
function setAutoSaveState(state){ const btn=document.getElementById("autoSaveBtn"),note=document.getElementById("autoSaveNote"); if(!btn) return; const folder=State.settings.autoSaveFolder; const dot=c=>`<span class="as-dot ${c}"></span>`;
  if(state==="on"){ btn.innerHTML=dot("on")+`Saving to “${esc(folder||"folder")}”`; note.textContent=fsLastSaved?`Folder updated ${fsLastSaved.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"})}`:""; }
  else if(state==="warn"){ btn.innerHTML=dot("warn")+`Reconnect folder`; note.textContent=""; }
  else{ btn.innerHTML=dot("off")+`Auto-save to folder`; note.textContent=FS_SUPPORTED?"":"Open in Chrome/Edge to save into a folder"; } }
function openAutoSaveMenu(){ openScrim(`<div class="m-head"><h2>Folder auto-save</h2><button class="btn ghost close" data-close style="margin-left:auto">✕</button></div><div class="m-body"><p style="font-size:13.5px;color:var(--muted);margin:0">Saving to “${esc(State.settings.autoSaveFolder||"folder")}”. Files kept current: ${DATA_FILE} and ${CSV_FILE}.</p></div><div class="m-foot"><button class="btn danger" id="as-off" style="margin-right:auto">Turn off</button><button class="btn" data-close>Close</button><button class="btn primary" id="as-change">Change folder</button></div>`);
  document.getElementById("as-off").onclick=()=>{ turnOffAutoSave(); closeScrim(); }; document.getElementById("as-change").onclick=()=>{ closeScrim(); pickFolder(); }; }
function onAutoSaveClick(){ if(dirHandle&&State.settings.autoSaveFolder){ ensurePerm(dirHandle).then(ok=>{ if(ok) writeToFolder(true); openAutoSaveMenu(); }); } else pickFolder(); }
function applyLoaded(d){ if(!d) return; State.settings=Object.assign(State.settings,d.settings||{}); for(const k of Object.keys(State)){ if(k!=="settings"&&Array.isArray(State[k])&&Array.isArray(d[k])) State[k]=d[k]; } }
async function loadFromFolderAndSync(){ let loaded=false; try{ const fh=await dirHandle.getFileHandle(DATA_FILE); const text=await (await fh.getFile()).text(); const d=JSON.parse(text); const ft=(d.settings&&d.settings.updatedAt)||0, lt=(State.settings&&State.settings.updatedAt)||0; if(ft>lt){ applyLoaded(d); render(); loaded=true; } }catch(e){} fsLastSaved=new Date(); setAutoSaveState("on"); writeToFolder(true); if(loaded) toast("Loaded latest from your folder"); }
async function autoConnectFolder(){ setAutoSaveState("off"); if(!FS_SUPPORTED) return; const h=await idb("get"); if(!h) return; dirHandle=h; let perm="prompt"; try{ perm=await h.queryPermission({mode:"readwrite"}); }catch(e){} if(perm==="granted"){ await loadFromFolderAndSync(); } else { dirHandle=null; setAutoSaveState("off"); } }

/* ---------- install ---------- */
let deferredPrompt=null; const installBtn=document.getElementById("installBtn");
const isStandalone=()=>(window.matchMedia&&window.matchMedia("(display-mode: standalone)").matches)||window.navigator.standalone===true;
const isIOS=()=>/iphone|ipad|ipod/i.test(navigator.userAgent);
window.addEventListener("beforeinstallprompt",e=>{ e.preventDefault(); deferredPrompt=e; if(!isStandalone()) installBtn.style.display="inline-flex"; });
window.addEventListener("appinstalled",()=>{ installBtn.style.display="none"; deferredPrompt=null; toast("App installed"); });
installBtn.onclick=async()=>{ if(deferredPrompt){ deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt=null; installBtn.style.display="none"; } else openInstallHelp(); };
function openInstallHelp(){ const ios=isIOS(); const steps=ios?[`Tap <b>Share</b> <span class="kbd">⬆︎</span> in Safari.`,`Tap <b>Add to Home Screen</b>.`,`Tap <b>Add</b>.`]:[`Open Chrome menu <span class="kbd">⋮</span>.`,`Tap <b>Install app</b> / <b>Add to Home screen</b>.`,`Confirm.`];
  openScrim(`<div class="m-head"><h2>Install app</h2><button class="btn ghost close" data-close style="margin-left:auto">✕</button></div><div class="m-body"><p style="font-size:13.5px;color:var(--muted);margin:0 0 6px">Add it to your ${ios?"iPhone":"phone"}'s home screen.</p><ol class="ios-steps">${steps.map(x=>`<li><span>${x}</span></li>`).join("")}</ol></div><div class="m-foot"><button class="btn primary" data-close>Got it</button></div>`); }
if(!isStandalone()&&isIOS()) installBtn.style.display="inline-flex";

/* ---------- modal + toast ---------- */
const scrim=document.getElementById("scrim");
function openScrim(html){ scrim.innerHTML=`<div class="modal">${html}</div>`; requestAnimationFrame(()=>scrim.classList.add("show")); scrim.querySelectorAll("[data-close]").forEach(b=>b.onclick=closeScrim); }
function closeScrim(){ scrim.classList.remove("show"); setTimeout(()=>{ if(!scrim.classList.contains("show")) scrim.innerHTML=""; },220); }
scrim.addEventListener("click",e=>{ if(e.target===scrim) closeScrim(); });
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeScrim(); });
let toastTimer=null;
function toast(m){ const t=document.getElementById("toast"); t.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>${esc(m)}`; t.style.background=""; t.classList.add("show"); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),2000); }
function flash(m){ const t=document.getElementById("toast"); t.textContent=m; t.style.background="var(--warn)"; t.classList.add("show"); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),2000); }

/* ---------- wire ---------- */
document.getElementById("tabs").addEventListener("click",e=>{ const b=e.target.closest("[data-tab]"); if(!b) return; ui.tab=b.dataset.tab; ui.search=""; render(); });
document.getElementById("settingsBtn").onclick=openSettings;
document.getElementById("exportCsvBtn").onclick=exportCsv;
document.getElementById("exportJsonBtn").onclick=exportJson;
document.getElementById("importBtn").onclick=()=>document.getElementById("importFile").click();
document.getElementById("importFile").addEventListener("change",e=>{ if(e.target.files[0]) importJson(e.target.files[0]); e.target.value=""; });
document.getElementById("autoSaveBtn").onclick=onAutoSaveClick;
document.getElementById("orgName").addEventListener("click",function(){ const n=prompt("Shop name",State.settings.org); if(n!=null&&n.trim()){ State.settings.org=n.trim(); persist(); render(); } });

(async function init(){ await load(); render(); autoConnectFolder(); updateStorageNote(); })();
</script>
<script>
/* ---------- Cloud sync (Firebase Firestore) ---------- */
(function(){
  var FB={apiKey:"AIzaSyAQXOHU-_vZQ6fXDjdJvcvBg8dMx01X_tc",authDomain:"shakeel-shop.firebaseapp.com",projectId:"shakeel-shop",storageBucket:"shakeel-shop.firebasestorage.app",messagingSenderId:"60087476008",appId:"1:60087476008:web:73f7c946ae62a687a3ba1d"};
  var APP_KEY="register", SHOP="main";
  var db=null, ready=false, pushTimer=null;
  function note(t){ var el=document.getElementById("storageNote"); if(el) el.innerHTML=t; }
  if(typeof firebase==="undefined"){ return; }        // SDK blocked/offline -> stay on-device
  try{
    firebase.initializeApp(FB);
    db=firebase.firestore();
    // suppress the on-device note once cloud is active
    if(typeof updateStorageNote==="function"){ var _u=updateStorageNote; updateStorageNote=function(){ if(window.__cloudActive) return; _u(); }; }
    firebase.auth().signInAnonymously().catch(function(){ note('<span style="color:var(--warn)">\u2601 Cloud sign-in off \u2014 enable Anonymous sign-in in Firebase. Saved on this device.</span>'); });
    firebase.auth().onAuthStateChanged(function(user){ if(user) start(); });
  }catch(e){ return; }
  function ref(){ return db.collection("shops").doc(SHOP).collection("apps").doc(APP_KEY); }
  function start(){
    window.__cloudActive=true; note("\u2601 Connecting\u2026");
    var _op=persist; persist=function(){ _op(); schedulePush(); };
    ref().onSnapshot(function(snap){
      window.__cloudActive=true;
      if(snap.exists){
        var d=snap.data()&&snap.data().state;
        if(d){
          var rt=(d.settings&&d.settings.updatedAt)||0;
          var lt=(State.settings&&State.settings.updatedAt)||0;
          if(rt>lt){ if(typeof applyLoaded==="function") applyLoaded(d); if(typeof render==="function") render(); try{lsSave();}catch(_){} }
        }
        ready=true; note("\u2601 Synced across your devices.");
      }else{ ready=true; pushNow(); }
    }, function(){ note('\u2601 Offline \u2014 saved on this device.'); });
  }
  function schedulePush(){ if(!ready) return; clearTimeout(pushTimer); pushTimer=setTimeout(pushNow,400); }
  function pushNow(){
    if(!db) return;
    try{ if(!State.settings.updatedAt) State.settings.updatedAt=Date.now();
      ref().set({state:State, ts:Date.now()}).then(function(){ note("\u2601 Synced across your devices."); })
        .catch(function(){ note('\u2601 Cloud save failed \u2014 saved on this device.'); });
    }catch(e){}
  }
})();
</script>
