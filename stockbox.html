<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F5F6F3; --panel:#FFFFFF; --ink:#0F1917; --muted:#6B7975; --faint:#9AA6A2;
    --line:#E4E8E4; --line-strong:#D2D8D3; --green:#0E4F44; --green-hi:#0A3E35; --green-soft:#E6F0EC;
    --paid:#2E7D5B; --warn:#B0492C; --warn-soft:#F8EAE4; --gold:#B08A3E;
    --shadow:0 1px 2px rgba(22,33,31,.04),0 8px 24px rgba(22,33,31,.06);
    --radius:14px; --ease:cubic-bezier(.22,.61,.36,1); --spring:cubic-bezier(.34,1.56,.64,1);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{background:var(--paper);color:var(--ink);font-family:"Inter",system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;line-height:1.5;min-height:100vh;overscroll-behavior-y:none}
  .mono{font-family:"JetBrains Mono",ui-monospace,monospace;font-variant-numeric:tabular-nums}
  .grot{font-family:"Space Grotesk",system-ui,sans-serif}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;-webkit-tap-highlight-color:transparent}
  :focus-visible{outline:2px solid var(--green);outline-offset:2px;border-radius:6px}

  .wrap{max-width:1120px;margin:0 auto;padding:0 20px 80px;padding-left:calc(20px + env(safe-area-inset-left));padding-right:calc(20px + env(safe-area-inset-right));padding-bottom:calc(80px + env(safe-area-inset-bottom))}
  header.top{position:sticky;top:0;z-index:20;background:rgba(244,245,242,.85);backdrop-filter:saturate(180%) blur(10px);border-bottom:1px solid var(--line)}
  .top-inner{max-width:1120px;margin:0 auto;padding:14px 20px;padding-top:calc(14px + env(safe-area-inset-top));display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .brand{display:flex;align-items:baseline;gap:10px;margin-right:auto}
  .brand .mark{font-family:"Space Grotesk";font-weight:700;font-size:20px;letter-spacing:-.02em}
  .brand .mark b{color:var(--green)}
  .brand .org{font-size:12.5px;color:var(--muted);border-left:1px solid var(--line-strong);padding-left:10px;max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:text}
  .actions{display:flex;gap:8px;flex-wrap:wrap}
  .btn{display:inline-flex;align-items:center;gap:7px;font-size:13.5px;font-weight:600;padding:9px 14px;border-radius:10px;border:1px solid var(--line-strong);background:var(--panel);color:var(--ink);transition:.15s;white-space:nowrap;user-select:none}
  .btn:hover{border-color:var(--faint);transform:translateY(-1px)}
  .btn:active{transform:translateY(0)}
  .btn.primary{background:var(--green);color:#fff;border-color:var(--green)}
  .btn.primary:hover{background:var(--green-hi)}
  .btn.ghost{border-color:transparent;background:transparent;color:var(--muted);padding:9px 10px}
  .btn.ghost:hover{background:var(--line);color:var(--ink)}
  .btn.danger{color:var(--warn);border-color:transparent}
  .btn.danger:hover{background:var(--warn-soft)}
  .btn.install{background:var(--gold);color:#26200E;border-color:var(--gold);font-weight:700}
  .btn.install:hover{background:#C79B4A;border-color:#C79B4A}
  .btn svg{width:16px;height:16px}
  .btn.sm{padding:6px 11px;font-size:12.5px}

  .summary{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin:26px 0 20px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);position:relative;overflow:hidden;transition:transform .25s var(--ease),box-shadow .25s var(--ease)}
  .stat:hover{transform:translateY(-2px);box-shadow:0 2px 4px rgba(22,33,31,.05),0 14px 34px rgba(22,33,31,.09)}
  .stat .lab{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
  .stat .val{font-size:24px;font-weight:600;margin-top:8px;letter-spacing:-.01em}
  .stat .sub{font-size:12px;color:var(--muted);margin-top:3px}
  .stat.accent{border-color:#D8C9A6;background:linear-gradient(180deg,#FCFAF4,#FFFFFF)}
  .stat.accent .val{color:var(--green)}
  .stat.warn .val{color:var(--warn)}
  .stat .tick{position:absolute;top:0;left:0;height:100%;width:3px}
  .stat.accent .tick{background:var(--gold)}.stat.warn .tick{background:var(--warn)}

  .toolbar{display:flex;gap:12px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
  .search{flex:1;min-width:200px;display:flex;align-items:center;gap:9px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:0 12px}
  .search:focus-within{border-color:var(--faint)}
  .search svg{width:16px;height:16px;color:var(--faint);flex-shrink:0}
  .search input{border:none;outline:none;background:none;font-family:inherit;font-size:14px;color:var(--ink);padding:11px 0;width:100%}
  .segmented{display:flex;background:var(--line);border-radius:10px;padding:3px;gap:2px}
  .segmented button{font-size:12.5px;font-weight:600;color:var(--muted);padding:7px 13px;border-radius:8px;transition:.15s;user-select:none}
  .segmented button.on{background:var(--panel);color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.06)}
  .seg-count{font-size:10.5px;opacity:.7;margin-left:5px}

  /* breadcrumb jump dropdown */
  .crumb-nav{display:inline-flex;align-items:center;gap:2px}
  .crumb-nav .arrow{width:28px;height:28px;display:grid;place-items:center;border:none;cursor:pointer;
    color:var(--green);background:var(--green-soft);border-radius:8px;transition:.12s}
  .crumb-nav .arrow:hover:not(:disabled){background:var(--green);color:#fff}
  .crumb-nav .arrow:disabled{opacity:.32;cursor:default}
  .crumb-nav .arrow svg{width:15px;height:15px}
  .crumb-jump{position:relative;display:inline-flex}
  .crumb-jump>button{display:inline-flex;align-items:center;gap:3px;color:var(--green);background:var(--green-soft);
    border:none;cursor:pointer;padding:4px 7px;border-radius:8px;font-weight:700;font-size:13.5px;transition:.12s}
  .crumb-jump>button:hover{background:var(--green);color:#fff}
  .crumb-jump>button svg{width:13px;height:13px}
  .cj-menu{position:absolute;top:calc(100% + 6px);left:0;z-index:40;background:var(--panel);border:1px solid var(--line);
    border-radius:12px;box-shadow:0 14px 40px rgba(22,33,31,.22);min-width:190px;max-height:280px;overflow:auto;padding:6px;display:none}
  .cj-menu.on{display:block}

<script>
/* ===== BACKUP (StockBox) auto snapshots ===== */
function scheduleAutoBackup(){ clearTimeout(window.__sbBkT); window.__sbBkT=setTimeout(function(){ (window.requestIdleCallback||function(cb){cb();})(function(){ _sbAutoBackup(); }); },4000); }
function _sbDay(){ var d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function _sbBkLoad(){ try{ return JSON.parse(localStorage.getItem("stockbox:backups")||"[]"); }catch(_){ return []; } }
function _sbBkSaveL(l){ try{ localStorage.setItem("stockbox:backups",JSON.stringify(l)); }catch(_){} }
var _sbkSig=""; function _sbAutoBackup(){ try{ var sig=(State.items||[]).length+"|"+(State.locations||[]).length; if(sig===_sbkSig) return; _sbkSig=sig; var list=_sbBkLoad(), tk=_sbDay(); var data=JSON.stringify(State); var ex=list.find(function(b){return b.day===tk;}); if(ex){ex.at=Date.now();ex.n=(State.items||[]).length;ex.data=data;} else list.unshift({day:tk,at:Date.now(),n:(State.items||[]).length,data:data}); list=list.slice(0,14); _sbBkSaveL(list); }catch(_){} }
function _sbMergeRestore(inc){ if(!inc) return;
  function byId(a,c){ a=a||[];c=c||[]; var m={},o=[]; c.concat(a).forEach(function(x){ if(x&&x.id!=null){ var k=String(x.id); if(!(k in m)){m[k]=x;o.push(k);} else { var cur=m[k],ax=(x.updatedAt||x.createdAt||0),bx=(cur.updatedAt||cur.createdAt||0); if(ax>=bx)m[k]=x; } } }); return o.map(function(k){return m[k];}); }
  State.items=byId(State.items,inc.items); State.locations=byId(State.locations,inc.locations);
  if(typeof persist==="function") persist(); if(typeof render==="function") render(); if(window.__pushNow) window.__pushNow(); }
function openBackupSheet(){
  var list=_sbBkLoad();
  var wrap=document.getElementById("sbBkScrim"), sheet=document.getElementById("sbBkSheet");
  sheet.innerHTML='<h3 class="grot" style="font-size:17px;margin-bottom:12px">🛟 Backup &amp; Restore</h3>'
    +'<div style="font-size:12.5px;color:var(--muted,#6E7673);margin-bottom:14px">Your stock is saved on this device, in the cloud, and in these snapshots.</div>'
    +'<button class="btn primary" id="sbbk-dl" style="width:100%;margin-bottom:8px">⬇ Download backup file now</button>'
    +'<label class="btn" style="width:100%;margin-bottom:14px;display:flex;justify-content:center;cursor:pointer">⬆ Restore from a file<input type="file" id="sbbk-file" accept=".json,application/json" style="display:none"></label>'
    +'<div style="font-size:11px;color:var(--muted,#6E7673);letter-spacing:.08em;margin-bottom:8px">AUTO SNAPSHOTS ('+list.length+')</div>'
    +(list.length?list.map(function(b){return '<div style="display:flex;align-items:center;gap:10px;padding:10px;border:1px solid var(--line,#E2E7E4);border-radius:10px;margin-bottom:8px"><div style="flex:1"><b>'+b.day+'</b><div style="font-size:11.5px;color:var(--muted,#6E7673)">'+b.n+' item lines</div></div><button class="btn sm" data-rest="'+b.day+'">Restore</button></div>';}).join(""):'<div style="text-align:center;color:var(--muted,#6E7673);padding:16px">Snapshots will appear as you use the app.</div>')
    +'<button class="btn" id="sbbk-x" style="width:100%;margin-top:12px">Close</button>';
  wrap.style.display="flex";
  document.getElementById("sbbk-x").onclick=function(){ wrap.style.display="none"; };
  document.getElementById("sbbk-dl").onclick=function(){ try{ var blob=new Blob([JSON.stringify({app:"stockbox",at:Date.now(),items:State.items,locations:State.locations,settings:State.settings},null,1)],{type:"application/json"}); var a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="shakeel-STOCKBOX-backup-"+_sbDay()+".json"; a.click(); toast("Backup file downloaded"); }catch(e){} };
  document.getElementById("sbbk-file").onchange=function(e){ var f=e.target.files[0]; if(!f) return; var r=new FileReader(); r.onload=function(){ try{ var j=JSON.parse(r.result); if(!confirm("Restore from this file? It ADDS back missing stock, never deletes.")) return; _sbMergeRestore(j.state||j); wrap.style.display="none"; toast("Restored from file"); }catch(_){ flash&&flash("Not a valid backup file"); } }; r.readAsText(f); };
  sheet.querySelectorAll("[data-rest]").forEach(function(b){ b.onclick=function(){ var snap=_sbBkLoad().find(function(x){return x.day===b.dataset.rest;}); if(!snap) return; if(!confirm("Restore from "+b.dataset.rest+"? It ADDS back missing stock, never deletes.")) return; try{ _sbMergeRestore(JSON.parse(snap.data)); wrap.style.display="none"; toast("Restored from "+b.dataset.rest); }catch(_){} }; });
}
document.addEventListener("DOMContentLoaded",function(){ var b=document.getElementById("sbBkBtn"); if(b) b.onclick=openBackupSheet; });
</script>

<script>
/* ============================================================
   Inventory Placement — "StockBox"
   Boxes -> Sub-boxes -> items (pieces). Explorer-style.
   Saves to window.storage + localStorage + optional folder.
   ============================================================ */
const KEY = "inventory:data:v1";
const hasStore = (typeof window!=="undefined" && window.storage && typeof window.storage.get==="function");

const State = {
  settings:{ org:"Shakeel Electronics", lowStock:2, autoSaveFolder:null },
  locations:[], // {id,name,parentId,note,createdAt}
  items:[],     // {id,name,code,locationId,qty,note,createdAt,updatedAt}
};
let ui = { search:"", filter:"all", currentLoc:null, flashItemId:null };

/* ---------- storage (3 layers) ---------- */
async function load(){
  let d=null;
  if(hasStore){ try{ const r=await window.storage.get(KEY); if(r&&r.value) d=JSON.parse(r.value); }catch(e){} }
  if(!d) d=lsLoad();
  if(d){
    State.settings=Object.assign(State.settings,d.settings||{});
    State.locations=d.locations||[];
    State.items=d.items||[];
  }
}
function lsLoad(){ try{ const s=localStorage.getItem(KEY); return s?JSON.parse(s):null; }catch(e){ return null; } }
function lsSave(){ try{ localStorage.setItem(KEY, JSON.stringify(State)); return true; }catch(e){ return false; } }
let saveTimer=null, storageOK=true;
async function save(){
  let ok=false;
  if(hasStore){ try{ await window.storage.set(KEY, JSON.stringify(State)); ok=true; }catch(e){} }
  if(lsSave()) ok=true;
  storageOK=ok; updateStorageNote();
}
function persist(){ State.settings.updatedAt=Date.now(); clearTimeout(saveTimer); saveTimer=setTimeout(save,120); if(dirHandle) writeToFolder(false); }
function updateStorageNote(){
  const el=document.getElementById("storageNote"); if(!el) return;
  if(!storageOK){ el.innerHTML=`<span style="color:var(--warn)">⚠ Couldn't save on this device — use “Backup data”. (Private mode can block storage.)</span>`; }
  else if(dirHandle && State.settings.autoSaveFolder){ el.textContent=""; }
  else { el.textContent="Saved automatically on this device."; }
}

/* ---------- helpers ---------- */
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
function esc(s){ return String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
const locById=id=>State.locations.find(l=>l.id===id)||null;
const childrenOf=pid=>State.locations.filter(l=>(l.parentId||null)===(pid||null)).sort((a,b)=>a.name.localeCompare(b.name,undefined,{numeric:true}));
const itemsDirect=lid=>State.items.filter(i=>i.locationId===lid);
function pathOf(id){ const out=[]; let c=locById(id); while(c){ out.unshift(c); c=locById(c.parentId); } return out; }
function descendantIds(id){ let out=[]; for(const ch of childrenOf(id)){ out.push(ch.id); out=out.concat(descendantIds(ch.id)); } return out; }
function aggregate(id){ // recursive pieces/lines within a location
  let pieces=0, lines=0;
  const ids=[id,...descendantIds(id)];
  for(const it of State.items){ if(ids.includes(it.locationId)){ pieces+=it.qty; lines++; } }
  return { pieces, lines, subboxes: childrenOf(id).length };
}
const isLow=q=>q<=(State.settings.lowStock||0);
function flattenLocations(){ // for pickers: [{id,name,depth}]
  const out=[];
  const walk=(pid,depth)=>{ for(const l of childrenOf(pid)){ out.push({id:l.id,name:l.name,depth}); walk(l.id,depth+1); } };
  walk(null,0); return out;
}
function locPathText(id){ return pathOf(id).map(l=>l.name).join(" › "); }

/* ---------- render ---------- */
function render(){
  document.getElementById("orgName").textContent=State.settings.org;
  renderSummary(); renderFilters(); renderMain();
}

  const pieces=State.items.reduce((s,i)=>s+i.qty,0);
  const products=new Set(State.items.map(i=>(i.code||i.name).toLowerCase().trim())).size;
  const low=State.items.filter(i=>isLow(i.qty)).length;
  const stockValue=State.items.reduce((s,i)=>s+(i.qty||0)*(i.price||0),0);

    <div class="stat accent"><span class="tick"></span><div class="lab">Total pieces</div><div class="val mono">${pieces.toLocaleString()}</div><div class="sub">${State.items.length} item line${State.items.length===1?"":"s"}</div></div>

function renderFilters(){
  const low=State.items.filter(i=>isLow(i.qty)).length;

  document.getElementById("filters").innerHTML=defs.map(([k,l])=>`<button class="${ui.filter===k?"on":""}" data-filter="${k}">${l}${k==="low"?`<span class="seg-count">${low}</span>`:""}</button>`).join("");

function renderMain(){
  const q=ui.search.trim().toLowerCase();
  if(q || ui.filter==="low" || ui.filter==="list"){ document.getElementById("crumbsWrap").innerHTML=""; renderFlat(q); }
  else { renderCrumbs(); renderExplorer(); }

function renderCrumbs(){
  const path=ui.currentLoc?pathOf(ui.currentLoc):[];
  let html=`<div class="crumbs"><a data-loc="root" class="${!ui.currentLoc?"here":""}">🏠 All boxes</a>`;
  path.forEach((l,i)=>{
    const last=(i===path.length-1);
    const sibs=childrenOf(l.parentId||null);
    // last crumb + has siblings → make it a jump dropdown to switch quickly
    if(last && sibs.length>1){
      const idx=sibs.findIndex(s=>s.id===l.id);
      const prevId=idx>0?sibs[idx-1].id:"";
      const nextId=idx<sibs.length-1?sibs[idx+1].id:"";
      html+=`<span class="sep">›</span><span class="crumb-nav">
        <button class="arrow" data-step="${prevId}" ${prevId?"":"disabled"} title="Previous sub-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <span class="crumb-jump">
          <button data-jump="${l.id}">${esc(l.name)}
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="cj-menu" id="cjMenu"></div>
        </span>
        <button class="arrow" data-step="${nextId}" ${nextId?"":"disabled"} title="Next sub-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </span>`;
    } else {
      html+=`<span class="sep">›</span><a data-loc="${l.id}" class="${last?"here":""}">${esc(l.name)}</a>`;
    }
  });
  html+=`</div>`;
  const w=document.getElementById("crumbsWrap"); w.innerHTML=html;
  w.querySelectorAll("[data-loc]").forEach(a=>a.onclick=()=>{ ui.currentLoc=a.dataset.loc==="root"?null:a.dataset.loc; renderMain(); });
  const jb=w.querySelector("[data-jump]");
  if(jb) jb.onclick=(e)=>{ e.stopPropagation(); openCrumbJump(jb.dataset.jump); };
  w.querySelectorAll("[data-step]").forEach(b=>b.onclick=(e)=>{
    e.stopPropagation(); const id=b.dataset.step; if(!id) return; ui.currentLoc=id; renderMain();
  });
}

function openCrumbJump(curId){
  const menu=document.getElementById("cjMenu"); if(!menu) return;
  const cur=locById(curId); if(!cur) return;
  const sibs=childrenOf(cur.parentId||null);
  const parentName=cur.parentId?locPathText(cur.parentId):"All boxes";
  function draw(filter){
    const f=(filter||"").toLowerCase().trim();
    const list=sibs.filter(s=>!f || s.name.toLowerCase().includes(f));
    let inner=`<input class="cj-search" id="cjSearch" placeholder="Type sub-box no…" autocomplete="off">`;
    if(!list.length){ inner+=`<div class="cj-empty">No match</div>`; }
    else inner+=list.map(s=>{
      const cnt=countIn(s.id);
      return `<div class="cj-item ${s.id===curId?"cur":""}" data-go="${s.id}">${esc(s.name)}<span class="cnt">${cnt.lines?cnt.lines+" item"+(cnt.lines===1?"":"s"):"empty"}</span></div>`;
    }).join("");
    menu.innerHTML=inner;
    const si=document.getElementById("cjSearch");
    si.oninput=()=>draw(si.value);
    si.onclick=(e)=>e.stopPropagation();
    // keep focus & caret
    si.focus(); si.value=filter||""; si.setSelectionRange(si.value.length,si.value.length);
    menu.querySelectorAll("[data-go]").forEach(el=>el.onclick=(e)=>{
      e.stopPropagation(); ui.currentLoc=el.dataset.go; closeCrumbJump(); renderMain();
    });
  }
  draw("");
  menu.classList.add("on");
  // close on outside click / Esc
  setTimeout(()=>{ document.addEventListener("click",cjOutside); document.addEventListener("keydown",cjEsc); },0);
}
function closeCrumbJump(){ const m=document.getElementById("cjMenu"); if(m) m.classList.remove("on"); document.removeEventListener("click",cjOutside); document.removeEventListener("keydown",cjEsc); }
function cjOutside(e){ if(!e.target.closest(".crumb-jump")) closeCrumbJump(); }
function cjEsc(e){ if(e.key==="Escape") closeCrumbJump(); }

function renderFlat(q){
  const board=document.getElementById("board");
  let list, mode = (ui.filter==="list" && !q) ? "list" : (ui.filter==="low" && !q ? "low" : "search");
  if(mode==="low"){ list=State.items.filter(i=>isLow(i.qty)); }
  else if(mode==="list"){ list=State.items.slice(); }
  else { list=State.items.filter(i=>{ const h=(i.name+" "+(i.code||"")+" "+locPathText(i.locationId)).toLowerCase(); return h.includes(q); }); }

  // list view sorts A->Z by name; others by qty (low first)
  if(mode==="list") list=list.slice().sort((a,b)=>a.name.localeCompare(b.name,undefined,{numeric:true}));
  else list=list.slice().sort((a,b)=>a.qty-b.qty || a.name.localeCompare(b.name));

  document.getElementById("countNote").textContent=`${list.length} ${mode==="list"?"items":"result"+(list.length===1?"":"s")}`;

  if(mode==="list"){
    const totPieces=list.reduce((s,i)=>s+(i.qty||0),0);
    const totVal=list.reduce((s,i)=>s+(i.qty||0)*(i.price||0),0);
    let html=`<div class="board-head" style="flex-wrap:wrap;gap:8px"><h2>📋 All products</h2>
      <div style="margin-left:auto;display:flex;gap:8px">

        <span><b style="color:var(--ink)">${totPieces.toLocaleString()}</b> total pieces</span>
        ${totVal>0?`<span>value <b style="color:var(--green)">Rs ${Math.round(totVal).toLocaleString()}</b></span>`:""}
      </div>`;
    if(!list.length){ html+=`<div class="empty"><div class="big grot">No products yet</div><p>Add items to your boxes and they'll all show here.</p></div>`; }

      // compact table: name | qty | location
      html+=`<div class="items" id="listTable">`;

    }

    const lc=document.getElementById("listCsv"); if(lc) lc.onclick=()=>csvAllProducts(list);
    return;

  const title=mode==="low"?"Low stock items":`Search results`;

    html+=`<div class="items">`;
    for(const it of list) html+=itemRowHTML(it,true);
    html+=`</div>`;
  }
  board.innerHTML=html; wireBoard();
}

/* print all-products master list (thermal-safe A4 PDF via jsPDF) */
function printAllProducts(list){
  if(!(window.jspdf&&window.jspdf.jsPDF)){ flash&&flash("Print engine loading — try again"); return; }
  const jsPDF=window.jspdf.jsPDF;
  const doc=new jsPDF({unit:"pt",format:"a4"});
  const W=595,M=40; let y=54;
  doc.setFont("helvetica","bold"); doc.setFontSize(16); doc.setTextColor(14,79,68);
  doc.text("STOCK LIST — ALL PRODUCTS",M,y); y+=6;
  doc.setDrawColor(176,138,62); doc.setLineWidth(2); doc.line(M,y,W-M,y); y+=18;
  doc.setFont("helvetica","normal"); doc.setFontSize(9); doc.setTextColor(110,118,115);
  doc.text("Shakeel Electronics · "+new Date().toLocaleDateString(),M,y);
  const totP=list.reduce((s,i)=>s+(i.qty||0),0);
  doc.text(list.length+" products · "+totP.toLocaleString()+" pieces",W-M,y,{align:"right"}); y+=16;
  // header row
  doc.setFillColor(14,79,68); doc.rect(M,y-11,W-2*M,18,"F");
  doc.setFont("helvetica","bold"); doc.setFontSize(9); doc.setTextColor(255,255,255);
  doc.text("PRODUCT",M+6,y+1); doc.text("CODE",270,y+1); doc.text("QTY",370,y+1,{align:"right"}); doc.text("LOCATION",395,y+1); y+=20;
  doc.setFont("helvetica","normal"); doc.setTextColor(26,33,31); doc.setFontSize(9);
  let zeb=0;
  for(const it of list){
    if(y>800){ doc.addPage(); y=54; }
    if(zeb%2){ doc.setFillColor(246,248,246); doc.rect(M,y-10,W-2*M,16,"F"); }
    doc.setTextColor(26,33,31); doc.text(String(it.name).slice(0,34),M+6,y);
    doc.setTextColor(110,118,115); doc.setFontSize(8.5);
    doc.text(String(it.code||"—").slice(0,16),270,y);
    doc.setTextColor(it.qty<=(State.settings.lowStock||0)?194:26, it.qty<=(State.settings.lowStock||0)?91:33, it.qty<=(State.settings.lowStock||0)?55:31);
    doc.setFont("helvetica","bold"); doc.text(String(it.qty||0),370,y,{align:"right"});
    doc.setFont("helvetica","normal"); doc.setTextColor(110,118,115); doc.setFontSize(8);
    doc.text(String(locPathText(it.locationId)||"—").slice(0,42),395,y);
    doc.setFontSize(9);
    y+=16; zeb++;
  }
  const url=doc.output("bloburl"); window.open(url,"_blank");
}
function csvAllProducts(list){
  let rows=[["Product","Code","Qty","Est price","Stock value","Location"]];
  list.forEach(it=>rows.push([it.name,it.code||"",it.qty||0,it.price||0,Math.round((it.qty||0)*(it.price||0)),locPathText(it.locationId)]));
  const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob=new Blob([csv],{type:"text/csv"}); const a=document.createElement("a");
  a.href=URL.createObjectURL(blob); a.download="stock-all-products.csv"; a.click();
}

/* ===== 3in x 1in location sticker (TLP 2844-Z thermal, pure black & white) ===== */
function printLocationSticker(itemId){
  const it=State.items.find(x=>x.id===itemId); if(!it){ flash("Item not found"); return; }
  if(!(window.jspdf&&window.jspdf.jsPDF)){ flash("Print engine still loading — try again"); return; }
  // Box number = the item's box/sub-box name; item code = code, else name
  const box=locById(it.locationId);
  const boxNo=box?String(box.name).trim():"—";
  const code=(it.code&&it.code.trim())?it.code.trim():it.name.trim();
  makeStickerPDF([{boxNo:boxNo, code:code}]);
}

/* build a 3in x 1in portrait-safe sticker; large NO + code, pure black on white */
function makeStickerPDF(rows){
  const jsPDF=window.jspdf.jsPDF;
  // Page is 3in wide x 1in tall. We keep it that exact size; printer feed handles the rest.
  const W=3, H=1; // inches
  const doc=new jsPDF({orientation:"landscape",unit:"in",format:[W,H]});
  rows.forEach((r,idx)=>{
    if(idx>0) doc.addPage([W,H],"landscape");
    drawSticker(doc,r,W,H);
  });
  const blob=doc.output("blob");
  const url=URL.createObjectURL(blob);
  const w=window.open(url,"_blank");
  if(!w) flash("Allow pop-ups to print the sticker");
  toast("Sticker ready — print at 3×1 in");
}

function drawSticker(doc,r,W,H){
  doc.setTextColor(0,0,0);
  const pad=0.08;
  // thin border so you can see the sticker edge (optional, pure black)
  doc.setLineWidth(0.012); doc.setDrawColor(0,0,0);
  doc.rect(pad*0.5,pad*0.5,W-pad,H-pad);

  // "NO" small label + big box number on the left
  doc.setFont("helvetica","bold");
  doc.setFontSize(11);
  doc.text("NO", pad+0.05, pad+0.18);
  // big box number
  let noSize=46;
  doc.setFontSize(noSize);
  let noStr=String(r.boxNo);
  // shrink if too wide for left ~1.15in column
  let maxNoW=1.15;
  while(doc.getTextWidth(noStr)>maxNoW && noSize>16){ noSize-=2; doc.setFontSize(noSize); }
  doc.text(noStr, pad+0.05, H-pad-0.14);

  // vertical divider
  const divX=pad+0.05+Math.max(maxNoW,doc.getTextWidth(noStr))+0.12;
  doc.setLineWidth(0.02);
  doc.line(divX, pad+0.12, divX, H-pad-0.12);

  // item code on the right, large, wrapped/auto-fit
  const rightX=divX+0.12;
  const rightW=W-pad-rightX-0.02;
  doc.setFont("helvetica","bold");
  let codeSize=34;
  doc.setFontSize(codeSize);
  let code=String(r.code);
  // auto-fit the code onto up to 2 lines
  function fitLines(txt,size){
    doc.setFontSize(size);
    const words=txt.split(/\s+/);
    let lines=[],cur="";
    for(const wd of words){
      const t=cur?cur+" "+wd:wd;
      if(doc.getTextWidth(t)<=rightW){ cur=t; }
      else { if(cur) lines.push(cur); cur=wd; }
    }
    if(cur) lines.push(cur);
    // if a single word is too long, hard-break it
    let out=[];
    for(const ln of lines){
      if(doc.getTextWidth(ln)<=rightW){ out.push(ln); continue; }
      let s=ln;
      while(doc.getTextWidth(s)>rightW && s.length>1){ 
        let cut=s.length-1;
        while(cut>1 && doc.getTextWidth(s.slice(0,cut))>rightW) cut--;
        out.push(s.slice(0,cut)); s=s.slice(cut);
      }
      if(s) out.push(s);
    }
    return out;
  }
  let lines=fitLines(code,codeSize);
  while(lines.length>2 && codeSize>12){ codeSize-=2; lines=fitLines(code,codeSize); }
  doc.setFontSize(codeSize);
  const lineH=codeSize/72*1.02;
  const blockH=lineH*lines.length;
  let cy=(H-blockH)/2 + lineH*0.75;
  lines.forEach(ln=>{ doc.text(ln, rightX, cy); cy+=lineH; });
}

/* ---------- import / export ---------- */
function buildCsv(){
  const rows=[["Product","Code","Location","Pieces","Note","Updated"]];
  for(const i of State.items){ rows.push([i.name,i.code||"",locPathText(i.locationId),i.qty,i.note||"", i.updatedAt?new Date(i.updatedAt).toISOString().slice(0,10):""]); }
  return rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\r\n");
}
function downloadBlob(blob,name){ const url=URL.createObjectURL(blob); const a=document.createElement("a"); a.href=url; a.download=name; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),1000); }
function exportCsv(){ downloadBlob(new Blob([buildCsv()],{type:"text/csv"}), `inventory-${new Date().toISOString().slice(0,10)}.csv`); toast("CSV exported"); }
function exportJson(){ downloadBlob(new Blob([JSON.stringify(State,null,2)],{type:"application/json"}), `stockbox-backup-${new Date().toISOString().slice(0,10)}.json`); toast("Backup downloaded"); }
function importJson(file){ const r=new FileReader(); r.onload=()=>{ try{ const d=JSON.parse(r.result); if(!Array.isArray(d.items)||!Array.isArray(d.locations)) throw 0; if(!confirm("Replace all current inventory with this backup?")) return; State.settings=Object.assign(State.settings,d.settings||{}); State.locations=d.locations||[]; State.items=d.items||[]; ui.currentLoc=null; persist(); render(); toast("Backup restored"); }catch(e){ flash("Not a valid StockBox backup"); } }; r.readAsText(file); }

/* ---------- folder auto-save ---------- */
const FS_SUPPORTED=(typeof window!=="undefined" && "showDirectoryPicker" in window);
let dirHandle=null, fsTimer=null, fsLastSaved=null;
const DATA_FILE="stockbox-inventory.json", CSV_FILE="inventory.csv";
function idb(op,val){ return new Promise(res=>{ try{ const r=indexedDB.open("stockbox-fs",1); r.onupgradeneeded=()=>r.result.createObjectStore("h"); r.onerror=()=>res(null); r.onsuccess=()=>{ const db=r.result; const tx=db.transaction("h",op==="get"?"readonly":"readwrite"); const st=tx.objectStore("h"); let rq= op==="get"?st.get("dir"):op==="set"?st.put(val,"dir"):st.delete("dir"); rq.onsuccess=()=>{ const out=op==="get"?rq.result:true; tx.oncomplete=()=>{db.close();res(out);}; }; rq.onerror=()=>{db.close();res(null);}; }; }catch(e){ res(null); } }); }
async function ensurePerm(h){ try{ const o={mode:"readwrite"}; if((await h.queryPermission(o))==="granted") return true; if((await h.requestPermission(o))==="granted") return true; }catch(e){} return false; }
async function writeFile(dir,name,text){ const fh=await dir.getFileHandle(name,{create:true}); const w=await fh.createWritable(); await w.write(text); await w.close(); }
async function writeToFolder(immediate){
  if(!dirHandle) return;
  const doWrite=async()=>{ if(!(await ensurePerm(dirHandle))){ setAutoSaveState("warn"); return; } try{ await writeFile(dirHandle,DATA_FILE,JSON.stringify(State,null,2)); await writeFile(dirHandle,CSV_FILE,buildCsv()); fsLastSaved=new Date(); setAutoSaveState("on"); }catch(e){ setAutoSaveState("warn"); } };
  clearTimeout(fsTimer); if(immediate) return doWrite(); fsTimer=setTimeout(doWrite,500);
}
async function pickFolder(){
  if(!FS_SUPPORTED){ flash("Folder auto-save needs Chrome or Edge"); return; }
  try{ const h=await window.showDirectoryPicker({mode:"readwrite",id:"stockbox-autosave"}); dirHandle=h; await idb("set",h); State.settings.autoSaveFolder=h.name; persist(); await writeToFolder(true); toast(`Auto-saving to “${h.name}”`); }
  catch(e){ if(e&&e.name==="AbortError") return; flash("Browser blocked folder access — open the file in Chrome/Edge."); }
}
async function turnOffAutoSave(){ dirHandle=null; fsLastSaved=null; State.settings.autoSaveFolder=null; await idb("del"); persist(); setAutoSaveState("off"); toast("Auto-save to folder off"); }
function setAutoSaveState(state){
  const btn=document.getElementById("autoSaveBtn"), note=document.getElementById("autoSaveNote"); if(!btn) return;
  const folder=State.settings.autoSaveFolder; const dot=c=>`<span class="as-dot ${c}"></span>`;
  if(state==="on"){ btn.innerHTML=dot("on")+`Saving to “${esc(folder||"folder")}”`; note.textContent=fsLastSaved?`Folder file updated ${fsLastSaved.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"})}`:""; }
  else if(state==="warn"){ btn.innerHTML=dot("warn")+`Reconnect folder`; note.textContent="Click to grant folder access again"; }
  else{ btn.innerHTML=dot("off")+`Auto-save to folder`; note.textContent=FS_SUPPORTED?"":"Open in Chrome/Edge to save into a folder"; }
}

  openScrim(`<div class="m-head"><h2>Folder auto-save</h2><button class="btn ghost close" data-close style="margin-left:auto">✕</button></div>
    <div class="m-body"><p style="font-size:13.5px;color:var(--muted);margin:0">Saving to “${esc(State.settings.autoSaveFolder||"folder")}”. Two files are kept current after every change: ${DATA_FILE} and ${CSV_FILE}.</p></div>

/* ---------- auto-connect saving folder on open ---------- */
function applyLoaded(d){
  if(!d) return;
  State.settings=Object.assign(State.settings, d.settings||{});
  for(const k of Object.keys(State)){ if(k!=="settings" && Array.isArray(State[k]) && Array.isArray(d[k])) State[k]=d[k]; }
}
async function loadFromFolderAndSync(){
  let loaded=false;
  try{
    const fh=await dirHandle.getFileHandle(DATA_FILE);
    const text=await (await fh.getFile()).text();
    const d=JSON.parse(text);
    const folderTime=(d.settings&&d.settings.updatedAt)||0;
    const localTime=(State.settings&&State.settings.updatedAt)||0;
    if(folderTime>localTime){ applyLoaded(d); render(); loaded=true; }
  }catch(e){ /* no file in folder yet */ }
  fsLastSaved=new Date(); setAutoSaveState("on"); hideReconnectBar();
  writeToFolder(true);
  if(loaded) toast("Loaded latest from your folder");
}
async function autoConnectFolder(){
  setAutoSaveState("off");
  if(!FS_SUPPORTED) return;
  const h=await idb("get");
  if(!h) return;
  dirHandle=h;
  let perm="prompt";
