<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F4F5F2; --panel:#FFFFFF; --ink:#16211F; --muted:#6B7975; --faint:#9AA6A2;
    --line:#E2E6E1; --line-strong:#CDD4CF; --green:#10564A; --green-hi:#0C453B; --green-soft:#E7F0EC;
    --paid:#2E7D5B; --warn:#B8492C; --warn-soft:#F7E9E1; --gold:#B08A3E;
    --shadow:0 1px 2px rgba(22,33,31,.04),0 8px 24px rgba(22,33,31,.06);
    --radius:14px; --ease:cubic-bezier(.22,.61,.36,1); --spring:cubic-bezier(.34,1.56,.64,1);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{background:var(--paper);color:var(--ink);font-family:"Inter",system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;line-height:1.5;min-height:100vh;overscroll-behavior-y:none}
  .mono{font-family:"JetBrains Mono",ui-monospace,monospace;font-variant-numeric:tabular-nums}
  .grot{font-family:"Space Grotesk",system-ui,sans-serif}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;-webkit-tap-highlight-color:transparent}
  :focus-visible{outline:2px solid var(--green);outline-offset:2px;border-radius:6px}

  .wrap{max-width:1120px;margin:0 auto;padding:0 20px 80px;padding-left:calc(20px + env(safe-area-inset-left));padding-right:calc(20px + env(safe-area-inset-right));padding-bottom:calc(80px + env(safe-area-inset-bottom))}
  header.top{position:sticky;top:0;z-index:20;background:rgba(244,245,242,.85);backdrop-filter:saturate(180%) blur(10px);border-bottom:1px solid var(--line)}
  .top-inner{max-width:1120px;margin:0 auto;padding:14px 20px;padding-top:calc(14px + env(safe-area-inset-top));display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .brand{display:flex;align-items:baseline;gap:10px;margin-right:auto}
  .brand .mark{font-family:"Space Grotesk";font-weight:700;font-size:20px;letter-spacing:-.02em}
  .brand .mark b{color:var(--green)}
  .brand .org{font-size:12.5px;color:var(--muted);border-left:1px solid var(--line-strong);padding-left:10px;max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:text}
  .actions{display:flex;gap:8px;flex-wrap:wrap}
  .btn{display:inline-flex;align-items:center;gap:7px;font-size:13.5px;font-weight:600;padding:9px 14px;border-radius:10px;border:1px solid var(--line-strong);background:var(--panel);color:var(--ink);transition:.15s;white-space:nowrap;user-select:none}
  .btn:hover{border-color:var(--faint);transform:translateY(-1px)}
  .btn:active{transform:translateY(0)}
  .btn.primary{background:var(--green);color:#fff;border-color:var(--green)}
  .btn.primary:hover{background:var(--green-hi)}
  .btn.ghost{border-color:transparent;background:transparent;color:var(--muted);padding:9px 10px}
  .btn.ghost:hover{background:var(--line);color:var(--ink)}
  .btn.danger{color:var(--warn);border-color:transparent}
  .btn.danger:hover{background:var(--warn-soft)}
  .btn.install{background:var(--gold);color:#26200E;border-color:var(--gold);font-weight:700}
  .btn.install:hover{background:#C79B4A;border-color:#C79B4A}
  .btn svg{width:16px;height:16px}
  .btn.sm{padding:6px 11px;font-size:12.5px}

  .summary{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin:26px 0 20px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);position:relative;overflow:hidden;transition:transform .25s var(--ease),box-shadow .25s var(--ease)}
  .stat:hover{transform:translateY(-2px);box-shadow:0 2px 4px rgba(22,33,31,.05),0 14px 34px rgba(22,33,31,.09)}
  .stat .lab{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
  .stat .val{font-size:24px;font-weight:600;margin-top:8px;letter-spacing:-.01em}
  .stat .sub{font-size:12px;color:var(--muted);margin-top:3px}
  .stat.accent{border-color:#D8C9A6;background:linear-gradient(180deg,#FCFAF4,#FFFFFF)}
  .stat.accent .val{color:var(--green)}
  .stat.warn .val{color:var(--warn)}
  .stat .tick{position:absolute;top:0;left:0;height:100%;width:3px}
  .stat.accent .tick{background:var(--gold)}.stat.warn .tick{background:var(--warn)}

  .toolbar{display:flex;gap:12px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
  .search{flex:1;min-width:200px;display:flex;align-items:center;gap:9px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:0 12px}
  .search:focus-within{border-color:var(--faint)}
  .search svg{width:16px;height:16px;color:var(--faint);flex-shrink:0}
  .search input{border:none;outline:none;background:none;font-family:inherit;font-size:14px;color:var(--ink);padding:11px 0;width:100%}
  .segmented{display:flex;background:var(--line);border-radius:10px;padding:3px;gap:2px}
  .segmented button{font-size:12.5px;font-weight:600;color:var(--muted);padding:7px 13px;border-radius:8px;transition:.15s;user-select:none}
  .segmented button.on{background:var(--panel);color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.06)}
  .seg-count{font-size:10.5px;opacity:.7;margin-left:5px}

  /* breadcrumb */
  .crumbs{display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-bottom:14px;font-size:13.5px}
  .crumbs a{color:var(--muted);cursor:pointer;padding:4px 8px;border-radius:8px;font-weight:600;transition:.12s}
  .crumbs a:hover{background:var(--line);color:var(--ink)}
  .crumbs a.here{color:var(--ink);background:var(--green-soft)}
  .crumbs .sep{color:var(--faint)}

  .board{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
  .board-head{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .board-head h2{font-family:"Space Grotesk";font-size:15px;font-weight:600;margin:0}
  .board-head .sp{margin-left:auto;display:flex;gap:8px}

  .section-label{font-size:10.5px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);padding:14px 18px 6px}

  /* folder (box) cards */
  .folders{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;padding:10px 18px 16px}
  .folder{border:1px solid var(--line);border-radius:12px;padding:14px;cursor:pointer;transition:.15s;background:#FCFDFB;display:flex;gap:12px;align-items:flex-start}
  .folder:hover{border-color:var(--faint);transform:translateY(-2px);box-shadow:var(--shadow)}
  .folder .ic{width:40px;height:40px;border-radius:10px;flex-shrink:0;display:grid;place-items:center;background:var(--green-soft);color:var(--green)}
  .folder .ic svg{width:21px;height:21px}
  .folder .nm{font-weight:600;font-size:14.5px;line-height:1.25}
  .folder .meta{font-size:12px;color:var(--muted);margin-top:3px}
  .folder .note{font-size:11.5px;color:var(--faint);margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .folder .go{margin-left:auto;color:var(--faint);align-self:center}
  .folder-actions{margin-left:auto;display:flex;align-items:center;gap:2px;align-self:center}
  .fedit{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;color:var(--muted);opacity:0;transition:.15s}
  .fedit svg{width:15px;height:15px}
  .fedit:hover{background:var(--green-soft);color:var(--green)}
  .folder:hover .fedit{opacity:1}
  @media (hover:none){ .fedit{opacity:1} }

  /* item rows */
  .items{padding:4px 0 6px}
  .irow{display:flex;align-items:center;gap:13px;padding:12px 18px;border-bottom:1px solid var(--line);transition:background .15s}
  .irow:last-child{border-bottom:none}
  .irow:hover{background:#FAFBF9}
  .irow.flash{animation:flash 1.2s var(--ease)}
  @keyframes flash{0%,60%{background:var(--green-soft)}100%{background:transparent}}
  .irow .pic{width:38px;height:38px;border-radius:9px;flex-shrink:0;display:grid;place-items:center;background:#EEF1EC;color:var(--muted);font-family:"Space Grotesk";font-weight:700;font-size:13px}
  .irow .info{min-width:0;flex:1}
  .irow .nm{font-weight:600;font-size:14.5px}
  .irow .meta{font-size:12px;color:var(--muted);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .code-chip{font-family:"JetBrains Mono",monospace;font-size:11px;background:var(--line);padding:1px 7px;border-radius:6px;color:var(--ink)}
  .loc-chip{font-size:11.5px;color:var(--muted);display:inline-flex;align-items:center;gap:4px}
  .loc-chip svg{width:12px;height:12px;opacity:.7}

  /* qty stepper */
  .stepper{display:flex;align-items:center;gap:0;border:1px solid var(--line-strong);border-radius:10px;overflow:hidden;flex-shrink:0}
  .stepper button{width:34px;height:34px;display:grid;place-items:center;color:var(--green);font-size:18px;font-weight:600;transition:.12s}
  .stepper button:hover{background:var(--green-soft)}
  .stepper .q{min-width:46px;text-align:center;font-family:"JetBrains Mono",monospace;font-weight:600;font-size:15px;font-variant-numeric:tabular-nums;cursor:pointer;padding:0 4px}
  .stepper.low{border-color:#E7B9AC}
  .stepper.low .q{color:var(--warn)}
  .qty-tag{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:2px 7px;border-radius:20px}
  .qty-tag.low{background:var(--warn-soft);color:var(--warn)}
  .qty-tag.out{background:#F3D6CE;color:#8f2f18}
  .row-tools{display:flex;gap:2px;flex-shrink:0}

  .empty{padding:52px 24px;text-align:center;color:var(--muted)}
  .empty .big{font-family:"Space Grotesk";font-size:18px;color:var(--ink);font-weight:600;margin-bottom:6px}
  .empty p{max-width:380px;margin:0 auto 16px;font-size:14px}

  .footbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-top:16px;flex-wrap:wrap}
  .footbar .note{font-size:12px;color:var(--faint)}
  .footbar .r{display:flex;gap:8px;flex-wrap:wrap}
  .as-dot{width:7px;height:7px;border-radius:50%;display:inline-block}
  .as-dot.off{background:var(--faint)}.as-dot.on{background:#22C55E;box-shadow:0 0 0 3px rgba(34,197,94,.18)}.as-dot.warn{background:var(--gold);box-shadow:0 0 0 3px rgba(176,138,62,.18)}
  #autoSaveBtn{gap:8px}

  /* modal */
  .scrim{position:fixed;inset:0;background:rgba(22,33,31,.34);backdrop-filter:blur(2px);z-index:40;display:flex;opacity:0;pointer-events:none;transition:opacity .26s var(--ease)}
  .scrim.show{opacity:1;pointer-events:auto}
  .modal{background:var(--panel);border-radius:16px;box-shadow:0 20px 60px rgba(22,33,31,.28);width:min(460px,calc(100% - 32px));margin:auto;max-height:90vh;overflow:auto;transform:translateY(14px) scale(.97);opacity:0;transition:transform .3s var(--ease),opacity .3s var(--ease)}
  .scrim.show .modal{transform:none;opacity:1}
  .m-head{padding:20px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px}
  .m-head h2{font-family:"Space Grotesk";font-size:18px;font-weight:600;margin:0}
  .m-body{padding:20px 22px}
  .m-foot{padding:16px 22px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;background:#FCFDFB;flex-wrap:wrap}
  label.fld{display:block;margin-bottom:14px}
  label.fld .lt{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px}
  .inp{width:100%;font-family:inherit;font-size:14px;color:var(--ink);padding:11px 12px;border:1px solid var(--line-strong);border-radius:10px;background:#fff;transition:.15s}
  .inp:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px var(--green-soft)}
  .inp.mono{font-family:"JetBrains Mono",monospace}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .hint{font-size:12px;color:var(--faint);margin:-6px 0 12px}
  .ios-steps{list-style:none;padding:0;margin:8px 0 0;counter-reset:s}
  .ios-steps li{display:flex;gap:11px;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--line);font-size:13.5px}
  .ios-steps li:last-child{border-bottom:none}
  .ios-steps li::before{counter-increment:s;content:counter(s);flex-shrink:0;width:24px;height:24px;border-radius:7px;background:var(--green-soft);color:var(--green);font-weight:700;font-size:12px;display:grid;place-items:center;font-family:"Space Grotesk"}
  .kbd{display:inline-flex;align-items:center;gap:4px;background:var(--line);border-radius:6px;padding:1px 6px;font-weight:600;font-size:12px}

  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;font-size:13.5px;font-weight:500;padding:11px 18px;border-radius:11px;box-shadow:0 10px 30px rgba(0,0,0,.25);z-index:60;opacity:0;transition:.25s;display:flex;align-items:center;gap:9px}
  .toast.show{opacity:1;transform:translateX(-50%)}
  .toast svg{width:16px;height:16px;color:#7FDCB6}

  body.boot .stat{animation:fadeUp .5s var(--ease) both}
  body.boot .stat:nth-child(2){animation-delay:.06s}body.boot .stat:nth-child(3){animation-delay:.12s}body.boot .stat:nth-child(4){animation-delay:.18s}body.boot .stat:nth-child(5){animation-delay:.24s}
  body.boot .board{animation:fadeUp .5s var(--ease) both;animation-delay:.15s}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

  @media (max-width:820px){ .summary{grid-template-columns:repeat(3,1fr)} }
  @media (max-width:560px){
    .summary{grid-template-columns:repeat(2,1fr)}
    .irow{flex-wrap:wrap}
    .irow .info{flex:1 1 100%;order:1}
    .stepper{order:2}
    .row-tools{order:3;margin-left:auto}
    .brand .org{max-width:130px}
  }
  @media (display-mode:standalone){ header.top{background:var(--paper)} }
  @media (prefers-reduced-motion:reduce){ *{transition:none!important;animation:none!important} }
  .reconnect-bar{position:fixed;left:12px;right:12px;bottom:calc(14px + env(safe-area-inset-bottom));z-index:55;background:var(--ink);color:#fff;border:none;border-radius:12px;padding:13px 16px;font-family:inherit;font-size:13.5px;font-weight:600;box-shadow:0 10px 30px rgba(0,0,0,.28);display:flex;align-items:center;gap:9px;justify-content:center;cursor:pointer}
  .reconnect-bar .as-dot.warn{background:var(--gold)}
  .reconnect-bar:hover{background:#0d1917}
</style>
</head>
<body>
<header class="top">
  <div class="top-inner">
    <div class="brand">
      <span class="mark grot">Stock<b>Box</b></span>
      <span class="org" id="orgName" title="Click to rename">Shakeel Electronics</span>
    </div>
    <div class="actions">
      <button class="btn install" id="installBtn" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="m8 11 4 4 4-4"/><path d="M5 21h14"/></svg>Install app
      </button>
      <button class="btn" id="addBoxBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8V21H3V8"/><rect x="1" y="3" width="22" height="5" rx="1"/><line x1="10" y1="12" x2="14" y2="12"/></svg>Add box
      </button>
      <button class="btn primary" id="addItemBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add item
      </button>
    </div>
  </div>
</header>

<div class="wrap">
  <section class="summary" id="summary"></section>
  <div class="toolbar">
    <div class="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="searchInput" placeholder="Search a product to find its box — name or code" autocomplete="off"/>
    </div>
    <div class="segmented" id="filters"></div>
  </div>
  <div id="crumbsWrap"></div>
  <div class="board" id="board"></div>
  <div class="footbar">
    <div style="display:flex;flex-direction:column;gap:3px">
      <span class="note" id="countNote"></span>
      <span class="note" id="storageNote"></span>
      <span class="note" id="autoSaveNote"></span>
    </div>
    <div class="r">
      <button class="btn ghost sm" id="autoSaveBtn"><span class="as-dot off"></span>Auto-save to folder</button>
      <button class="btn ghost sm" id="importBtn">Import backup</button>
      <button class="btn ghost sm" id="exportCsvBtn">Export CSV</button>
      <button class="btn ghost sm" id="exportJsonBtn">Backup data</button>
      <input type="file" id="importFile" accept="application/json" style="display:none"/>
    </div>
  </div>
</div>

<div class="scrim" id="scrim"></div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   Inventory Placement — "StockBox"
   Boxes -> Sub-boxes -> items (pieces). Explorer-style.
   Saves to window.storage + localStorage + optional folder.
   ============================================================ */
const KEY = "inventory:data:v1";
const hasStore = (typeof window!=="undefined" && window.storage && typeof window.storage.get==="function");

const State = {
  settings:{ org:"Shakeel Electronics", lowStock:2, autoSaveFolder:null },
  locations:[], // {id,name,parentId,note,createdAt}
  items:[],     // {id,name,code,locationId,qty,note,createdAt,updatedAt}
};
let ui = { search:"", filter:"all", currentLoc:null, flashItemId:null };

/* ---------- storage (3 layers) ---------- */
async function load(){
  let d=null;
  if(hasStore){ try{ const r=await window.storage.get(KEY); if(r&&r.value) d=JSON.parse(r.value); }catch(e){} }
  if(!d) d=lsLoad();
  if(d){
    State.settings=Object.assign(State.settings,d.settings||{});
    State.locations=d.locations||[];
    State.items=d.items||[];
  }
}
function lsLoad(){ try{ const s=localStorage.getItem(KEY); return s?JSON.parse(s):null; }catch(e){ return null; } }
function lsSave(){ try{ localStorage.setItem(KEY, JSON.stringify(State)); return true; }catch(e){ return false; } }
let saveTimer=null, storageOK=true;
async function save(){
  let ok=false;
  if(hasStore){ try{ await window.storage.set(KEY, JSON.stringify(State)); ok=true; }catch(e){} }
  if(lsSave()) ok=true;
  storageOK=ok; updateStorageNote();
}
function persist(){ State.settings.updatedAt=Date.now(); clearTimeout(saveTimer); saveTimer=setTimeout(save,120); if(dirHandle) writeToFolder(false); }
function updateStorageNote(){
  const el=document.getElementById("storageNote"); if(!el) return;
  if(!storageOK){ el.innerHTML=`<span style="color:var(--warn)">⚠ Couldn't save on this device — use “Backup data”. (Private mode can block storage.)</span>`; }
  else if(dirHandle && State.settings.autoSaveFolder){ el.textContent=""; }
  else { el.textContent="Saved automatically on this device."; }
}

/* ---------- helpers ---------- */
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
function esc(s){ return String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
const locById=id=>State.locations.find(l=>l.id===id)||null;
const childrenOf=pid=>State.locations.filter(l=>(l.parentId||null)===(pid||null)).sort((a,b)=>a.name.localeCompare(b.name,undefined,{numeric:true}));
const itemsDirect=lid=>State.items.filter(i=>i.locationId===lid);
function pathOf(id){ const out=[]; let c=locById(id); while(c){ out.unshift(c); c=locById(c.parentId); } return out; }
function descendantIds(id){ let out=[]; for(const ch of childrenOf(id)){ out.push(ch.id); out=out.concat(descendantIds(ch.id)); } return out; }
function aggregate(id){ // recursive pieces/lines within a location
  let pieces=0, lines=0;
  const ids=[id,...descendantIds(id)];
  for(const it of State.items){ if(ids.includes(it.locationId)){ pieces+=it.qty; lines++; } }
  return { pieces, lines, subboxes: childrenOf(id).length };
}
const isLow=q=>q<=(State.settings.lowStock||0);
function flattenLocations(){ // for pickers: [{id,name,depth}]
  const out=[];
  const walk=(pid,depth)=>{ for(const l of childrenOf(pid)){ out.push({id:l.id,name:l.name,depth}); walk(l.id,depth+1); } };
  walk(null,0); return out;
}
function locPathText(id){ return pathOf(id).map(l=>l.name).join(" › "); }

/* ---------- render ---------- */
function render(){
  document.getElementById("orgName").textContent=State.settings.org;
  renderSummary(); renderFilters(); renderMain();
}
function renderSummary(){
  const boxes=childrenOf(null).length;
  const sub=State.locations.length-boxes;
  const pieces=State.items.reduce((s,i)=>s+i.qty,0);
  const products=new Set(State.items.map(i=>(i.code||i.name).toLowerCase().trim())).size;
  const low=State.items.filter(i=>isLow(i.qty)).length;
  document.getElementById("summary").innerHTML=`
    <div class="stat accent"><span class="tick"></span><div class="lab">Total pieces</div><div class="val mono">${pieces.toLocaleString()}</div><div class="sub">${State.items.length} item line${State.items.length===1?"":"s"}</div></div>
    <div class="stat"><div class="lab">Boxes</div><div class="val mono">${boxes}</div><div class="sub">top-level</div></div>
    <div class="stat"><div class="lab">Sub-boxes</div><div class="val mono">${sub}</div><div class="sub">nested</div></div>
    <div class="stat"><div class="lab">Products</div><div class="val mono">${products}</div><div class="sub">distinct</div></div>
    <div class="stat ${low?"warn":""}">${low?'<span class="tick"></span>':''}<div class="lab">Low stock</div><div class="val mono">${low}</div><div class="sub">≤ ${State.settings.lowStock} pcs</div></div>`;
}
function renderFilters(){
  const low=State.items.filter(i=>isLow(i.qty)).length;
  const defs=[["all","Browse"],["low",`Low stock`]];
  document.getElementById("filters").innerHTML=defs.map(([k,l])=>`<button class="${ui.filter===k?"on":""}" data-filter="${k}">${l}${k==="low"?`<span class="seg-count">${low}</span>`:""}</button>`).join("");
}

function renderMain(){
  const q=ui.search.trim().toLowerCase();
  if(q || ui.filter==="low"){ document.getElementById("crumbsWrap").innerHTML=""; renderFlat(q); }
  else { renderCrumbs(); renderExplorer(); }
}

function renderCrumbs(){
  const path=ui.currentLoc?pathOf(ui.currentLoc):[];
  let html=`<div class="crumbs"><a data-loc="root" class="${!ui.currentLoc?"here":""}">🏠 All boxes</a>`;
  path.forEach((l,i)=>{ html+=`<span class="sep">›</span><a data-loc="${l.id}" class="${i===path.length-1?"here":""}">${esc(l.name)}</a>`; });
  html+=`</div>`;
  const w=document.getElementById("crumbsWrap"); w.innerHTML=html;
  w.querySelectorAll("[data-loc]").forEach(a=>a.onclick=()=>{ ui.currentLoc=a.dataset.loc==="root"?null:a.dataset.loc; renderMain(); });
}

function renderExplorer(){
  const board=document.getElementById("board");
  const here=ui.currentLoc;
  const folders=childrenOf(here);
  const items=itemsDirect(here).sort((a,b)=>a.name.localeCompare(b.name));
  const atHome=!here;
  const title=atHome?"All boxes":esc(locById(here).name);
  const addLocLabel=atHome?"New box":"New sub-box";

  document.getElementById("countNote").textContent=`${State.locations.length} location${State.locations.length===1?"":"s"} · ${State.items.length} item line${State.items.length===1?"":"s"}`;

  let html=`<div class="board-head"><h2>📦 ${title}</h2><div class="sp">
      ${here?`<button class="btn sm" id="editLoc">Edit box</button>`:""}
      <button class="btn sm" id="mkLoc">＋ ${addLocLabel}</button>
      <button class="btn sm primary" id="mkItem">＋ Add item here</button>
    </div></div>`;

  if(folders.length===0 && items.length===0){
    html+=`<div class="empty"><div class="big grot">${atHome?"No boxes yet":"This box is empty"}</div>
      <p>${atHome?"Create your first box (e.g. “Rack A”, “Almari 1”), then add sub-boxes and place items with piece counts.":"Add a sub-box to divide it further, or place items here with how many pieces."}</p></div>`;
  }else{
    if(folders.length){
      html+=`<div class="section-label">${atHome?"Boxes":"Sub-boxes"}</div><div class="folders">`;
      for(const f of folders){
        const a=aggregate(f.id);
        html+=`<div class="folder" data-open="${f.id}">
          <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7.5 4.27 9 5.15"/><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg></div>
          <div style="min-width:0"><div class="nm">${esc(f.name)}</div>
            <div class="meta">${a.pieces} pcs · ${a.lines} item${a.lines===1?"":"s"}${a.subboxes?` · ${a.subboxes} sub-box${a.subboxes===1?"":"es"}`:""}</div>
            ${f.note?`<div class="note">${esc(f.note)}</div>`:""}</div>
          <div class="folder-actions">
            <button class="fedit" data-editloc="${f.id}" title="Rename or delete this box"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4z"/></svg></button>
            <span class="go"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></span>
          </div>
        </div>`;
      }
      html+=`</div>`;
    }
    if(items.length){
      html+=`<div class="section-label">Items in this ${atHome?"level":"box"}</div><div class="items">`;
      for(const it of items) html+=itemRowHTML(it,false);
      html+=`</div>`;
    }
  }
  board.innerHTML=html;
  document.getElementById("mkLoc").onclick=()=>openLocForm(null, here);
  document.getElementById("mkItem").onclick=()=>openItemForm(null, here);
  wireBoard();
}

function renderFlat(q){
  const board=document.getElementById("board");
  let list;
  if(ui.filter==="low" && !q){ list=State.items.filter(i=>isLow(i.qty)); }
  else { list=State.items.filter(i=>{ const h=(i.name+" "+(i.code||"")+" "+locPathText(i.locationId)).toLowerCase(); return h.includes(q); }); }
  list=list.slice().sort((a,b)=>a.qty-b.qty || a.name.localeCompare(b.name));

  document.getElementById("countNote").textContent=`${list.length} result${list.length===1?"":"s"}`;

  const title=ui.filter==="low"&&!q?"Low stock items":`Search results`;
  let html=`<div class="board-head"><h2>${ui.filter==="low"&&!q?"⚠️":"🔎"} ${title}</h2></div>`;
  if(list.length===0){
    html+=`<div class="empty"><div class="big grot">Nothing found</div><p>${q?`No item or box matches “${esc(ui.search)}”.`:"No items are at or below your low-stock level. Nice."}</p></div>`;
  }else{
    html+=`<div class="items">`;
    for(const it of list) html+=itemRowHTML(it,true);
    html+=`</div>`;
  }
  board.innerHTML=html; wireBoard();
}

function itemRowHTML(it, showPath){
  const low=isLow(it.qty);
  const tag = it.qty<=0?`<span class="qty-tag out">Out</span>` : (low?`<span class="qty-tag low">Low</span>`:"");
  const initials=(it.name.trim()[0]||"?").toUpperCase();
  return `<div class="irow ${ui.flashItemId===it.id?"flash":""}" data-item="${it.id}">
    <div class="pic">${esc(initials)}</div>
    <div class="info">
      <div class="nm">${esc(it.name)} ${tag}</div>
      <div class="meta">
        ${it.code?`<span class="code-chip">${esc(it.code)}</span>`:""}
        ${showPath?`<span class="loc-chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/></svg>${esc(locPathText(it.locationId))}</span>`:""}
        ${it.note?`<span style="color:var(--faint)">${esc(it.note)}</span>`:""}
      </div>
    </div>
    <div class="stepper ${low?"low":""}">
      <button data-dec="${it.id}" title="Remove one">−</button>
      <span class="q" data-edit="${it.id}" title="Tap to set exact">${it.qty}</span>
      <button data-inc="${it.id}" title="Add one">+</button>
    </div>
    <div class="row-tools">
      <button class="btn ghost sm" data-move="${it.id}" title="Move to another box">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="5 9 2 12 5 15"/><polyline points="9 5 12 2 15 5"/><polyline points="15 19 12 22 9 19"/><polyline points="19 9 22 12 19 15"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="12" y1="2" x2="12" y2="22"/></svg>
      </button>
      <button class="btn ghost sm" data-edit="${it.id}" title="Edit item">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>
      </button>
    </div>
  </div>`;
}

function wireBoard(){
  const board=document.getElementById("board");
  board.querySelectorAll("[data-open]").forEach(el=>el.onclick=()=>{ ui.currentLoc=el.dataset.open; ui.search=""; document.getElementById("searchInput").value=""; ui.filter="all"; renderFilters(); renderMain(); });
  board.querySelectorAll("[data-editloc]").forEach(b=>b.onclick=e=>{ e.stopPropagation(); openLocForm(locById(b.dataset.editloc)); });
  const el2=document.getElementById("editLoc"); if(el2) el2.onclick=()=>openLocForm(locById(ui.currentLoc));
  board.querySelectorAll("[data-inc]").forEach(b=>b.onclick=e=>{ e.stopPropagation(); adjustQty(b.dataset.inc,+1); });
  board.querySelectorAll("[data-dec]").forEach(b=>b.onclick=e=>{ e.stopPropagation(); adjustQty(b.dataset.dec,-1); });
  board.querySelectorAll("[data-edit]").forEach(b=>b.onclick=e=>{ e.stopPropagation(); openItemForm(State.items.find(i=>i.id===b.dataset.edit)); });
  board.querySelectorAll("[data-move]").forEach(b=>b.onclick=e=>{ e.stopPropagation(); openMoveItem(b.dataset.move); });
}

function adjustQty(id, delta){
  const it=State.items.find(x=>x.id===id); if(!it) return;
  it.qty=Math.max(0, it.qty+delta); it.updatedAt=Date.now();
  ui.flashItemId=id; persist(); renderSummary(); renderFilters(); renderMain();
  setTimeout(()=>ui.flashItemId=null, 1300);
}

/* ---------- modals ---------- */
const scrim=document.getElementById("scrim");
function openScrim(html){ scrim.innerHTML=`<div class="modal">${html}</div>`; requestAnimationFrame(()=>scrim.classList.add("show")); scrim.querySelectorAll("[data-close]").forEach(b=>b.onclick=closeScrim); }
function closeScrim(){ scrim.classList.remove("show"); setTimeout(()=>{ if(!scrim.classList.contains("show")) scrim.innerHTML=""; },220); }
scrim.addEventListener("click",e=>{ if(e.target===scrim) closeScrim(); });
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeScrim(); });

function openLocForm(existing, parentId){
  const l=existing||{}; const isSub=(existing?existing.parentId:parentId);
  const title=existing?"Edit box":(parentId?"New sub-box":"New box");
  openScrim(`
    <div class="m-head"><h2>${title}</h2><button class="btn ghost close" data-close style="margin-left:auto">✕</button></div>
    <div class="m-body">
      ${parentId&&!existing?`<div class="hint">Inside: ${esc(locPathText(parentId))}</div>`:""}
      <label class="fld"><span class="lt">Name</span><input class="inp" id="l-name" value="${esc(l.name||"")}" placeholder="${parentId?"e.g. Compartment 3":"e.g. Rack A / Almari 1"}"></label>
      <label class="fld"><span class="lt">Note <span style="font-weight:400;color:var(--faint)">(optional)</span></span><input class="inp" id="l-note" value="${esc(l.note||"")}" placeholder="What's kept here"></label>
    </div>
    <div class="m-foot">
      ${existing?`<button class="btn danger" id="l-del" style="margin-right:auto">Delete box</button>`:""}
      <button class="btn" data-close>Cancel</button>
      <button class="btn primary" id="l-save">${existing?"Save":"Create"}</button>
    </div>`);
  const nameEl=document.getElementById("l-name"); nameEl.focus();
  document.getElementById("l-save").onclick=()=>{
    const name=nameEl.value.trim(); if(!name){ flash("Enter a name"); return; }
    const note=document.getElementById("l-note").value.trim();
    if(existing){ existing.name=name; existing.note=note; toast("Box updated"); }
    else{ State.locations.push({id:uid(),name,note,parentId:parentId||null,createdAt:Date.now()}); toast(parentId?"Sub-box added":"Box added"); }
    persist(); render(); closeScrim();
  };
  if(existing){
    document.getElementById("l-del").onclick=()=>{
      const ids=[existing.id,...descendantIds(existing.id)];
      const nItems=State.items.filter(i=>ids.includes(i.locationId)).length;
      const nSub=ids.length-1;
      if(confirm(`Delete “${existing.name}”${nSub?` and its ${nSub} sub-box(es)`:""}${nItems?` and ${nItems} item line(s) inside`:""}? This cannot be undone.`)){
        State.locations=State.locations.filter(l=>!ids.includes(l.id));
        State.items=State.items.filter(i=>!ids.includes(i.locationId));
        if(ids.includes(ui.currentLoc)) ui.currentLoc=locById(existing.parentId)?existing.parentId:null;
        persist(); render(); closeScrim(); toast("Box deleted");
      }
    };
  }
}

function locationOptions(selected){
  const flat=flattenLocations();
  let opts=`<option value="" ${!selected?"selected":""}>— choose a box —</option>`;
  opts+=flat.map(f=>`<option value="${f.id}" ${selected===f.id?"selected":""}>${"\u00A0\u00A0".repeat(f.depth)}${f.depth?"└ ":""}${esc(f.name)}</option>`).join("");
  return opts;
}

function openItemForm(existing, presetLoc){
  if(State.locations.length===0){ flash("Create a box first"); openLocForm(null,null); return; }
  const it=existing||{};
  const loc=existing?existing.locationId:(presetLoc||ui.currentLoc||"");
  openScrim(`
    <div class="m-head"><h2>${existing?"Edit item":"Add item"}</h2><button class="btn ghost close" data-close style="margin-left:auto">✕</button></div>
    <div class="m-body">
      <label class="fld"><span class="lt">Product name</span><input class="inp" id="i-name" value="${esc(it.name||"")}" placeholder="e.g. 10k Resistor / USB-C cable"></label>
      <div class="two">
        <label class="fld"><span class="lt">Code / part no. <span style="font-weight:400;color:var(--faint)">(optional)</span></span><input class="inp mono" id="i-code" value="${esc(it.code||"")}" placeholder="SKU-001"></label>
        <label class="fld"><span class="lt">Pieces</span><input class="inp mono" id="i-qty" inputmode="numeric" value="${existing?it.qty:""}" placeholder="0"></label>
      </div>
      <label class="fld"><span class="lt">Box / sub-box</span><select class="inp" id="i-loc">${locationOptions(loc)}</select></label>
      <label class="fld"><span class="lt">Note <span style="font-weight:400;color:var(--faint)">(optional)</span></span><input class="inp" id="i-note" value="${esc(it.note||"")}" placeholder="Colour, rating, shelf, etc."></label>
    </div>
    <div class="m-foot">
      ${existing?`<button class="btn danger" id="i-del" style="margin-right:auto">Delete</button>`:""}
      <button class="btn" data-close>Cancel</button>
      <button class="btn primary" id="i-save">${existing?"Save":"Add item"}</button>
    </div>`);
  document.getElementById("i-name").focus();
  document.getElementById("i-save").onclick=()=>{
    const name=document.getElementById("i-name").value.trim();
    const locId=document.getElementById("i-loc").value;
    const qty=Math.max(0, parseInt(document.getElementById("i-qty").value,10)||0);
    if(!name){ flash("Enter a product name"); return; }
    if(!locId){ flash("Choose a box"); return; }
    const data={ name, code:document.getElementById("i-code").value.trim(), qty, locationId:locId, note:document.getElementById("i-note").value.trim() };
    if(existing){ Object.assign(existing,data,{updatedAt:Date.now()}); toast("Item updated"); }
    else{ State.items.push(Object.assign({id:uid(),createdAt:Date.now(),updatedAt:Date.now()},data)); toast("Item added"); }
    ui.flashItemId=existing?existing.id:null;
    persist(); render(); closeScrim();
  };
  if(existing){
    document.getElementById("i-del").onclick=()=>{
      if(confirm(`Delete “${existing.name}” from ${locPathText(existing.locationId)}?`)){
        State.items=State.items.filter(i=>i.id!==existing.id); persist(); render(); closeScrim(); toast("Item deleted");
      }
    };
  }
}

function openMoveItem(id){
  const it=State.items.find(x=>x.id===id); if(!it) return;
  openScrim(`
    <div class="m-head"><h2>Move item</h2><button class="btn ghost close" data-close style="margin-left:auto">✕</button></div>
    <div class="m-body">
      <div class="hint">${esc(it.name)} — currently in ${esc(locPathText(it.locationId))}</div>
      <label class="fld"><span class="lt">Move to</span><select class="inp" id="mv-loc">${locationOptions(it.locationId)}</select></label>
    </div>
    <div class="m-foot"><button class="btn" data-close>Cancel</button><button class="btn primary" id="mv-save">Move</button></div>`);
  document.getElementById("mv-save").onclick=()=>{
    const dest=document.getElementById("mv-loc").value; if(!dest){ flash("Choose a box"); return; }
    it.locationId=dest; it.updatedAt=Date.now(); ui.flashItemId=it.id; persist(); render(); closeScrim(); toast(`Moved to ${locById(dest).name}`);
  };
}

/* ---------- toast ---------- */
let toastTimer=null;
function toast(msg){ const t=document.getElementById("toast"); t.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>${esc(msg)}`; t.style.background=""; t.classList.add("show"); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),2100); }
function flash(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.style.background="var(--warn)"; t.classList.add("show"); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),2100); }

/* ---------- import / export ---------- */
function buildCsv(){
  const rows=[["Product","Code","Location","Pieces","Note","Updated"]];
  for(const i of State.items){ rows.push([i.name,i.code||"",locPathText(i.locationId),i.qty,i.note||"", i.updatedAt?new Date(i.updatedAt).toISOString().slice(0,10):""]); }
  return rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\r\n");
}
function downloadBlob(blob,name){ const url=URL.createObjectURL(blob); const a=document.createElement("a"); a.href=url; a.download=name; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),1000); }
function exportCsv(){ downloadBlob(new Blob([buildCsv()],{type:"text/csv"}), `inventory-${new Date().toISOString().slice(0,10)}.csv`); toast("CSV exported"); }
function exportJson(){ downloadBlob(new Blob([JSON.stringify(State,null,2)],{type:"application/json"}), `stockbox-backup-${new Date().toISOString().slice(0,10)}.json`); toast("Backup downloaded"); }
function importJson(file){ const r=new FileReader(); r.onload=()=>{ try{ const d=JSON.parse(r.result); if(!Array.isArray(d.items)||!Array.isArray(d.locations)) throw 0; if(!confirm("Replace all current inventory with this backup?")) return; State.settings=Object.assign(State.settings,d.settings||{}); State.locations=d.locations||[]; State.items=d.items||[]; ui.currentLoc=null; persist(); render(); toast("Backup restored"); }catch(e){ flash("Not a valid StockBox backup"); } }; r.readAsText(file); }

/* ---------- folder auto-save ---------- */
const FS_SUPPORTED=(typeof window!=="undefined" && "showDirectoryPicker" in window);
let dirHandle=null, fsTimer=null, fsLastSaved=null;
const DATA_FILE="stockbox-inventory.json", CSV_FILE="inventory.csv";
function idb(op,val){ return new Promise(res=>{ try{ const r=indexedDB.open("stockbox-fs",1); r.onupgradeneeded=()=>r.result.createObjectStore("h"); r.onerror=()=>res(null); r.onsuccess=()=>{ const db=r.result; const tx=db.transaction("h",op==="get"?"readonly":"readwrite"); const st=tx.objectStore("h"); let rq= op==="get"?st.get("dir"):op==="set"?st.put(val,"dir"):st.delete("dir"); rq.onsuccess=()=>{ const out=op==="get"?rq.result:true; tx.oncomplete=()=>{db.close();res(out);}; }; rq.onerror=()=>{db.close();res(null);}; }; }catch(e){ res(null); } }); }
async function ensurePerm(h){ try{ const o={mode:"readwrite"}; if((await h.queryPermission(o))==="granted") return true; if((await h.requestPermission(o))==="granted") return true; }catch(e){} return false; }
async function writeFile(dir,name,text){ const fh=await dir.getFileHandle(name,{create:true}); const w=await fh.createWritable(); await w.write(text); await w.close(); }
async function writeToFolder(immediate){
  if(!dirHandle) return;
  const doWrite=async()=>{ if(!(await ensurePerm(dirHandle))){ setAutoSaveState("warn"); return; } try{ await writeFile(dirHandle,DATA_FILE,JSON.stringify(State,null,2)); await writeFile(dirHandle,CSV_FILE,buildCsv()); fsLastSaved=new Date(); setAutoSaveState("on"); }catch(e){ setAutoSaveState("warn"); } };
  clearTimeout(fsTimer); if(immediate) return doWrite(); fsTimer=setTimeout(doWrite,500);
}
async function pickFolder(){
  if(!FS_SUPPORTED){ flash("Folder auto-save needs Chrome or Edge"); return; }
  try{ const h=await window.showDirectoryPicker({mode:"readwrite",id:"stockbox-autosave"}); dirHandle=h; await idb("set",h); State.settings.autoSaveFolder=h.name; persist(); await writeToFolder(true); toast(`Auto-saving to “${h.name}”`); }
  catch(e){ if(e&&e.name==="AbortError") return; flash("Browser blocked folder access — open the file in Chrome/Edge."); }
}
async function turnOffAutoSave(){ dirHandle=null; fsLastSaved=null; State.settings.autoSaveFolder=null; await idb("del"); persist(); setAutoSaveState("off"); toast("Auto-save to folder off"); }
function setAutoSaveState(state){
  const btn=document.getElementById("autoSaveBtn"), note=document.getElementById("autoSaveNote"); if(!btn) return;
  const folder=State.settings.autoSaveFolder; const dot=c=>`<span class="as-dot ${c}"></span>`;
  if(state==="on"){ btn.innerHTML=dot("on")+`Saving to “${esc(folder||"folder")}”`; note.textContent=fsLastSaved?`Folder file updated ${fsLastSaved.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"})}`:""; }
  else if(state==="warn"){ btn.innerHTML=dot("warn")+`Reconnect folder`; note.textContent="Click to grant folder access again"; }
  else{ btn.innerHTML=dot("off")+`Auto-save to folder`; note.textContent=FS_SUPPORTED?"":"Open in Chrome/Edge to save into a folder"; }
}
function openAutoSaveMenu(){
  openScrim(`<div class="m-head"><h2>Folder auto-save</h2><button class="btn ghost close" data-close style="margin-left:auto">✕</button></div>
    <div class="m-body"><p style="font-size:13.5px;color:var(--muted);margin:0">Saving to “${esc(State.settings.autoSaveFolder||"folder")}”. Two files are kept current after every change: ${DATA_FILE} and ${CSV_FILE}.</p></div>
    <div class="m-foot"><button class="btn danger" id="as-off" style="margin-right:auto">Turn off</button><button class="btn" data-close>Close</button><button class="btn primary" id="as-change">Change folder</button></div>`);
  document.getElementById("as-off").onclick=()=>{ turnOffAutoSave(); closeScrim(); };
  document.getElementById("as-change").onclick=()=>{ closeScrim(); pickFolder(); };
}
function onAutoSaveClick(){ if(dirHandle&&State.settings.autoSaveFolder){ ensurePerm(dirHandle).then(ok=>{ if(ok) writeToFolder(true); openAutoSaveMenu(); }); } else pickFolder(); }
async function initAutoSave(){ setAutoSaveState("off"); if(!FS_SUPPORTED) return; const h=await idb("get"); if(h){ dirHandle=h; try{ setAutoSaveState((await h.queryPermission({mode:"readwrite"}))==="granted"?"on":"warn"); }catch(e){ setAutoSaveState("warn"); } } }

/* ---------- install (PWA) ---------- */
let deferredPrompt=null; const installBtn=document.getElementById("installBtn");
const isStandalone=()=>(window.matchMedia&&window.matchMedia("(display-mode: standalone)").matches)||window.navigator.standalone===true;
const isIOS=()=>/iphone|ipad|ipod/i.test(navigator.userAgent);
window.addEventListener("beforeinstallprompt",e=>{ e.preventDefault(); deferredPrompt=e; if(!isStandalone()) installBtn.style.display="inline-flex"; });
window.addEventListener("appinstalled",()=>{ installBtn.style.display="none"; deferredPrompt=null; toast("App installed"); });
installBtn.onclick=async()=>{ if(deferredPrompt){ deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt=null; installBtn.style.display="none"; } else openInstallHelp(); };
function openInstallHelp(){
  const ios=isIOS();
  const steps=ios?[`Tap <b>Share</b> <span class="kbd">⬆︎</span> in Safari.`,`Tap <b>Add to Home Screen</b>.`,`Tap <b>Add</b>.`]:[`Open Chrome menu <span class="kbd">⋮</span>.`,`Tap <b>Install app</b> / <b>Add to Home screen</b>.`,`Confirm — it opens full-screen with its own icon.`];
  openScrim(`<div class="m-head"><h2>Install app</h2><button class="btn ghost close" data-close style="margin-left:auto">✕</button></div>
    <div class="m-body"><p style="font-size:13.5px;color:var(--muted);margin:0 0 6px">Add it to your ${ios?"iPhone":"phone"}'s home screen to open like a normal app.</p><ol class="ios-steps">${steps.map(s=>`<li><span>${s}</span></li>`).join("")}</ol>
    <p style="font-size:12px;color:var(--faint);margin:14px 0 0">Open the saved file in ${ios?"Safari":"Chrome or Edge"} — not the chat preview.</p></div>
    <div class="m-foot"><button class="btn primary" data-close>Got it</button></div>`);
}
if(!isStandalone()&&isIOS()) installBtn.style.display="inline-flex";

/* ---------- wire ---------- */
document.getElementById("addBoxBtn").onclick=()=>openLocForm(null,null);
document.getElementById("addItemBtn").onclick=()=>openItemForm(null,ui.currentLoc);
document.getElementById("searchInput").addEventListener("input",e=>{ ui.search=e.target.value; renderMain(); });
document.getElementById("filters").addEventListener("click",e=>{ const b=e.target.closest("[data-filter]"); if(!b) return; ui.filter=b.dataset.filter; if(b.dataset.filter!=="all") ui.search=document.getElementById("searchInput").value; renderFilters(); renderMain(); });
document.getElementById("exportCsvBtn").onclick=exportCsv;
document.getElementById("exportJsonBtn").onclick=exportJson;
document.getElementById("importBtn").onclick=()=>document.getElementById("importFile").click();
document.getElementById("importFile").addEventListener("change",e=>{ if(e.target.files[0]) importJson(e.target.files[0]); e.target.value=""; });
document.getElementById("autoSaveBtn").onclick=onAutoSaveClick;
document.getElementById("orgName").addEventListener("click",function(){ const n=prompt("Business name",State.settings.org); if(n!=null&&n.trim()){ State.settings.org=n.trim(); persist(); render(); } });


/* ---------- auto-connect saving folder on open ---------- */
function applyLoaded(d){
  if(!d) return;
  State.settings=Object.assign(State.settings, d.settings||{});
  for(const k of Object.keys(State)){ if(k!=="settings" && Array.isArray(State[k]) && Array.isArray(d[k])) State[k]=d[k]; }
}
async function loadFromFolderAndSync(){
  let loaded=false;
  try{
    const fh=await dirHandle.getFileHandle(DATA_FILE);
    const text=await (await fh.getFile()).text();
    const d=JSON.parse(text);
    const folderTime=(d.settings&&d.settings.updatedAt)||0;
    const localTime=(State.settings&&State.settings.updatedAt)||0;
    if(folderTime>localTime){ applyLoaded(d); render(); loaded=true; }
  }catch(e){ /* no file in folder yet */ }
  fsLastSaved=new Date(); setAutoSaveState("on"); hideReconnectBar();
  writeToFolder(true);
  if(loaded) toast("Loaded latest from your folder");
}
async function autoConnectFolder(){
  setAutoSaveState("off");
  if(!FS_SUPPORTED) return;
  const h=await idb("get");
  if(!h) return;
  dirHandle=h;
  let perm="prompt";
  try{ perm=await h.queryPermission({mode:"readwrite"}); }catch(e){}
  if(perm==="granted"){ await loadFromFolderAndSync(); }
  else{ dirHandle=null; setAutoSaveState("off"); }  // no nagging bar — device auto-save covers it
}
async function reconnectFolder(){
  if(!dirHandle){ pickFolder(); return; }
  if(await ensurePerm(dirHandle)){ await loadFromFolderAndSync(); toast("Folder reconnected"); }
  else flash("Couldn't get folder access");
}
function showReconnectBar(){ /* disabled in Option B: rely on automatic on-device saving */ }
function hideReconnectBar(){ const b=document.getElementById("reconnectBar"); if(b) b.remove(); }


(async function init(){
  document.body.classList.add("boot");
  await load(); render(); autoConnectFolder(); updateStorageNote();
  setTimeout(()=>document.body.classList.remove("boot"),1200);
})();
</script>
