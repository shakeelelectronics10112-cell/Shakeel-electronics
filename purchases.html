<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{--paper:#F5F6F3;--panel:#FFFFFF;--ink:#0F1917;--muted:#6B7975;--faint:#9AA6A2;--line:#E4E8E4;--line-strong:#D2D8D3;--green:#0E4F44;--green-hi:#0A3E35;--green-soft:#E6F0EC;--paid:#2E7D5B;--warn:#B0492C;--warn-soft:#F8EAE4;--gold:#B08A3E;--amber:#8A6A2A;--amber-soft:#FBF3E2;--blue:#1F6F8B;--blue-soft:#E4F0F4;--shadow:0 1px 2px rgba(15,25,23,.04),0 8px 26px rgba(15,25,23,.06);--radius:15px;--ease:cubic-bezier(.22,.61,.36,1);}
  *{box-sizing:border-box}html,body{margin:0}html{-webkit-text-size-adjust:100%}
  body{background:var(--paper);color:var(--ink);font-family:"Inter",system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;line-height:1.5;min-height:100vh;overscroll-behavior-y:none}
  .mono{font-family:"JetBrains Mono",ui-monospace,monospace;font-variant-numeric:tabular-nums}.grot{font-family:"Space Grotesk",system-ui,sans-serif}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;-webkit-tap-highlight-color:transparent}
  :focus-visible{outline:2px solid var(--green);outline-offset:2px;border-radius:6px}
  .wrap{max-width:1000px;margin:0 auto;padding:0 16px 90px;padding-left:calc(16px + env(safe-area-inset-left));padding-right:calc(16px + env(safe-area-inset-right));padding-bottom:calc(90px + env(safe-area-inset-bottom))}
  header.top{position:sticky;top:0;z-index:20;background:rgba(244,245,242,.9);backdrop-filter:saturate(180%) blur(10px);border-bottom:1px solid var(--line)}
  .top-inner{max-width:1000px;margin:0 auto;padding:12px 16px;padding-top:calc(12px + env(safe-area-inset-top));display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .brand{display:flex;align-items:baseline;gap:9px;margin-right:auto}
  .brand .mark{font-family:"Space Grotesk";font-weight:700;font-size:18px;letter-spacing:-.02em}.brand .mark b{color:var(--green)}
  .brand .org{font-size:12px;color:var(--muted);border-left:1px solid var(--line-strong);padding-left:9px;max-width:150px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:text}
  .rate-badge{font-size:12px;font-weight:600;color:var(--green);background:var(--green-soft);padding:5px 10px;border-radius:8px;cursor:pointer;white-space:nowrap}
  .btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;padding:9px 13px;border-radius:10px;border:1px solid var(--line-strong);background:var(--panel);color:var(--ink);transition:.15s;white-space:nowrap;user-select:none}
  .btn:hover{border-color:var(--faint);transform:translateY(-1px)}.btn:active{transform:translateY(0)}
  .btn.primary{background:var(--green);color:#fff;border-color:var(--green)}.btn.primary:hover{background:var(--green-hi)}
  .btn.ghost{border-color:transparent;background:transparent;color:var(--muted);padding:9px 10px}.btn.ghost:hover{background:var(--line);color:var(--ink)}
  .btn.danger{color:var(--warn);border-color:transparent}.btn.danger:hover{background:var(--warn-soft)}
  .btn.install{background:var(--gold);color:#26200E;border-color:var(--gold);font-weight:700}.btn.install:hover{background:#C79B4A}
  .btn.wa{background:#25D366;color:#fff;border-color:#25D366}.btn.wa:hover{background:#1Fb457}
  .btn svg{width:16px;height:16px}.btn.sm{padding:6px 11px;font-size:12.5px}
  .tabs{display:flex;gap:4px;background:#E9ECE8;padding:4px;border-radius:12px;margin:14px 0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tabs button{flex:0 0 auto;min-width:62px;font-size:13px;font-weight:600;color:var(--muted);padding:9px 12px;border-radius:9px;transition:.15s;user-select:none;white-space:nowrap}
  .tabs button.on{background:#fff;color:var(--green);box-shadow:0 1px 3px rgba(0,0,0,.07)}
  .summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow);position:relative;overflow:hidden}
  .stat .lab{font-size:10.5px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted)}
  .stat .val{font-size:20px;font-weight:600;margin-top:6px;font-family:"JetBrains Mono",monospace}
  .stat .sub{font-size:11.5px;color:var(--muted);margin-top:3px}
  .stat.accent{border-color:#D8C9A6;background:linear-gradient(180deg,#FCFAF4,#FFF)}.stat.accent .val{color:var(--green)}
  .stat.warn .val{color:var(--warn)}
  .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
  .search{flex:1;min-width:180px;display:flex;align-items:center;gap:9px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:0 12px}
  .search:focus-within{border-color:var(--faint)}.search svg{width:16px;height:16px;color:var(--faint);flex-shrink:0}
  .search input{border:none;outline:none;background:none;font-family:inherit;font-size:14px;color:var(--ink);padding:10px 0;width:100%}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
  .prow{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--line);cursor:pointer;transition:background .12s}
  .prow:last-child{border-bottom:none}.prow:hover{background:#FAFBF9}
  .prow .num{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--faint);width:26px;flex-shrink:0}
  .prow .mid{flex:1;min-width:0}
  .prow .it{font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .prow .meta{font-size:12px;color:var(--muted);margin-top:2px;display:flex;gap:7px;flex-wrap:wrap;align-items:center}
  .prow .amt{text-align:right;flex-shrink:0}
  .prow .amt .pk{font-family:"JetBrains Mono",monospace;font-weight:600;font-size:14px}
  .prow .amt .rmb{font-size:11.5px;color:var(--muted);font-family:"JetBrains Mono",monospace}
  .chip{font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:20px;background:var(--line);color:var(--muted)}
  .chip.cat{background:var(--green-soft);color:var(--green)}
  .st{font-size:10px;font-weight:700;text-transform:uppercase;padding:2px 7px;border-radius:20px}
  .st.Ordered{background:var(--amber-soft);color:var(--amber)}.st.Shipped,.st\.In{background:var(--blue-soft);color:var(--blue)}
  .st.Received,.st.Delivered,.st.OK{background:var(--green-soft);color:var(--paid)}
  .st.Customs,.st.Transit{background:#EFE7F5;color:#6D4C93}
  .vrow{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--line);cursor:pointer}
  .vrow:last-child{border-bottom:none}.vrow:hover{background:#FAFBF9}
  .vrow .vn{font-weight:600;font-size:15px}
  .vrow .vs{font-size:12px;color:var(--muted);margin-top:2px}
  .vrow .bal{text-align:right;font-family:"JetBrains Mono",monospace;font-weight:700}
  .bal.owe{color:var(--warn)}.bal.clear{color:var(--paid)}.bal.adv{color:var(--blue)}
  .empty{padding:52px 20px;text-align:center;color:var(--muted)}
  .empty .big{font-family:"Space Grotesk";font-size:18px;color:var(--ink);font-weight:600;margin-bottom:6px}
  .empty p{max-width:380px;margin:0 auto 16px;font-size:14px}
  .footbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-top:18px;flex-wrap:wrap}
  .footbar .note{font-size:12px;color:var(--faint)}.footbar .r{display:flex;gap:8px;flex-wrap:wrap}
  .as-dot{width:7px;height:7px;border-radius:50%;display:inline-block}.as-dot.off{background:var(--faint)}.as-dot.on{background:#22C55E;box-shadow:0 0 0 3px rgba(34,197,94,.18)}.as-dot.warn{background:var(--gold)}
  #autoSaveBtn{gap:8px}
  .scrim{position:fixed;inset:0;background:rgba(22,33,31,.34);backdrop-filter:blur(2px);z-index:40;display:flex;opacity:0;pointer-events:none;transition:opacity .26s var(--ease)}
  .scrim.show{opacity:1;pointer-events:auto}
  .modal{background:var(--panel);border-radius:16px;box-shadow:0 20px 60px rgba(22,33,31,.28);width:min(480px,calc(100% - 28px));margin:auto;max-height:92vh;overflow:auto;transform:translateY(14px) scale(.97);opacity:0;transition:transform .3s var(--ease),opacity .3s var(--ease)}
  .scrim.show .modal{transform:none;opacity:1}
  .m-head{padding:18px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px}
  .m-head h2{font-family:"Space Grotesk";font-size:17px;font-weight:600;margin:0}
  .m-body{padding:18px 20px}.m-foot{padding:14px 20px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;background:#FCFDFB;flex-wrap:wrap}
  label.fld{display:block;margin-bottom:13px}
  label.fld .lt{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px}
  .inp{width:100%;font-family:inherit;font-size:14px;color:var(--ink);padding:10px 12px;border:1px solid var(--line-strong);border-radius:10px;background:#fff;transition:.15s}
  .inp:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px var(--green-soft)}
  .inp.mono{font-family:"JetBrains Mono",monospace}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:12px}.three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
  .calc{background:var(--paper);border-radius:11px;padding:12px 14px;margin:2px 0 14px;font-size:13px;display:flex;flex-direction:column;gap:5px}
  .calc .r{display:flex;justify-content:space-between}.calc .r .v{font-family:"JetBrains Mono",monospace;font-weight:600}
  .calc .r.big .v{font-size:16px;color:var(--green)}
  .hint{font-size:12px;color:var(--faint);margin:-4px 0 12px}
  .txn{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);font-size:13px}
  .txn:last-child{border-bottom:none}
  .txn .ic{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;flex-shrink:0}
  .txn.buy .ic{background:var(--warn-soft);color:var(--warn)}.txn.pay .ic{background:var(--green-soft);color:var(--paid)}
  .txn .a{margin-left:auto;font-family:"JetBrains Mono",monospace;font-weight:600}
  .detail-sum{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
  .detail-sum .cell{background:var(--paper);border:1px solid var(--line);border-radius:11px;padding:11px 12px}
  .detail-sum .l{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:600}
  .detail-sum .v{font-size:16px;font-weight:600;margin-top:4px;font-family:"JetBrains Mono",monospace}
  .taglist{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
  .taglist .t{font-size:12px;background:var(--line);border-radius:7px;padding:5px 9px;display:flex;align-items:center;gap:6px}
  .taglist .t button{color:var(--warn);font-weight:700}
  .seg{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
  .seg button{font-size:12px;font-weight:600;color:var(--muted);padding:6px 11px;border-radius:8px;border:1px solid var(--line-strong)}
  .seg button.on{background:var(--green);color:#fff;border-color:var(--green)}
  .ios-steps{list-style:none;padding:0;margin:8px 0 0;counter-reset:s}
  .ios-steps li{display:flex;gap:11px;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--line);font-size:13.5px}
  .ios-steps li:last-child{border-bottom:none}
  .ios-steps li::before{counter-increment:s;content:counter(s);flex-shrink:0;width:24px;height:24px;border-radius:7px;background:var(--green-soft);color:var(--green);font-weight:700;font-size:12px;display:grid;place-items:center;font-family:"Space Grotesk"}
  .kbd{display:inline-flex;background:var(--line);border-radius:6px;padding:1px 6px;font-weight:600;font-size:12px}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;font-size:13.5px;font-weight:500;padding:11px 18px;border-radius:11px;box-shadow:0 10px 30px rgba(0,0,0,.25);z-index:60;opacity:0;transition:.25s;display:flex;align-items:center;gap:9px}
  .toast.show{opacity:1;transform:translateX(-50%)}.toast svg{width:16px;height:16px;color:#7FDCB6}
  @media (max-width:640px){ .summary{grid-template-columns:1fr 1fr} .brand .org{max-width:90px} .three{grid-template-columns:1fr 1fr} }
  @media (display-mode:standalone){ header.top{background:var(--paper)} }
  @media (prefers-reduced-motion:reduce){ *{transition:none!important;animation:none!important} }
  /* spreadsheet grid */
  .gridwrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--line);border-radius:var(--radius);background:var(--panel);box-shadow:var(--shadow)}
  table.grid{border-collapse:collapse;width:max-content;min-width:100%;font-size:13px}
  table.grid th{position:sticky;top:0;background:#F0F2EF;color:var(--muted);font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;text-align:left;padding:9px 8px;border-bottom:1px solid var(--line-strong);white-space:nowrap;z-index:1}
  table.grid td{border-bottom:1px solid var(--line);border-right:1px solid #F0F1EF;padding:0;vertical-align:middle}
  table.grid tr:last-child td{border-bottom:none}
  table.grid td.num{color:var(--faint);font-family:"JetBrains Mono",monospace;text-align:center;padding:0 6px;width:34px}
  table.grid input,table.grid select{border:none;background:transparent;font-family:inherit;font-size:13px;color:var(--ink);padding:9px 8px;width:100%;outline:none;border-radius:0}
  table.grid input.mono{font-family:"JetBrains Mono",monospace}
  table.grid input:focus,table.grid select:focus{background:var(--green-soft);box-shadow:inset 0 0 0 2px var(--green)}
  table.grid td.calc{font-family:"JetBrains Mono",monospace;font-weight:600;color:var(--green);text-align:right;padding:9px 10px;white-space:nowrap;background:#FAFBF9}
  table.grid td.del{text-align:center;width:34px}
  table.grid td.del button{color:var(--warn);padding:8px;width:100%}
  table.grid td.del button:hover{background:var(--warn-soft)}
  .cw-item{min-width:150px}.cw-cat{min-width:110px}.cw-vendor{min-width:120px}.cw-num{min-width:66px}.cw-status{min-width:120px}.cw-fwd{min-width:110px}.cw-date{min-width:130px}
  .gridbar{display:flex;gap:10px;align-items:center;margin:12px 0}
  .gridbar .cnt{font-size:12px;color:var(--faint);margin-left:auto}

  .grid td.num{padding:0}
  .rowmenu{width:100%;min-width:30px;padding:9px 4px;font-family:"JetBrains Mono",monospace;font-size:11.5px;
           font-weight:700;color:var(--muted);border-radius:6px;transition:.13s;position:relative}
  .rowmenu:hover{background:var(--green-soft);color:var(--green)}
  .rowmenu::after{content:"⋮";position:absolute;right:2px;top:50%;transform:translateY(-50%);
                  font-size:11px;color:var(--faint);opacity:.6}
  .grid th:first-child, .grid td:first-child{position:sticky;left:0;z-index:2;background:var(--panel)}
  .grid th:first-child{background:var(--green)}
  .grid th:nth-child(2), .grid td:nth-child(2){position:sticky;left:34px;z-index:2;background:var(--panel);
           box-shadow:1px 0 0 var(--line)}
  .grid th:nth-child(2){background:var(--green)}
  .sheet-tip{font-size:11.5px;color:var(--muted);margin:0 0 9px;display:flex;align-items:center;gap:6px}

  /* ═══════ PREMIUM MOTION ═══════ */
  :root{ --spring:cubic-bezier(.34,1.4,.44,1); --glide:cubic-bezier(.22,.61,.36,1); }
  @keyframes rise{ from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }
  #view > *{animation:rise .45s var(--glide) .08s both}
  .btn{transition:border-color .16s, background .16s, transform .18s var(--spring)}
  .btn:active{transform:scale(.96)}
  .prow, .vrow{transition:background .16s, transform .2s var(--glide)}
  .prow:hover, .vrow:hover{transform:translateX(3px)}
  .tabs button{transition:color .18s, background .22s var(--glide), box-shadow .22s}
  .scrim .modal{transition:.34s var(--spring)}
  @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}

  /* ═══════════ SIGNATURE LOOK — PURCHASES ═══════════ */

  header{border-bottom:2px solid var(--gold)}
  .brand .mark b{color:var(--gold)}

  /* stat cards: colour identities */
  .stat{border:none;color:#fff;position:relative;overflow:hidden;border-radius:15px}
  .stat::after{content:"";position:absolute;right:-20px;bottom:-28px;width:92px;height:92px;
               border-radius:50%;background:rgba(255,255,255,.08)}
  .stat .lab{color:rgba(255,255,255,.75)}
  .stat .sub{color:rgba(255,255,255,.65)}
  .stat .val{color:#fff!important}
  .stat{background:linear-gradient(135deg,#115C4E,#072A24);box-shadow:0 10px 24px rgba(14,79,68,.28)}
  .stat.accent{background:linear-gradient(135deg,#C89B4B,#96702B);box-shadow:0 10px 24px rgba(176,138,62,.30)}
  .stat:nth-child(2){background:linear-gradient(135deg,#2E8F68,#19624B);box-shadow:0 10px 24px rgba(46,125,91,.28)}
  .stat:nth-child(3){background:linear-gradient(135deg,#C25B37,#8F3A20);box-shadow:0 10px 24px rgba(176,73,44,.28)}

  /* tabs */
  .tabs button.on{background:linear-gradient(135deg,#115C4E,#0A3E35);color:#fff;
                  box-shadow:0 4px 12px rgba(14,79,68,.28)}

  /* primary buttons + grid header */
  .btn.primary{background:linear-gradient(135deg,#115C4E,#0A3E35);border:none;
               box-shadow:0 4px 12px rgba(14,79,68,.25)}
  .grid thead th{background:linear-gradient(135deg,#115C4E,#0A3E35)!important}
  .grid th:first-child, .grid th:nth-child(2){background:linear-gradient(135deg,#115C4E,#0A3E35)!important}

  /* modal header brand band */
  .m-head{background:linear-gradient(135deg,#115C4E,#0A3E35);border-bottom:2px solid var(--gold)}
  .m-head h2{color:#fff}
  .m-head .btn.ghost{color:rgba(255,255,255,.85)}
  .m-head .btn.ghost:hover{background:rgba(255,255,255,.12)}

  /* cards: gradient edge */
  .card{position:relative;border:none;box-shadow:0 1px 2px rgba(15,25,23,.05),0 8px 24px rgba(15,25,23,.07)}
  .card::before{content:"";position:absolute;inset:0;border-radius:var(--radius);padding:1px;
    background:linear-gradient(150deg,rgba(14,79,68,.22),rgba(176,138,62,.18) 60%,transparent);
    -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
    -webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;z-index:1}

  .ship-stat{background:none;border:none;padding:0;cursor:pointer}
  .ship-stat .st{cursor:pointer;transition:transform .15s var(--spring)}
  .ship-stat:active .st{transform:scale(.94)}
</style>
</head>
<body>
<header class="top">
  <div class="top-inner">
    <div class="brand"><span class="mark grot">Pur<b>chases</b></span><span class="org" id="orgName" title="Click to rename">Shakeel Electronics</span></div>
    <span class="rate-badge" id="rateBadge" title="Tap to change the RMB→PKR rate">¥1 = Rs 42.75</span>
    <button class="btn install" id="installBtn" style="display:none">Install</button>
    <button class="btn primary" id="addBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add purchase</button>
  </div>
</header>
<div class="wrap">
  <div class="tabs" id="tabs">
    <button data-tab="purchases" class="on">Sheet</button>
    <button data-tab="tobuy">To-buy</button>
    <button data-tab="category">Category</button>
    <button data-tab="prices">Prices</button>
    <button data-tab="pos">PO</button>
    <button data-tab="tracking">Track</button>
    <button data-tab="vendors">Vendors</button>
    <button data-tab="payments">Pay</button>
    <button data-tab="summary">More</button>
  </div>
  <div id="view"></div>
  <div class="footbar">
    <div style="display:flex;flex-direction:column;gap:3px"><span class="note" id="storageNote"></span><span class="note" id="autoSaveNote"></span></div>
    <div class="r">
      <button class="btn ghost sm" id="settingsBtn">Settings</button>
      <button class="btn ghost sm" id="autoSaveBtn"><span class="as-dot off"></span>Auto-save to folder</button>
      <button class="btn ghost sm" id="importBtn">Import backup</button>
      <button class="btn ghost sm" id="exportCsvBtn">Export CSV</button>
      <button class="btn ghost sm" id="pBkBtn">🛟 Snapshots</button>
      <button class="btn ghost sm" id="exportJsonBtn">Backup data</button>
      <input type="file" id="importFile" accept="application/json" style="display:none"/>
    </div>
  </div>
</div>
<div class="scrim" id="scrim"></div>
<div class="toast" id="toast"></div>
<script>
/* ============================================================
   Purchases & Suppliers — import/purchase register (RMB→PKR)
   ============================================================ */
const KEY="purchases:data:v1";
const hasStore=(typeof window!=="undefined" && window.storage && typeof window.storage.get==="function");
const SEED={
  categories:["TCON","COF","SCALER","USED COF","ACF TAPES","LVDS","TAPES","OTHERS"],
  vendors:["CWZ","MEET","LI","NEW SLICE","23LA","GREEN","DOG","JENNY","RED","GZZ","NEW TCON","TANG","BALD","KEIDA","TJKJ","TEA","SHARP","MAY","BELLA","WAQAR","AAA","Reel Cof","ORANGE TCON","Cheiming","QUARTZ"],
  methods:["Bank Transfer","Cash","Alipay","WeChat Pay","Western Union","Other"],
  types:["Full Payment","Partial Payment","Advance"],
  statuses:["Ordered","Shipped","At Forwarder","In Transit","Customs","Received","Delivered"],
  forwarders:[]
};
const State={
  settings:{ org:"Shakeel Electronics", rate:42.75, currency:"Rs", countryCode:"92",
    categories:SEED.categories.slice(), vendors:SEED.vendors.slice(), methods:SEED.methods.slice(),
    types:SEED.types.slice(), statuses:SEED.statuses.slice(), forwarders:SEED.forwarders.slice(), seeded:false, autoSaveFolder:null, currentShipment:26, nextPO:1 },
  purchases:[], // {id,date,category,vendor,forwarder,item,qty,priceRMB,rate,status,createdAt,updatedAt}
  payments:[],  // {id,date,vendor,type,paidRMB,rate,method,ref,notes,createdAt}
  needs:[],     // {id,item,category,qty,targetRMB,note,createdAt}
  pos:[],       // {id,number,vendor,date,rate,lines:[{item,qty,priceRMB}],note,createdAt}
  tracking:[],  // {id,date,fromVendor,forwarder,item,qty,weight,status,createdAt}
  shipments:[], // {id,no,openedAt,closedAt}
  receives:[], // {id,shipment,date,count,pcs}
};
let ui={ tab:"purchases", search:"", statusFilter:"", vendorFilter:"" };

/* ---------- storage ---------- */
async function load(){
  let d=null;
  if(hasStore){ try{ const r=await window.storage.get(KEY); if(r&&r.value) d=JSON.parse(r.value); }catch(e){} }
  if(!d) d=lsLoad();
  if(d){ State.settings=Object.assign(State.settings,d.settings||{}); State.purchases=d.purchases||[]; State.payments=d.payments||[]; State.needs=d.needs||[]; State.pos=d.pos||[]; State.tracking=d.tracking||[]; State.shipments=d.shipments||[]; State.receives=d.receives||[]; }
  ["categories","vendors","methods","types","statuses"].forEach(k=>{ if(!State.settings[k]||!State.settings[k].length) State.settings[k]=SEED[k].slice(); });
  if(!State.settings.forwarders) State.settings.forwarders=[];
  // make sure the newer statuses (e.g. At Forwarder) are available
  if(!State.settings.statuses.includes("At Forwarder")) State.settings.statuses=SEED.statuses.slice();
  if(!Array.isArray(State.needs)) State.needs=[]; if(!Array.isArray(State.pos)) State.pos=[];
  if(!Array.isArray(State.shipments)) State.shipments=[];
  if(!Array.isArray(State.receives)) State.receives=[];
  if(!State.settings.currentShipment) State.settings.currentShipment=26;
  if(!State.shipments.some(s=>s.no===State.settings.currentShipment))
    State.shipments.push({id:uid(),no:State.settings.currentShipment,openedAt:Date.now(),closedAt:null});
  // tag any legacy rows with the current shipment
  const cs=State.settings.currentShipment;
  State.purchases.forEach(p=>{ if(p.shipment==null) p.shipment=cs; });
  State.payments.forEach(p=>{ if(p.shipment==null) p.shipment=cs; });
  State.pos.forEach(p=>{ if(p.shipment==null) p.shipment=cs; });
  State.tracking.forEach(p=>{ if(p.shipment==null) p.shipment=cs; });
  if(ui.shipView===undefined) ui.shipView=State.settings.currentShipment;
}
function lsLoad(){ try{ const s=localStorage.getItem(KEY); return s?JSON.parse(s):null; }catch(e){ return null; } }
function lsSave(){ try{ localStorage.setItem(KEY,JSON.stringify(State)); return true; }catch(e){ return false; } }
let saveTimer=null,storageOK=true;
async function save(){ let ok=false; if(hasStore){ try{ await window.storage.set(KEY,JSON.stringify(State)); ok=true; }catch(e){} } if(lsSave()) ok=true; storageOK=ok; updateStorageNote(); }
function persist(){ State.settings.updatedAt=Date.now(); clearTimeout(saveTimer); saveTimer=setTimeout(save,120); if(dirHandle) writeToFolder(false); }
function updateStorageNote(){ const el=document.getElementById("storageNote"); if(!el) return;
  if(window.__cloudActive) return;
  if(!storageOK){ el.innerHTML=`<span style="color:var(--warn)">⚠ Couldn't save on this device — use “Backup data”.</span>`; }
  else if(dirHandle&&State.settings.autoSaveFolder){ el.textContent=""; } else { el.textContent="Saved automatically on this device."; } }
function applyLoaded(d){ if(!d) return; State.settings=Object.assign(State.settings,d.settings||{}); for(const k of Object.keys(State)){ if(k!=="settings"&&Array.isArray(State[k])&&Array.isArray(d[k])) State[k]=d[k]; } }

/* ---------- helpers ---------- */
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
function esc(s){ return String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
const C=()=>State.settings.currency;
function money(n){ const s=Math.abs(n).toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:0}); return (n<0?"-":"")+s; }
function money2(n){ const s=Math.abs(n).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}); return (n<0?"-":"")+s; }
function localISO(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }
const todayISO=()=>localISO(new Date());
function pTotals(p){ const rmb=(p.qty||0)*(p.priceRMB||0); const rate=p.rate||State.settings.rate; const fr=p.freightPP||0; const unit=(p.priceRMB||0)*rate+fr; return { rmb, pkr:rmb*rate+fr*(p.qty||0), unit, freight:fr }; }
function vendorBalance(v){ // in RMB: purchased - paid  (positive = we still owe)
  const bought=sPurchases().filter(p=>p.vendor===v).reduce((s,p)=>s+(p.qty||0)*(p.priceRMB||0),0);
  const paid=sPayments().filter(x=>x.vendor===v).reduce((s,x)=>s+(x.paidRMB||0),0);
  return { bought, paid, balance: bought-paid };
}
function waNumber(phone){ if(!phone) return ""; let d=String(phone).replace(/[^\d+]/g,""); const cc=(State.settings.countryCode||"92").replace(/\D/g,""); if(d.startsWith("+"))d=d.slice(1); else if(d.startsWith("00"))d=d.slice(2); else if(d.startsWith("0"))d=cc+d.slice(1); else if(!d.startsWith(cc)&&d.length<=10)d=cc+d; return d; }

/* ---------- render ---------- */
function render(){
  document.getElementById("orgName").textContent=State.settings.org;
  document.getElementById("rateBadge").textContent=`¥1 = Rs ${State.settings.rate}`;
  document.querySelectorAll("#tabs [data-tab]").forEach(b=>b.classList.toggle("on",b.dataset.tab===ui.tab));
  if(ui.tab==="purchases") renderPurchases();
  else if(ui.tab==="tobuy") renderToBuy();
  else if(ui.tab==="category") renderCategory();
  else if(ui.tab==="prices") renderPrices();
  else if(ui.tab==="pos") renderPOs();
  else if(ui.tab==="tracking") renderTracking();
  else if(ui.tab==="vendors") renderVendors();
  else if(ui.tab==="payments") renderPayments();
  else renderSummary();
}
function statTiles(){
  const cur=C();
  let totPKR=0, paidPKR=0;
  for(const p of sPurchases()){ totPKR+=pTotals(p).pkr; }
  for(const x of sPayments()){ paidPKR+=(x.paidRMB||0)*(x.rate||State.settings.rate); }
  let oweRMB=0; for(const v of vendorSet()){ const b=vendorBalance(v).balance; if(b>0) oweRMB+=b; }
  return `<div class="summary">
    <div class="stat accent"><div class="lab">Total purchased</div><div class="val">${cur} ${money(totPKR)}</div><div class="sub">${sPurchases().length} line${sPurchases().length===1?"":"s"}</div></div>
    <div class="stat"><div class="lab">Paid to vendors</div><div class="val" style="color:var(--paid)">${cur} ${money(paidPKR)}</div><div class="sub">${sPayments().length} payment${sPayments().length===1?"":"s"}</div></div>
    <div class="stat warn"><div class="lab">You still owe</div><div class="val">¥ ${money(oweRMB)}</div><div class="sub">${cur} ${money(oweRMB*State.settings.rate)}</div></div>
    <div class="stat"><div class="lab">Vendors</div><div class="val">${vendorSet().size}</div><div class="sub">active</div></div>
  </div>`;
}
function vendorSet(){ const s=new Set(); sPurchases().forEach(p=>p.vendor&&s.add(p.vendor)); sPayments().forEach(p=>p.vendor&&s.add(p.vendor)); return s; }

function curShip(){ return (ui.shipView!=null?ui.shipView:State.settings.currentShipment); }
function sPurchases(){ return State.purchases.filter(p=>p.shipment===curShip()); }
function sPayments(){ return State.payments.filter(p=>p.shipment===curShip()); }
function sPos(){ return State.pos.filter(p=>p.shipment===curShip()); }
function sTracking(){ return State.tracking.filter(p=>p.shipment===curShip()); }
function shipObj(no){ return State.shipments.find(s=>s.no===no); }
function shipLabel(no){ const s=shipObj(no); return (s&&s.name&&s.name.trim()) ? s.name.trim() : ("INVOICE NO "+no); }
function ensureShip(no){ let s=shipObj(no); if(!s){ s={id:uid(),no,openedAt:Date.now(),closedAt:null,status:"Open"}; State.shipments.push(s); } return s; }
function shipNos(){ var seen={},out=[]; State.shipments.forEach(function(s){ if(s&&s.no!=null && !seen[s.no]){ seen[s.no]=1; out.push(s.no); } }); return out.sort((a,b)=>b-a); }
function shipRows(no){ return State.purchases.filter(p=>p.shipment===no); }
const SHIP_STAGES=["Open","Ordered","Paid","Shipped","Arrived","Closed"];
function shipStatusOf(no){ const s=shipObj(no); if(s&&s.status) return s.status;
  return no===State.settings.currentShipment ? "Open" : "Closed"; }
function shipStatusColor(st){
  return {Open:["#E6F0EC","#0E4F44"],Ordered:["#FBF3E2","#8A6A2A"],Paid:["#E4F1EA","#2E7D5B"],
          Shipped:["#E4F0F4","#1F6F8B"],Arrived:["#E6F0EC","#0E4F44"],Closed:["#EEEFEC","#6B7975"]}[st]||["#EEEFEC","#6B7975"];
}
function shipStatusPill(no){
  const st=shipStatusOf(no); const c=shipStatusColor(st);
  return `<span class="st" style="background:${c[0]};color:${c[1]};font-weight:700">${st.toUpperCase()} ▾</span>`;
}
function setShipStatus(no){
  const cur=shipStatusOf(no);
  openScrim(`<div class="m-head"><h2>Invoice status — ${esc(shipLabel(no))}</h2>
      <button class="btn ghost close" data-close style="margin-left:auto">✕</button></div>
    <div class="m-body">
      <div class="hint" style="margin-top:0">Set where this invoice is in the process. Each invoice keeps its own status.</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        ${SHIP_STAGES.map(st=>{ const c=shipStatusColor(st);
          return `<button class="btn" data-ship-st="${st}" style="justify-content:flex-start;gap:9px;${cur===st?`border-color:${c[1]};background:${c[0]}`:""}">
            <span style="width:10px;height:10px;border-radius:50%;background:${c[1]};flex:none"></span>${st}</button>`;}).join("")}
      </div>
    </div>`);
  scrim.querySelectorAll("[data-ship-st]").forEach(b=>b.onclick=()=>{
    let s=shipObj(no);
    if(!s){ s={id:uid(),no,openedAt:Date.now(),closedAt:null}; State.shipments.push(s); }
    s.status=b.dataset.shipSt;
    if(b.dataset.shipSt==="Closed") s.closedAt=Date.now(); else s.closedAt=null;
    persist(); render(); closeScrim(); toast("Status: "+b.dataset.shipSt);
  });
}
function shipBarHTML(){
  const nos=shipNos(); const sel=ui.shipView;
  const isOpen = sel===State.settings.currentShipment;
  const rows=shipRows(sel); let tot=0; rows.forEach(p=>tot+=pTotals(p).pkr);
  return `<div class="card" style="padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:linear-gradient(180deg,#FCFAF4,#fff);border-color:#E4D3A8">
    <div style="display:flex;align-items:center;gap:8px">
      <span style="font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)">Shipment</span>
      <select class="inp" id="shipSel" style="width:auto;padding:6px 10px;font-weight:700">${nos.map(n=>`<option value="${n}" ${n===sel?"selected":""}>${esc(shipLabel(n))}</option>`).join("")}</select>
      <button class="ship-stat" id="shipStat">${shipStatusPill(sel)}</button>
    </div>
    <span style="font-size:12.5px;color:var(--muted)">${rows.length} items · <b class="mono" style="color:var(--green)">${C()} ${money(tot)}</b></span>
    <div style="margin-left:auto;display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn ghost sm" id="shipManage" title="Rename or delete this invoice">⚙</button>
      <button class="btn sm" id="sumBtn">📄 Purchase PDF</button>
      <button class="btn primary sm" id="receiveBtn">📥 Receive → StockBox</button>
      <button class="btn sm" id="xlsBtn">📊 Excel</button>
      <button class="btn sm" id="arrivalBtn">📦 New arrival PDF</button>

function manageShipment(no){
  const s=shipObj(no); if(!s) return;
  const rows=shipRows(no); let tot=0; rows.forEach(p=>tot+=pTotals(p).pkr);
  const isCur = no===State.settings.currentShipment;
  openScrim(`<div class="m-head"><h2>Manage invoice</h2><button class="btn ghost close" data-close style="margin-left:auto">✕</button></div>
    <div class="m-body">
      <div class="detail-sum" style="margin-bottom:14px">
        <div class="cell"><div class="l">Items</div><div class="v">${rows.length}</div></div>
        <div class="cell"><div class="l">Value</div><div class="v" style="font-size:14px">${C()} ${money(tot)}</div></div>
        <div class="cell"><div class="l">Status</div><div class="v" style="font-size:13px;color:${isCur?"var(--green)":"var(--muted)"}">${isCur?"OPEN":"CLOSED"}</div></div>
      </div>
      <label class="fld"><span class="lt">Invoice name</span><input class="inp" id="sh-name" value="${esc(s.name||"")}" placeholder="INVOICE NO ${no}"></label>
      <div class="hint">Leave blank to use the default name “INVOICE NO ${no}”. Each invoice keeps its own separate items.</div>
    </div>
    <div class="m-foot">
      <button class="btn danger" id="sh-del" style="margin-right:auto">Delete invoice</button>
      <button class="btn" data-close>Cancel</button>
      <button class="btn primary" id="sh-save">Save</button>
    </div>`);
  document.getElementById("sh-save").onclick=()=>{
    s.name=document.getElementById("sh-name").value.trim();
    persist(); renderPurchases(); closeScrim(); toast("Invoice renamed");
  };
  document.getElementById("sh-del").onclick=()=>{
    if(State.shipments.length<=1){ flash("You need at least one invoice"); return; }
    if(!confirm(`Delete "${shipLabel(no)}"?\n\nThis permanently removes its ${rows.length} item${rows.length===1?"":"s"}. This cannot be undone.`)) return;
    if(window.__pTombstone) State.purchases.forEach(function(p){ if(p.shipment===no) window.__pTombstone("purchase",p.id); });
    State.purchases=State.purchases.filter(p=>p.shipment!==no);
    State.payments=State.payments.filter(p=>p.shipment!==no);
    State.pos=State.pos.filter(p=>p.shipment!==no);
    State.tracking=State.tracking.filter(p=>p.shipment!==no);
    State.shipments=State.shipments.filter(x=>x.no!==no);
    if(State.settings.currentShipment===no){
      const remaining=State.shipments.map(x=>x.no).sort((a,b)=>b-a);
      State.settings.currentShipment=remaining[0];
    }
    ui.shipView=State.settings.currentShipment;
    persist(); renderPurchases(); closeScrim(); toast("Invoice deleted");
  };
}
function finishShipment(){
  const cur=State.settings.currentShipment;
  const rows=shipRows(cur);
  if(!confirm(`Finish "${shipLabel(cur)}" (${rows.length} items) and start a new empty invoice?\n\nThe old one stays saved — open it anytime from the dropdown.`)) return;
  const s=State.shipments.find(x=>x.no===cur); if(s) s.closedAt=Date.now();
  const next=cur+1;
  State.settings.currentShipment=next;
  State.shipments.push({id:uid(),no:next,openedAt:Date.now(),closedAt:null});
  ui.shipView=next;
  persist(); renderPurchases(); toast(`Started ${shipLabel(next)} — empty and ready`);
}
function wireGrid(rerender){
  rerender = rerender || renderPurchases;
  const body=document.getElementById("gridBody"); if(!body) return;
  body.querySelectorAll("[data-rowmenu]").forEach(b=>b.onclick=e=>{
    e.stopPropagation(); e.preventDefault(); rowMenu(b.dataset.rowmenu);
  });
  body.querySelectorAll("tr[data-row]").forEach(tr=>{
    const p=State.purchases.find(x=>x.id===tr.dataset.row); if(!p) return;
    const recalc=()=>{ const cell=tr.querySelector("[data-total]"); if(cell) cell.textContent=money(pTotals(p).pkr); };
    tr.querySelectorAll("[data-f]").forEach(inp=>{
      const f=inp.dataset.f;
      const commit=()=>{ let val=inp.value; if(["qty","priceRMB","rate","freightPP"].includes(f)) val=parseFloat(val)||0; p[f]=val; p.updatedAt=Date.now(); persist(); };
      inp.addEventListener("input",()=>{ if(["qty","priceRMB","rate","freightPP"].includes(f)){ p[f]=parseFloat(inp.value)||0; recalc(); } });
      inp.addEventListener("change",commit);
      inp.addEventListener("blur",commit);
    });
    const delBtn=tr.querySelector("[data-del]");
    if(delBtn) delBtn.onclick=(e)=>{
      e.stopPropagation();
      if(confirm(`Delete "${p.item||"this row"}"?`)){
        if(window.__pTombstone) window.__pTombstone("purchase",p.id);
        State.purchases=State.purchases.filter(x=>x.id!==p.id);
        persist(); rerender(); toast("Row deleted");
      }
    };
  });
}

function renderSummary(){

  // by category
  const cat={}; for(const p of sPurchases()){ const t=pTotals(p); cat[p.category]=(cat[p.category]||0)+t.pkr; }
  const catRows=Object.entries(cat).sort((a,b)=>b[1]-a[1]);
  const maxCat=Math.max(1,...catRows.map(r=>r[1]));

  const owe=[...vendorSet()].map(n=>({n,b:vendorBalance(n).balance})).filter(x=>x.b>0.001).sort((a,b)=>b.b-a.b);

  html+=`</div>`;
  html+=`<div class="card" style="padding:16px"><div class="lab" style="font-size:10.5px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:12px">Balances you owe (top)</div>`;

  html+=`</div>`;
  v.innerHTML=html;

function vendorPO(name){

  doc.setFont("helvetica","normal"); doc.setFontSize(10); doc.setTextColor(20,20,20);

    doc.text(String(it.item||"").slice(0,42),L+4,y); doc.text(String(it.qty),R-190,y,{align:"right"}); doc.text(money2(it.priceRMB),R-120,y,{align:"right"}); doc.text(money2(rmb),R,y,{align:"right"});

  toast("Purchase order PDF saved");
}

  if(existing) document.getElementById("po-del").onclick=()=>{ if(confirm("Delete this purchase order?")){ State.pos=State.pos.filter(x=>x.id!==existing.id); persist(); render(); closeScrim(); toast("Deleted"); } };
}
function openPOView(po){
  if(!po) return; const cur=C(); const t=poTotal(po); const rate=po.rate||State.settings.rate;
  openScrim(`<div class="m-head"><h2>${esc(po.number||"Purchase order")}</h2><button class="btn ghost close" data-close style="margin-left:auto">✕</button></div>
    <div class="m-body">
      <div class="detail-sum"><div class="cell"><div class="l">Vendor</div><div class="v" style="font-size:14px">${esc(po.vendor)}</div></div><div class="cell"><div class="l">Items</div><div class="v">${po.lines.length}</div></div><div class="cell"><div class="l">Total</div><div class="v">¥ ${money2(t)}</div></div></div>
      ${po.lines.map(l=>`<div class="txn buy"><div class="ic">▲</div><div><div style="font-weight:500">${esc(l.item)}</div><div style="font-size:11.5px;color:var(--muted)">${l.qty} × ¥${money2(l.priceRMB)}</div></div><div class="a">¥${money2(l.qty*l.priceRMB)}</div></div>`).join("")}
      ${po.note?`<div class="hint" style="margin-top:10px">📝 ${esc(po.note)}</div>`:""}
    </div>
    <div class="m-foot" style="justify-content:space-between"><div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn primary sm" id="po-prev">Preview</button><button class="btn sm" id="po-pdf">Save PDF</button><button class="btn wa sm" id="po-wa">WhatsApp</button><button class="btn sm" id="po-edit">Edit</button></div><button class="btn danger sm" id="po-del2">Delete</button></div>`);
  document.getElementById("po-prev").onclick=()=>poPreview(po);
  document.getElementById("po-pdf").onclick=()=>poPDF(po);
  document.getElementById("po-wa").onclick=()=>{ const txt=`${State.settings.org} — ${po.number}\nVendor: ${po.vendor}\n`+po.lines.map(l=>`• ${l.qty}× ${l.item} @¥${money2(l.priceRMB)}`).join("\n")+`\nTotal: ¥${money2(t)}`; const a=document.createElement("a"); a.href=`https://wa.me/?text=${encodeURIComponent(txt)}`; a.target="_blank"; a.rel="noopener"; document.body.appendChild(a); a.click(); a.remove(); };
  document.getElementById("po-edit").onclick=()=>openPO(po);
  document.getElementById("po-del2").onclick=()=>{ if(confirm("Delete this PO?")){ State.pos=State.pos.filter(x=>x.id!==po.id); persist(); render(); closeScrim(); toast("Deleted"); } };
}

function docMeta(){
  const s=State.settings||{};
  return {
    org: s.org || "Shakeel Electronics",
    tagline: s.tagline || "Wholesale dealer in COF · ACF Tape · PCB · Bonding Machine",
    addr: s.addr || "Faisalabad, Pakistan",
    phone: s.phone || "0312-6617887",
    email: s.email || "",
    terms: s.terms || ""
  };
}
/* letterhead — returns the y position to start content at */
function letterhead(doc, title, rightLines){
  const M=docMeta();
  doc.setFillColor(...BRAND.green); doc.rect(0,0,595,96,"F");
  try{ doc.addImage(LOGO,"PNG",40,20,54,54); }catch(e){}
  doc.setFont("helvetica","bold"); doc.setFontSize(17); doc.setTextColor(255,255,255);
  doc.text(M.org.toUpperCase(), 106, 40);
  doc.setFont("helvetica","normal"); doc.setFontSize(7.6); doc.setTextColor(159,196,185);
  doc.text(M.tagline.toUpperCase(), 106, 54);
  doc.setFontSize(8.4); doc.setTextColor(200,220,213);
  doc.text([M.addr, M.phone + (M.email? "  ·  "+M.email : "")].filter(Boolean).join("   ·   "), 106, 70);
  // right block
  doc.setFont("helvetica","bold"); doc.setFontSize(12); doc.setTextColor(232,217,174);
  doc.text(title.toUpperCase(), 555, 38, {align:"right"});
  doc.setFont("helvetica","normal"); doc.setFontSize(8.6); doc.setTextColor(200,220,213);
  let ry=54;
  for(const l of (rightLines||[])){ doc.text(l, 555, ry, {align:"right"}); ry+=12; }
  doc.setFillColor(...BRAND.gold); doc.rect(0,96,595,3.5,"F");
  return 126;
}
/* party block (Bill to / Vendor) */
function partyBlock(doc, y, label, lines){
  doc.setFont("helvetica","bold"); doc.setFontSize(7.6); doc.setTextColor(...BRAND.muted);
  doc.text(label.toUpperCase(), 40, y);
  y+=15; doc.setFontSize(13); doc.setTextColor(...BRAND.ink);
  doc.text(lines[0]||"", 40, y);
  doc.setFont("helvetica","normal"); doc.setFontSize(9.5); doc.setTextColor(...BRAND.muted);
  for(let i=1;i<lines.length;i++){ y+=13; doc.text(lines[i]||"", 40, y); }
  return y+22;
}
/* table header */
function tableHead(doc, y, cols){
  doc.setFillColor(...BRAND.green); doc.rect(40, y-13, 515, 20, "F");
  doc.setFont("helvetica","bold"); doc.setFontSize(8); doc.setTextColor(255,255,255);
  for(const c of cols) doc.text(c.t, c.x, y, c.a?{align:c.a}:undefined);
  return y+18;
}
/* totals box */
function totalBox(doc, y, label, value, sub){
  doc.setFillColor(...BRAND.green); doc.roundedRect(330, y-16, 225, sub?52:38, 7, 7, "F");
  doc.setFont("helvetica","normal"); doc.setFontSize(9); doc.setTextColor(159,196,185);
  doc.text(label.toUpperCase(), 344, y);
  doc.setFont("helvetica","bold"); doc.setFontSize(16); doc.setTextColor(255,255,255);
  doc.text(String(value), 541, y+2, {align:"right"});
  if(sub){ doc.setFont("helvetica","normal"); doc.setFontSize(8.5); doc.setTextColor(200,220,213);
    doc.text(String(sub), 541, y+20, {align:"right"}); }
  return y + (sub?52:38) + 14;
}

/* document numbering: STMT-2026-0007 */
function docNo(prefix){
  const s=State.settings;
  s.docSeq = s.docSeq || {};
  const y=new Date().getFullYear();
  const k=prefix+"-"+y;
  s.docSeq[k]=(s.docSeq[k]||0)+1;
  persist();
  return `${prefix}-${y}-${String(s.docSeq[k]).padStart(4,"0")}`;
}

function buildPODoc(po){
  const { jsPDF }=window.jspdf;
  const doc=new jsPDF({unit:"pt",format:"a4"});
  const rate=State.settings.rate;
  const rows=(po.lines||po.items||[]);
  const no = po.docNo || (po.docNo = docNo("PO"), persist(), po.docNo);

  let y=letterhead(doc,"Purchase Order",[
    `No. ${no}`,
    `Date: ${po.date||new Date().toLocaleDateString()}`,
    shipLabel(po.shipment||curShip())
  ]);

  y=partyBlock(doc,y,"Vendor",[po.vendor||"—", po.forwarder?("Forwarder: "+po.forwarder):""].filter(Boolean));

  const C1=45,C2=78,C3=330,C4=395,C5=470,C6=550;
  y=tableHead(doc,y,[
    {t:"#",x:C1},{t:"ITEM / PART NO.",x:C2},{t:"QTY",x:C3,a:"right"},
    {t:"RMB / PC",x:C4,a:"right"},{t:"AMOUNT RMB",x:C6,a:"right"}
  ]);

  doc.setFont("helvetica","normal"); doc.setFontSize(9.5);
  let tot=0,i=0;
  if(!rows.length){
    doc.setTextColor(...BRAND.muted); doc.setFontSize(10);
    doc.text("No items on this purchase order.", 45, y+4);
    y+=26;
  }
  for(const it of rows){
    if(y>690){ doc.addPage();
      y=letterhead(doc,"Purchase Order",[`No. ${no}`, po.vendor||""]);
      y=tableHead(doc,y,[{t:"#",x:C1},{t:"ITEM / PART NO.",x:C2},{t:"QTY",x:C3,a:"right"},
        {t:"RMB / PC",x:C4,a:"right"},{t:"AMOUNT RMB",x:C6,a:"right"}]);
      doc.setFont("helvetica","normal"); doc.setFontSize(9.5); }
    const amt=(it.qty||0)*(it.priceRMB||0); tot+=amt;
    if(i%2===1){ doc.setFillColor(...BRAND.zebra); doc.rect(40,y-11,515,17,"F"); }
    doc.setTextColor(...BRAND.faint); doc.text(String(i+1), C1, y);
    doc.setTextColor(...BRAND.ink); doc.text(String(it.item||"").slice(0,40), C2, y);
    doc.text(String(it.qty||0), C3, y, {align:"right"});
    doc.text(it.priceRMB? money2(it.priceRMB) : "-", C4, y, {align:"right"});
    doc.setFont("helvetica","bold");
    doc.text(amt? money2(amt) : "-", C6, y, {align:"right"});
    doc.setFont("helvetica","normal");
    y+=17; i++;
  }

  y+=12;
  const R = po.rate || rate;
  y=totalBox(doc,y,"Order total", "RMB "+money2(tot), "= Rs "+money(tot*R)+"   (RMB 1 = Rs "+R+")");

  if(po.note){
    doc.setFont("helvetica","bold"); doc.setFontSize(7.6); doc.setTextColor(...BRAND.muted);
    doc.text("NOTES", 40, y-46);
    doc.setFont("helvetica","normal"); doc.setFontSize(9); doc.setTextColor(...BRAND.ink);
    doc.text(doc.splitTextToSize(po.note, 270), 40, y-32);
  }
  docFooter(doc,{sign:true, terms:true});
  return doc;
}

function poFileName(po){
  const no = po.number || po.docNo || "PO";
  const v = (po.vendor||"vendor").replace(/[^\w]+/g,"-");
  return `${no}-${v}.pdf`;
}
function poPDF(po){
  if(!(window.jspdf&&window.jspdf.jsPDF)){ flash("PDF engine loading — try again"); return; }

/* ---------- NEW ARRIVAL (item numbers only, for the WhatsApp group) ---------- */
function arrivalItems(no){
  const seen=new Set(); const out=[];
  for(const p of shipRows(no)){
    const it=(p.item||"").trim(); if(!it) continue;
    const k=it.toUpperCase(); if(seen.has(k)) continue; seen.add(k); out.push(it);
  }
  return out.sort((a,b)=>a.localeCompare(b));
}
function arrivalText(no, items){
  items = items || arrivalItems(no);
  return `🆕 *NEW ARRIVAL* — ${State.settings.org}\n\n`+items.map((it,i)=>`${i+1}. ${it}`).join("\n")+`\n\n_${items.length} items now in stock._`;
}
function buildArrivalDoc(no, items){
  const { jsPDF }=window.jspdf;
  items = (items || arrivalItems(no)).map(s=>String(s).trim()).filter(Boolean);
  const doc=new jsPDF({unit:"pt",format:"a4"});
  const L=45, R=550, W=R-L;
  const INK=[26,32,30], FAINT=[150,155,152];
  const no_ = docNo("STK");

  // ---- SAME letterhead banner as every other PDF ----
  let y=letterhead(doc,"New Arrival — Stock List",[
    `No. ${no_}`, shipLabel(no), new Date().toLocaleDateString()
  ]);

  doc.setFont("helvetica","bold"); doc.setFontSize(11); doc.setTextColor(...BRAND.green);
  doc.text(`${items.length} item${items.length===1?"":"s"} now available`, L, y);
  y+=22;

  // ---- balanced two-column flow ----
  const gutter=26, colW=(W-gutter)/2, rowH=21, numW=26;
  const topY=y, botY=770;
  const rowsPerCol=Math.floor((botY-topY)/rowH);
  const perPage=rowsPerCol*2;

  const fit=(txt)=>{ let t=String(txt), sz=11.5; doc.setFont("helvetica","normal"); doc.setFontSize(sz);
    const avail=colW-numW-6; while(doc.getTextWidth(t)>avail && sz>7){ sz-=0.5; doc.setFontSize(sz); } return sz; };

  for(let p=0; p*perPage<items.length; p++){
    let startY;
    if(p>0){ doc.addPage(); startY=letterhead(doc,"New Arrival — Stock List",[`No. ${no_}`, shipLabel(no)+" — continued"]); }
    else startY=topY;
    const pageItems=items.slice(p*perPage, p*perPage+perPage);
    const half=Math.ceil(pageItems.length/2);
    for(let col=0; col<2; col++){
      const x=L+col*(colW+gutter);
      let yy=startY;
      pageItems.slice(col*half, col*half+half).forEach((name,idx)=>{
        const n=p*perPage + col*half + idx + 1;
        doc.setFont("helvetica","normal"); doc.setFontSize(9); doc.setTextColor(...FAINT);
        doc.text(String(n).padStart(2,"0"), x, yy);
        const sz=fit(name); doc.setFontSize(sz); doc.setTextColor(...INK);
        doc.text(name, x+numW, yy);
        doc.setDrawColor(236,238,236); doc.setLineWidth(.5); doc.line(x, yy+6.5, x+colW-6, yy+6.5);
        yy+=rowH;
      });
    }
  }

  docFooter(doc,{});   // same gold footer + page numbers as other PDFs
  return doc;
}

function rfqCategories(){
  const m={};
  for(const p of sPurchases()){
    if(!isIncomplete(p)) continue;
    const it=(p.item||"").trim(); if(!it) continue;
    const c=(p.category||"OTHERS").trim()||"OTHERS";
    (m[c]=m[c]||[]).push({item:it, qty:p.qty||0, ids:[p.id]});
  }
  Object.keys(m).forEach(c=>{
    const seen={}; const out=[];
    for(const r of m[c]){ const k=r.item.toUpperCase();
      if(seen[k]!=null){ out[seen[k]].qty += r.qty; out[seen[k]].ids.push(...r.ids); }
      else { seen[k]=out.length; out.push({item:r.item, qty:r.qty, ids:r.ids.slice()}); } }
    m[c]=out.sort((a,b)=>a.item.localeCompare(b.item));
  });
  return m;
}

  const rate=State.settings.rate;

  const data=[["#","Item / Part No.","Category","Vendor","Forwarder","Qty","Price RMB","Total RMB","Rate","Unit Rs","Total Rs","Status","Date"]];

  for(const p of rows){

      p.qty||0, p.priceRMB||0, t.rmb.toFixed(2), p.rate||rate,

  data.push([]);
  data.push(["","TOTAL","","","","","",tot.rmb.toFixed(2),"","",Math.round(tot.pkr),"",""]);
  const csv="\uFEFF"+data.map(r=>r.map(q).join(",")).join("\r\n"); // BOM so Excel opens it cleanly

/* ---------- PRICE HISTORY: best vendor per item, across every invoice ---------- */
function priceBook(){
  const book={};
  for(const p of State.purchases){
    const it=(p.item||"").trim(); if(!it) continue;
    if(!p.vendor || !(p.priceRMB>0)) continue;
    const k=it.toUpperCase();
    book[k]=book[k]||{item:it, quotes:[]};
    book[k].quotes.push({
      vendor:p.vendor, price:p.priceRMB, qty:p.qty||0,
      shipment:p.shipment, date:p.date||"", when:p.createdAt||0
    });
  }
  Object.keys(book).forEach(k=>{
    const q=book[k].quotes.sort((a,b)=>a.price-b.price);
    book[k].best=q[0];
    book[k].worst=q[q.length-1];
    book[k].latest=book[k].quotes.slice().sort((a,b)=>b.when-a.when)[0];
    book[k].vendors=[...new Set(q.map(x=>x.vendor))].length;
    book[k].spread=q.length>1 ? ((q[q.length-1].price-q[0].price)/q[0].price*100) : 0;
  });
  return book;
}
function renderPrices(){
  const v=document.getElementById("view"); const cur=C(); const rate=State.settings.rate;
  const book=priceBook();
  const q=ui.search.trim().toLowerCase();
  let items=Object.values(book);
  if(q) items=items.filter(x=>x.item.toLowerCase().includes(q));
  items.sort((a,b)=>b.spread-a.spread);
  const savings=items.reduce((s,x)=>{
    if(!x.latest || !x.best) return s;
    const diff=(x.latest.price - x.best.price);
    return s + (diff>0 ? diff*(x.latest.qty||0) : 0);
  },0);

    const n=document.getElementById("pbsearch"); if(n){ n.focus(); try{n.setSelectionRange(p,p);}catch(_){} } };

function openPriceItem(item){
  const book=priceBook(); const x=book[item.toUpperCase()]; if(!x) return;

  }

          </div>

function buildCsv(){
  const rows=[["#","Date","Category","Vendor","Item/Part No.","Qty","Price RMB","Rate","Total RMB","Total PKR","Unit PKR","Status"]];
  State.purchases.forEach((p,i)=>{ const t=pTotals(p); rows.push([i+1,p.date||"",p.category||"",p.vendor||"",p.item||"",p.qty,p.priceRMB,p.rate||State.settings.rate,t.rmb.toFixed(2),t.pkr.toFixed(2),t.unit.toFixed(2),p.status||""]); });
  return rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\r\n");
}
function downloadBlob(b,n){ const u=URL.createObjectURL(b); const a=document.createElement("a"); a.href=u; a.download=n; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(u),1000); }
function exportCsv(){ downloadBlob(new Blob([buildCsv()],{type:"text/csv"}),`purchases-${todayISO()}.csv`); toast("CSV exported"); }
function exportJson(){ downloadBlob(new Blob([JSON.stringify(State,null,2)],{type:"application/json"}),`purchases-backup-${todayISO()}.json`); toast("Backup downloaded"); }
function importJson(file){ const r=new FileReader(); r.onload=()=>{ try{ const d=JSON.parse(r.result); if(!Array.isArray(d.purchases)) throw 0; if(!confirm("Replace all purchases data with this backup?")) return; State.settings=Object.assign(State.settings,d.settings||{}); State.purchases=d.purchases||[]; State.payments=d.payments||[]; State.needs=d.needs||[]; State.pos=d.pos||[]; State.tracking=d.tracking||[]; State.shipments=d.shipments||[]; persist(); render(); toast("Backup restored"); }catch(e){ flash("Not a valid Purchases backup"); } }; r.readAsText(file); }

const FS_SUPPORTED=(typeof window!=="undefined" && "showDirectoryPicker" in window);
let dirHandle=null,fsTimer=null,fsLastSaved=null; const DATA_FILE="purchases.json",CSV_FILE="purchases.csv";
function idb(op,val){ return new Promise(res=>{ try{ const r=indexedDB.open("purchases-fs",1); r.onupgradeneeded=()=>r.result.createObjectStore("h"); r.onerror=()=>res(null); r.onsuccess=()=>{ const db=r.result; const tx=db.transaction("h",op==="get"?"readonly":"readwrite"); const st=tx.objectStore("h"); let rq=op==="get"?st.get("dir"):op==="set"?st.put(val,"dir"):st.delete("dir"); rq.onsuccess=()=>{ const out=op==="get"?rq.result:true; tx.oncomplete=()=>{db.close();res(out);}; }; rq.onerror=()=>{db.close();res(null);}; }; }catch(e){ res(null); } }); }
async function ensurePerm(h){ try{ const o={mode:"readwrite"}; if((await h.queryPermission(o))==="granted") return true; if((await h.requestPermission(o))==="granted") return true; }catch(e){} return false; }
async function writeFile(dir,name,text){ const fh=await dir.getFileHandle(name,{create:true}); const w=await fh.createWritable(); await w.write(text); await w.close(); }
async function writeToFolder(immediate){ if(!dirHandle) return; const doWrite=async()=>{ if(!(await ensurePerm(dirHandle))){ setAutoSaveState("warn"); return; } try{ await writeFile(dirHandle,DATA_FILE,JSON.stringify(State,null,2)); await writeFile(dirHandle,CSV_FILE,buildCsv()); fsLastSaved=new Date(); setAutoSaveState("on"); }catch(e){ setAutoSaveState("warn"); } }; clearTimeout(fsTimer); if(immediate) return doWrite(); fsTimer=setTimeout(doWrite,500); }
async function pickFolder(){ if(!FS_SUPPORTED){ flash("Folder auto-save needs Chrome or Edge"); return; } try{ const h=await window.showDirectoryPicker({mode:"readwrite",id:"purchases-autosave"}); dirHandle=h; await idb("set",h); State.settings.autoSaveFolder=h.name; persist(); await writeToFolder(true); toast(`Auto-saving to “${h.name}”`); }catch(e){ if(e&&e.name==="AbortError") return; flash("Browser blocked folder access — open in Chrome/Edge."); } }
async function turnOffAutoSave(){ dirHandle=null; fsLastSaved=null; State.settings.autoSaveFolder=null; await idb("del"); persist(); setAutoSaveState("off"); toast("Auto-save off"); }
function setAutoSaveState(state){ const btn=document.getElementById("autoSaveBtn"),note=document.getElementById("autoSaveNote"); if(!btn) return; const folder=State.settings.autoSaveFolder; const dot=c=>`<span class="as-dot ${c}"></span>`;
  if(state==="on"){ btn.innerHTML=dot("on")+`Saving to “${esc(folder||"folder")}”`; note.textContent=fsLastSaved?`Folder updated ${fsLastSaved.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"})}`:""; }
  else if(state==="warn"){ btn.innerHTML=dot("warn")+`Reconnect folder`; note.textContent=""; }
  else{ btn.innerHTML=dot("off")+`Auto-save to folder`; note.textContent=FS_SUPPORTED?"":"Open in Chrome/Edge to save into a folder"; } }
function openAutoSaveMenu(){ openScrim(`<div class="m-head"><h2>Folder auto-save</h2><button class="btn ghost close" data-close style="margin-left:auto">✕</button></div><div class="m-body"><p style="font-size:13.5px;color:var(--muted);margin:0">Saving to “${esc(State.settings.autoSaveFolder||"folder")}”. Files: ${DATA_FILE}, ${CSV_FILE}.</p></div><div class="m-foot"><button class="btn danger" id="as-off" style="margin-right:auto">Turn off</button><button class="btn" data-close>Close</button><button class="btn primary" id="as-change">Change folder</button></div>`);
  document.getElementById("as-off").onclick=()=>{ turnOffAutoSave(); closeScrim(); }; document.getElementById("as-change").onclick=()=>{ closeScrim(); pickFolder(); }; }
function onAutoSaveClick(){ if(dirHandle&&State.settings.autoSaveFolder){ ensurePerm(dirHandle).then(ok=>{ if(ok) writeToFolder(true); openAutoSaveMenu(); }); } else pickFolder(); }
async function loadFromFolderAndSync(){ let loaded=false; try{ const fh=await dirHandle.getFileHandle(DATA_FILE); const text=await (await fh.getFile()).text(); const d=JSON.parse(text); const ft=(d.settings&&d.settings.updatedAt)||0, lt=(State.settings&&State.settings.updatedAt)||0; if(ft>lt){ applyLoaded(d); render(); loaded=true; } }catch(e){} fsLastSaved=new Date(); setAutoSaveState("on"); writeToFolder(true); if(loaded) toast("Loaded latest from your folder"); }
async function autoConnectFolder(){ setAutoSaveState("off"); if(!FS_SUPPORTED) return; const h=await idb("get"); if(!h) return; dirHandle=h; let perm="prompt"; try{ perm=await h.queryPermission({mode:"readwrite"}); }catch(e){} if(perm==="granted"){ await loadFromFolderAndSync(); } else { dirHandle=null; setAutoSaveState("off"); } }

function locOptions(selected){
  var sbl=(window.__SB&&Array.isArray(window.__SB.locations))?window.__SB.locations:[];
  var byId={}; sbl.forEach(function(l){ byId[l.id]=l; });
  function path(l){ var parts=[],cur=l,g=0; while(cur&&g++<12){ parts.unshift(cur.name); cur=cur.parentId?byId[cur.parentId]:null; } return parts.join(" › "); }
  var opts='<option value="">— pick location —</option>';
  sbl.slice().sort(function(a,b){return path(a).localeCompare(path(b));}).forEach(function(l){
    opts+='<option value="'+l.id+'"'+(l.id===selected?" selected":"")+'>'+path(l).replace(/</g,"&lt;")+'</option>';
  });
  return opts;
}

function flash(m){ const t=document.getElementById("toast"); t.textContent=m; t.style.background="var(--warn)"; t.classList.add("show"); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),2000); }

<script>
/* ===== BACKUP (Purchases) auto snapshots ===== */
function scheduleAutoBackup(){}
function _pDay(){ var d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function _pBkLoad(){ try{ return JSON.parse(localStorage.getItem("purchases:backups")||"[]"); }catch(_){ return []; } }
function _pBkSaveL(l){ try{ localStorage.setItem("purchases:backups",JSON.stringify(l)); }catch(_){} }
var _pbkSig=""; function _pAutoBackup(){ try{ var sig=(State.purchases||[]).length+"|"+(State.shipments||[]).length+"|"+(State.receives||[]).length; if(sig===_pbkSig) return; _pbkSig=sig; var list=_pBkLoad(), tk=_pDay(); var data=JSON.stringify(State); var ex=list.find(function(b){return b.day===tk;}); if(ex){ex.at=Date.now();ex.n=(State.purchases||[]).length;ex.data=data;} else list.unshift({day:tk,at:Date.now(),n:(State.purchases||[]).length,data:data}); list=list.slice(0,14); _pBkSaveL(list); }catch(_){} }
function _pMergeRestore(inc){ if(!inc) return;
  function byId(a,c){ a=a||[];c=c||[]; var m={},o=[]; c.concat(a).forEach(function(x){ if(x&&x.id!=null){ var k=String(x.id); if(!(k in m)){m[k]=x;o.push(k);} else { var cur=m[k],ax=(x.updatedAt||x.createdAt||x.date||0),bx=(cur.updatedAt||cur.createdAt||cur.date||0); if(ax>=bx)m[k]=x; } } }); return o.map(function(k){return m[k];}); }
  State.purchases=byId(State.purchases,inc.purchases); if(Array.isArray(inc.shipments))State.shipments=byId(State.shipments,inc.shipments); if(Array.isArray(inc.receives))State.receives=byId(State.receives,inc.receives);
  if(typeof persist==="function") persist(); if(typeof render==="function") render(); if(window.__pushNow) window.__pushNow(); }
function openBackupSheet(){
  var list=_pBkLoad(), wrap=document.getElementById("pBkScrim"), sheet=document.getElementById("pBkSheet");
  sheet.innerHTML='<h3 style="font-size:17px;margin-bottom:12px">🛟 Backup &amp; Restore</h3>'
    +'<div style="font-size:12.5px;color:#6E7673;margin-bottom:14px">Purchases are saved on this device, in the cloud, and in these snapshots.</div>'
    +'<button class="btn primary" id="pbk-dl" style="width:100%;margin-bottom:8px">⬇ Download backup file now</button>'
    +'<label class="btn" style="width:100%;margin-bottom:14px;display:flex;justify-content:center;cursor:pointer">⬆ Restore from a file<input type="file" id="pbk-file" accept=".json,application/json" style="display:none"></label>'
    +'<div style="font-size:11px;color:#6E7673;letter-spacing:.08em;margin-bottom:8px">AUTO SNAPSHOTS ('+list.length+')</div>'
    +(list.length?list.map(function(b){return '<div style="display:flex;align-items:center;gap:10px;padding:10px;border:1px solid #E2E7E4;border-radius:10px;margin-bottom:8px"><div style="flex:1"><b>'+b.day+'</b><div style="font-size:11.5px;color:#6E7673">'+b.n+' purchase lines</div></div><button class="btn sm" data-rest="'+b.day+'">Restore</button></div>';}).join(""):'<div style="text-align:center;color:#6E7673;padding:16px">Snapshots will appear as you use the app.</div>')
    +'<button class="btn" id="pbk-x" style="width:100%;margin-top:12px">Close</button>';
  wrap.style.display="flex";
  document.getElementById("pbk-x").onclick=function(){ wrap.style.display="none"; };
  document.getElementById("pbk-dl").onclick=function(){ try{ var blob=new Blob([JSON.stringify({app:"purchases",at:Date.now(),state:State},null,1)],{type:"application/json"}); var a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="shakeel-PURCHASES-backup-"+_pDay()+".json"; a.click(); toast("Backup file downloaded"); }catch(e){} };
  document.getElementById("pbk-file").onchange=function(e){ var f=e.target.files[0]; if(!f) return; var r=new FileReader(); r.onload=function(){ try{ var j=JSON.parse(r.result); if(!confirm("Restore from this file? It ADDS back missing purchases, never deletes.")) return; _pMergeRestore(j.state||j); wrap.style.display="none"; toast("Restored from file"); }catch(_){ flash&&flash("Not a valid backup file"); } }; r.readAsText(f); };
  sheet.querySelectorAll("[data-rest]").forEach(function(b){ b.onclick=function(){ var snap=_pBkLoad().find(function(x){return x.day===b.dataset.rest;}); if(!snap) return; if(!confirm("Restore from "+b.dataset.rest+"? It ADDS back missing purchases, never deletes.")) return; try{ _pMergeRestore(JSON.parse(snap.data)); wrap.style.display="none"; toast("Restored from "+b.dataset.rest); }catch(_){} }; });
}
document.addEventListener("DOMContentLoaded",function(){ var b=document.getElementById("pBkBtn"); if(b) b.onclick=openBackupSheet; });
</script>

<div id="pBkScrim" style="position:fixed;inset:0;background:rgba(22,33,31,.44);z-index:200;display:none;align-items:flex-end;justify-content:center"><div id="pBkSheet" style="background:#fff;border-radius:20px 20px 0 0;width:min(560px,100%);max-height:90vh;overflow-y:auto;padding:20px"></div></div>

<script>
/* ---------- Cloud sync (Firebase Firestore) ---------- */
(function(){
  
  /* ===== ROLE GUARD — this app is owner-only ===== */
  var STAFF_EMAILS = ["husnainali10112@gmail.com"];
  function blockStaff(email){
    if(STAFF_EMAILS.indexOf((email||"").toLowerCase()) < 0) return false;
    document.body.innerHTML =
      '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;'
      + 'font-family:Inter,system-ui,sans-serif;background:#F5F6F3">'
      + '<div style="max-width:340px;text-align:center">'
      + '<div style="font-size:40px;margin-bottom:12px">🔒</div>'
      + '<div style="font-family:\'Space Grotesk\',sans-serif;font-size:19px;font-weight:700;color:#0F1917;margin-bottom:8px">Not available</div>'
      + '<div style="font-size:14px;color:#6B7975;line-height:1.55">This section is for the owner only.<br>'
      + 'You have access to <b>Stock</b>, <b>Orders</b> and <b>Labels</b>.</div>'
      + '</div></div>';
    return true;
  }

  var FB={apiKey:"AIzaSyAQXOHU-_vZQ6fXDjdJvcvBg8dMx01X_tc",authDomain:"shakeel-shop.firebaseapp.com",projectId:"shakeel-shop",storageBucket:"shakeel-shop.firebasestorage.app",messagingSenderId:"60087476008",appId:"1:60087476008:web:73f7c946ae62a687a3ba1d"};
  var APP_KEY="purchases", SHOP="main";
  var db=null, ready=false, _dirty=false, pushTimer=null, cloudHadData=false;
  function note(t){ var el=document.getElementById("storageNote"); if(el) el.innerHTML=t; }
  if(typeof firebase==="undefined"){ return; }
  try{
    firebase.initializeApp(FB); db=firebase.firestore();
    if(typeof updateStorageNote==="function"){ var _u=updateStorageNote; updateStorageNote=function(){ if(window.__cloudActive) return; _u(); }; }
    firebase.auth().onAuthStateChanged(function(user){ if(user && !user.isAnonymous){ if(blockStaff(user.email)) return; start(); } });
  }catch(e){ return; }
  function ref(){ return db.collection("shops").doc(SHOP).collection("apps").doc(APP_KEY); }
  function appRef(k){ return db.collection("shops").doc(SHOP).collection("apps").doc(k); }
  window.__SB=null;
  function watchStockbox(){ appRef("stockbox").onSnapshot(function(s){ window.__SB=(s.exists&&s.data()&&s.data().state)||null; }, function(){}); }
  // write items into StockBox at chosen locations; tag with receiveId for undo
  window.ensureNewArrivalLoc=function(){
    if(!db) return Promise.resolve(null);
    var sref=appRef("stockbox");
    return sref.get().then(function(s){
      var st=(s.exists&&s.data()&&s.data().state) || {items:[],locations:[],settings:{}};
      if(!Array.isArray(st.locations)) st.locations=[];
      var na=st.locations.find(function(l){ return (l.name||"").toLowerCase()==="new arrival" && !l.parentId; });
      if(na) return na.id;
      var id="na"+Date.now().toString(36);
      st.locations.push({id:id,name:"New Arrival",parentId:null,note:"Just arrived — place into boxes",createdAt:Date.now()});
      if(!st.settings) st.settings={}; st.settings.updatedAt=Date.now();
      return sref.set({state:st,ts:Date.now()},{merge:true}).then(function(){ return id; });
    }).catch(function(){ return null; });
  };
  window.receiveToStockBox=function(rows, receiveId){
    if(!db) return Promise.resolve(false);
    var sref=appRef("stockbox");
    return sref.get().then(function(s){
      var st=(s.exists&&s.data()&&s.data().state) || {items:[],locations:[],settings:{}};
      if(!Array.isArray(st.items)) st.items=[];
      if(!Array.isArray(st.locations)) st.locations=[];
      rows.forEach(function(r){
        // merge into an existing item with same name in same location, else create
        var ex=st.items.find(function(it){ return (it.name||"").toLowerCase().trim()===(r.name||"").toLowerCase().trim() && it.locationId===r.locationId; });
        if(ex){ ex.qty=(ex.qty||0)+r.qty; ex.updatedAt=Date.now(); if(!ex.receiveIds) ex.receiveIds=[]; ex.receiveIds.push({rid:receiveId,qty:r.qty}); if(r.price&&!ex.price) ex.price=r.price; }
        else { st.items.push({ id:"rx"+Date.now().toString(36)+Math.random().toString(36).slice(2,6),
          name:r.name, code:r.code||"", qty:r.qty, price:r.price||0, locationId:r.locationId, note:"",
          createdAt:Date.now(), updatedAt:Date.now(), receiveIds:[{rid:receiveId,qty:r.qty}] }); }
      });
      if(!st.settings) st.settings={};
      st.settings.updatedAt=Date.now();
      return sref.set({state:st, ts:Date.now()},{merge:true}).then(function(){ return true; });
    }).catch(function(){ return false; });
  };
  // undo a receive: subtract the exact quantities tagged with receiveId
  window.undoReceive=function(receiveId){
    if(!db) return Promise.resolve(false);
    var sref=appRef("stockbox");
    return sref.get().then(function(s){
      var st=(s.exists&&s.data()&&s.data().state); if(!st||!Array.isArray(st.items)) return false;
      st.items.forEach(function(it){
        if(!Array.isArray(it.receiveIds)) return;
        var mine=it.receiveIds.filter(function(x){return x.rid===receiveId;});
        if(!mine.length) return;
        var back=mine.reduce(function(a,x){return a+(x.qty||0);},0);
        it.qty=Math.max(0,(it.qty||0)-back);
        it.receiveIds=it.receiveIds.filter(function(x){return x.rid!==receiveId;});
        it.updatedAt=Date.now();
      });
      if(!st.settings) st.settings={};
      st.settings.updatedAt=Date.now();
      return sref.set({state:st, ts:Date.now()},{merge:true}).then(function(){ return true; });
    }).catch(function(){ return false; });
  };
  function start(){ window.__cloudActive=true; note("\u2601 Connecting\u2026");
    watchStockbox();
    var _op=persist; persist=function(){ _op(); _dirty=true; schedulePush(); };
    ref().onSnapshot(function(snap){ window.__cloudActive=true;
      if(snap.exists){ var d=snap.data()&&snap.data().state;
        if(d){
          try{ if(Array.isArray(d.purchases) && d.purchases.length) cloudHadData=true; }catch(_){}
          mergeCloudIntoState(d);
          try{lsSave();}catch(_){}
          if(_pTyping()){ _pPending=true; } else if(typeof render==="function"){ render(); }
          if(_dirty && _pGrew(d)){ clearTimeout(pushTimer); pushTimer=setTimeout(pushNow,300); }
        }
        ready=true; note("\u2601 Synced across your devices."); }
      else { ready=true; pushNow(); }
    }, function(){ note("\u2601 Offline — saved on this device."); });
  }
  function _pTyping(){ var a=document.activeElement; return a && (a.tagName==="INPUT"||a.tagName==="SELECT"||a.tagName==="TEXTAREA"); }
  var _pPending=false;
  function _pSig(){ function sig(arr){ arr=arr||[]; var mx=0,sum=0; for(var i=0;i<arr.length;i++){ var x=arr[i]; var t=(x&&(x.updatedAt||x.createdAt||x.date))||0; if(t>mx)mx=t; sum+=(x&&((x.qty||0)+(x.priceRMB||0)))||0; } return arr.length+":"+mx+":"+Math.round(sum); } return sig(State.purchases)+"|"+sig(State.shipments)+"|"+sig(State.receives); }
  function _pGrew(d){ function has(a,b){a=a||[];b=b||[];if(a.length>b.length)return true;var ids={};b.forEach(function(x){if(x&&x.id!=null)ids[x.id]=1;});for(var i=0;i<a.length;i++){if(a[i]&&a[i].id!=null&&!ids[a[i].id])return true;}return false;} return has(State.purchases,d.purchases)||has(State.shipments,d.shipments)||has(State.receives,d.receives)||has(State.tracking,d.tracking); }
  document.addEventListener("focusout",function(){ setTimeout(function(){ if(_pPending&&!_pTyping()&&typeof render==="function"){ _pPending=false; render(); } },200); });
  document.addEventListener("visibilitychange",function(){ if(!document.hidden&&_pPending&&typeof render==="function"){ _pPending=false; render(); } });
  function _pTomb(){ try{ return JSON.parse(localStorage.getItem("purchases:deleted")||"{}"); }catch(_){ return {}; } }
  window.__pTombstone=function(kind,id){ try{ var t=_pTomb(); t[kind+":"+id]=Date.now(); localStorage.setItem("purchases:deleted",JSON.stringify(t)); }catch(_){} };
  function _pApplyTomb(arr,kind){ var t=_pTomb(); return arr.filter(function(x){ return !(x&&x.id!=null && t[kind+":"+x.id]); }); }
  function _pMerge(localArr,cloudArr,preferLocal){
    localArr=Array.isArray(localArr)?localArr:[]; cloudArr=Array.isArray(cloudArr)?cloudArr:[];
    var map={},order=[],noid=[];
    function ts(x){ return (x&&(x.updatedAt||x.createdAt||x.date))||0; }
    function sg(x){ try{ return JSON.stringify(x); }catch(_){ return ""; } }
    cloudArr.forEach(function(x){ if(!x||x.id==null){ noid.push(x); return; } var k=String(x.id); if(!(k in map)){ map[k]=x; order.push(k); } });
    localArr.forEach(function(x){ if(!x||x.id==null){ noid.push(x); return; } var k=String(x.id);
      if(!(k in map)){ map[k]=x; order.push(k); return; }
      var cur=map[k], a=ts(x), b=ts(cur);
      if(a>b){ map[k]=x; } else if(a<b){ } else { if(sg(x)!==sg(cur)) map[k]=preferLocal?x:cur; } });
    return order.map(function(k){return map[k];}).concat(noid);
  }
  function mergeCloudIntoState(d,preferLocal){
    if(!d) return;
    State.purchases=_pApplyTomb(_pMerge(State.purchases,d.purchases,preferLocal),"purchase");
    if(Array.isArray(d.shipments)) State.shipments=_pApplyTomb(_pMerge(State.shipments,d.shipments,preferLocal),"shipment");
    // self-heal: collapse duplicate shipment records that share the same invoice number
    (function(){ var byNo={}, out=[]; (State.shipments||[]).forEach(function(s){ if(!s||s.no==null){ out.push(s); return; } var k=String(s.no); if(!byNo[k]){ byNo[k]=s; out.push(s); } else { var keep=byNo[k]; if((s.openedAt||0)<(keep.openedAt||0)){ keep.openedAt=s.openedAt; } if(s.name&&!keep.name) keep.name=s.name; if(s.closedAt&&!keep.closedAt) keep.closedAt=s.closedAt; } }); State.shipments=out; })();
    if(Array.isArray(d.receives)) State.receives=_pApplyTomb(_pMerge(State.receives,d.receives,preferLocal),"receive");
    if(Array.isArray(d.tracking)) State.tracking=_pApplyTomb(_pMerge(State.tracking,d.tracking,preferLocal),"tracking");
    var cs=d.settings||{}, ls=State.settings||{};
    if((cs.updatedAt||0)>(ls.updatedAt||0)){ Object.keys(cs).forEach(function(k){ if(k!=="updatedAt") State.settings[k]=cs[k]; }); }
  }
  function schedulePush(){ if(!ready) return; clearTimeout(pushTimer); pushTimer=setTimeout(pushNow,600); }
  function pushNow(){ if(!db) return;
    if(!ready) return;
    ref().get().then(function(s){
      var d=s.exists&&s.data()&&s.data().state;
      if(d) mergeCloudIntoState(d,true);
      if(!State.settings.updatedAt) State.settings.updatedAt=Date.now();
      _dirty=false; return ref().set({state:State,ts:Date.now()});
    }).then(function(){ note("\u2601 Synced across your devices."); try{lsSave();}catch(_){} scheduleAutoBackup(); })
      .catch(function(){ note("\u2601 Cloud save failed — saved on this device."); }); }
  window.__pushNow=pushNow;
})();
</script>
