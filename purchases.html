<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{--paper:#F4F5F2;--panel:#FFFFFF;--ink:#16211F;--muted:#6B7975;--faint:#9AA6A2;--line:#E2E6E1;--line-strong:#CDD4CF;--green:#10564A;--green-hi:#0C453B;--green-soft:#E7F0EC;--paid:#2E7D5B;--warn:#B8492C;--warn-soft:#F7E9E1;--gold:#B08A3E;--amber:#B7791F;--amber-soft:#FBF0D9;--blue:#1F6F8B;--blue-soft:#E1EFF3;--shadow:0 1px 2px rgba(22,33,31,.04),0 8px 24px rgba(22,33,31,.06);--radius:14px;--ease:cubic-bezier(.22,.61,.36,1);}
  *{box-sizing:border-box}html,body{margin:0}html{-webkit-text-size-adjust:100%}
  body{background:var(--paper);color:var(--ink);font-family:"Inter",system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;line-height:1.5;min-height:100vh;overscroll-behavior-y:none}
  .mono{font-family:"JetBrains Mono",ui-monospace,monospace;font-variant-numeric:tabular-nums}.grot{font-family:"Space Grotesk",system-ui,sans-serif}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;-webkit-tap-highlight-color:transparent}
  :focus-visible{outline:2px solid var(--green);outline-offset:2px;border-radius:6px}
  .wrap{max-width:1000px;margin:0 auto;padding:0 16px 90px;padding-left:calc(16px + env(safe-area-inset-left));padding-right:calc(16px + env(safe-area-inset-right));padding-bottom:calc(90px + env(safe-area-inset-bottom))}
  header.top{position:sticky;top:0;z-index:20;background:rgba(244,245,242,.9);backdrop-filter:saturate(180%) blur(10px);border-bottom:1px solid var(--line)}
  .top-inner{max-width:1000px;margin:0 auto;padding:12px 16px;padding-top:calc(12px + env(safe-area-inset-top));display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .brand{display:flex;align-items:baseline;gap:9px;margin-right:auto}
  .brand .mark{font-family:"Space Grotesk";font-weight:700;font-size:19px;letter-spacing:-.02em}.brand .mark b{color:var(--green)}
  .brand .org{font-size:12px;color:var(--muted);border-left:1px solid var(--line-strong);padding-left:9px;max-width:150px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:text}
  .rate-badge{font-size:12px;font-weight:600;color:var(--green);background:var(--green-soft);padding:5px 10px;border-radius:8px;cursor:pointer;white-space:nowrap}
  .btn{display:inline-flex;align-items:center;gap:7px;font-size:13.5px;font-weight:600;padding:9px 14px;border-radius:10px;border:1px solid var(--line-strong);background:var(--panel);color:var(--ink);transition:.15s;white-space:nowrap;user-select:none}
  .btn:hover{border-color:var(--faint);transform:translateY(-1px)}.btn:active{transform:translateY(0)}
  .btn.primary{background:var(--green);color:#fff;border-color:var(--green)}.btn.primary:hover{background:var(--green-hi)}
  .btn.ghost{border-color:transparent;background:transparent;color:var(--muted);padding:9px 10px}.btn.ghost:hover{background:var(--line);color:var(--ink)}
  .btn.danger{color:var(--warn);border-color:transparent}.btn.danger:hover{background:var(--warn-soft)}
  .btn.install{background:var(--gold);color:#26200E;border-color:var(--gold);font-weight:700}.btn.install:hover{background:#C79B4A}
  .btn.wa{background:#25D366;color:#fff;border-color:#25D366}.btn.wa:hover{background:#1Fb457}
  .btn svg{width:16px;height:16px}.btn.sm{padding:6px 11px;font-size:12.5px}
  .tabs{display:flex;gap:4px;background:var(--line);padding:4px;border-radius:12px;margin:16px 0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tabs button{flex:0 0 auto;min-width:62px;font-size:13px;font-weight:600;color:var(--muted);padding:9px 12px;border-radius:9px;transition:.15s;user-select:none;white-space:nowrap}
  .tabs button.on{background:var(--panel);color:var(--green);box-shadow:0 1px 2px rgba(0,0,0,.06)}
  .summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow);position:relative;overflow:hidden}
  .stat .lab{font-size:10.5px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted)}
  .stat .val{font-size:20px;font-weight:600;margin-top:6px;font-family:"JetBrains Mono",monospace}
  .stat .sub{font-size:11.5px;color:var(--muted);margin-top:3px}
  .stat.accent{border-color:#D8C9A6;background:linear-gradient(180deg,#FCFAF4,#FFF)}.stat.accent .val{color:var(--green)}
  .stat.warn .val{color:var(--warn)}
  .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
  .search{flex:1;min-width:180px;display:flex;align-items:center;gap:9px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:0 12px}
  .search:focus-within{border-color:var(--faint)}.search svg{width:16px;height:16px;color:var(--faint);flex-shrink:0}
  .search input{border:none;outline:none;background:none;font-family:inherit;font-size:14px;color:var(--ink);padding:10px 0;width:100%}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
  .prow{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--line);cursor:pointer;transition:background .12s}
  .prow:last-child{border-bottom:none}.prow:hover{background:#FAFBF9}
  .prow .num{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--faint);width:26px;flex-shrink:0}
  .prow .mid{flex:1;min-width:0}
  .prow .it{font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .prow .meta{font-size:12px;color:var(--muted);margin-top:2px;display:flex;gap:7px;flex-wrap:wrap;align-items:center}
  .prow .amt{text-align:right;flex-shrink:0}
  .prow .amt .pk{font-family:"JetBrains Mono",monospace;font-weight:600;font-size:14px}
  .prow .amt .rmb{font-size:11.5px;color:var(--muted);font-family:"JetBrains Mono",monospace}
  .chip{font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:20px;background:var(--line);color:var(--muted)}
  .chip.cat{background:var(--green-soft);color:var(--green)}
  .st{font-size:10px;font-weight:700;text-transform:uppercase;padding:2px 7px;border-radius:20px}
  .st.Ordered{background:var(--amber-soft);color:var(--amber)}.st.Shipped,.st\.In{background:var(--blue-soft);color:var(--blue)}
  .st.Received,.st.Delivered,.st.OK{background:var(--green-soft);color:var(--paid)}
  .st.Customs,.st.Transit{background:#EFE7F5;color:#6D4C93}
  .vrow{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--line);cursor:pointer}
  .vrow:last-child{border-bottom:none}.vrow:hover{background:#FAFBF9}
  .vrow .vn{font-weight:600;font-size:15px}
  .vrow .vs{font-size:12px;color:var(--muted);margin-top:2px}
  .vrow .bal{text-align:right;font-family:"JetBrains Mono",monospace;font-weight:700}
  .bal.owe{color:var(--warn)}.bal.clear{color:var(--paid)}.bal.adv{color:var(--blue)}
  .empty{padding:52px 20px;text-align:center;color:var(--muted)}
  .empty .big{font-family:"Space Grotesk";font-size:18px;color:var(--ink);font-weight:600;margin-bottom:6px}
  .empty p{max-width:380px;margin:0 auto 16px;font-size:14px}
  .footbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-top:18px;flex-wrap:wrap}
  .footbar .note{font-size:12px;color:var(--faint)}.footbar .r{display:flex;gap:8px;flex-wrap:wrap}
  .as-dot{width:7px;height:7px;border-radius:50%;display:inline-block}.as-dot.off{background:var(--faint)}.as-dot.on{background:#22C55E;box-shadow:0 0 0 3px rgba(34,197,94,.18)}.as-dot.warn{background:var(--gold)}
  #autoSaveBtn{gap:8px}
  .scrim{position:fixed;inset:0;background:rgba(22,33,31,.34);backdrop-filter:blur(2px);z-index:40;display:flex;opacity:0;pointer-events:none;transition:opacity .26s var(--ease)}
  .scrim.show{opacity:1;pointer-events:auto}
  .modal{background:var(--panel);border-radius:16px;box-shadow:0 20px 60px rgba(22,33,31,.28);width:min(480px,calc(100% - 28px));margin:auto;max-height:92vh;overflow:auto;transform:translateY(14px) scale(.97);opacity:0;transition:transform .3s var(--ease),opacity .3s var(--ease)}
  .scrim.show .modal{transform:none;opacity:1}
  .m-head{padding:18px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px}
  .m-head h2{font-family:"Space Grotesk";font-size:17px;font-weight:600;margin:0}
  .m-body{padding:18px 20px}.m-foot{padding:14px 20px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;background:#FCFDFB;flex-wrap:wrap}
  label.fld{display:block;margin-bottom:13px}
  label.fld .lt{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px}
  .inp{width:100%;font-family:inherit;font-size:14px;color:var(--ink);padding:10px 12px;border:1px solid var(--line-strong);border-radius:10px;background:#fff;transition:.15s}
  .inp:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px var(--green-soft)}
  .inp.mono{font-family:"JetBrains Mono",monospace}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:12px}.three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
  .calc{background:var(--paper);border-radius:11px;padding:12px 14px;margin:2px 0 14px;font-size:13px;display:flex;flex-direction:column;gap:5px}
  .calc .r{display:flex;justify-content:space-between}.calc .r .v{font-family:"JetBrains Mono",monospace;font-weight:600}
  .calc .r.big .v{font-size:16px;color:var(--green)}
  .hint{font-size:12px;color:var(--faint);margin:-4px 0 12px}
  .txn{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);font-size:13px}
  .txn:last-child{border-bottom:none}
  .txn .ic{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;flex-shrink:0}
  .txn.buy .ic{background:var(--warn-soft);color:var(--warn)}.txn.pay .ic{background:var(--green-soft);color:var(--paid)}
  .txn .a{margin-left:auto;font-family:"JetBrains Mono",monospace;font-weight:600}
  .detail-sum{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
  .detail-sum .cell{background:var(--paper);border:1px solid var(--line);border-radius:11px;padding:11px 12px}
  .detail-sum .l{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:600}
  .detail-sum .v{font-size:16px;font-weight:600;margin-top:4px;font-family:"JetBrains Mono",monospace}
  .taglist{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
  .taglist .t{font-size:12px;background:var(--line);border-radius:7px;padding:5px 9px;display:flex;align-items:center;gap:6px}
  .taglist .t button{color:var(--warn);font-weight:700}
  .seg{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
  .seg button{font-size:12px;font-weight:600;color:var(--muted);padding:6px 11px;border-radius:8px;border:1px solid var(--line-strong)}
  .seg button.on{background:var(--green);color:#fff;border-color:var(--green)}
  .ios-steps{list-style:none;padding:0;margin:8px 0 0;counter-reset:s}
  .ios-steps li{display:flex;gap:11px;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--line);font-size:13.5px}
  .ios-steps li:last-child{border-bottom:none}
  .ios-steps li::before{counter-increment:s;content:counter(s);flex-shrink:0;width:24px;height:24px;border-radius:7px;background:var(--green-soft);color:var(--green);font-weight:700;font-size:12px;display:grid;place-items:center;font-family:"Space Grotesk"}
  .kbd{display:inline-flex;background:var(--line);border-radius:6px;padding:1px 6px;font-weight:600;font-size:12px}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;font-size:13.5px;font-weight:500;padding:11px 18px;border-radius:11px;box-shadow:0 10px 30px rgba(0,0,0,.25);z-index:60;opacity:0;transition:.25s;display:flex;align-items:center;gap:9px}
  .toast.show{opacity:1;transform:translateX(-50%)}.toast svg{width:16px;height:16px;color:#7FDCB6}
  @media (max-width:640px){ .summary{grid-template-columns:1fr 1fr} .brand .org{max-width:90px} .three{grid-template-columns:1fr 1fr} }
  @media (display-mode:standalone){ header.top{background:var(--paper)} }
  @media (prefers-reduced-motion:reduce){ *{transition:none!important;animation:none!important} }
  /* spreadsheet grid */
  .gridwrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--line);border-radius:var(--radius);background:var(--panel);box-shadow:var(--shadow)}
  table.grid{border-collapse:collapse;width:max-content;min-width:100%;font-size:13px}
  table.grid th{position:sticky;top:0;background:#F0F2EF;color:var(--muted);font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;text-align:left;padding:9px 8px;border-bottom:1px solid var(--line-strong);white-space:nowrap;z-index:1}
  table.grid td{border-bottom:1px solid var(--line);border-right:1px solid #F0F1EF;padding:0;vertical-align:middle}
  table.grid tr:last-child td{border-bottom:none}
  table.grid td.num{color:var(--faint);font-family:"JetBrains Mono",monospace;text-align:center;padding:0 6px;width:34px}
  table.grid input,table.grid select{border:none;background:transparent;font-family:inherit;font-size:13px;color:var(--ink);padding:9px 8px;width:100%;outline:none;border-radius:0}
  table.grid input.mono{font-family:"JetBrains Mono",monospace}
  table.grid input:focus,table.grid select:focus{background:var(--green-soft);box-shadow:inset 0 0 0 2px var(--green)}
  table.grid td.calc{font-family:"JetBrains Mono",monospace;font-weight:600;color:var(--green);text-align:right;padding:9px 10px;white-space:nowrap;background:#FAFBF9}
  table.grid td.del{text-align:center;width:34px}
  table.grid td.del button{color:var(--warn);padding:8px;width:100%}
  table.grid td.del button:hover{background:var(--warn-soft)}
  .cw-item{min-width:150px}.cw-cat{min-width:110px}.cw-vendor{min-width:120px}.cw-num{min-width:66px}.cw-status{min-width:120px}.cw-fwd{min-width:110px}.cw-date{min-width:130px}
  .gridbar{display:flex;gap:10px;align-items:center;margin:12px 0}
  .gridbar .cnt{font-size:12px;color:var(--faint);margin-left:auto}
</style>
</head>
<body>
<header class="top">
  <div class="top-inner">
    <div class="brand"><span class="mark grot">Pur<b>chases</b></span><span class="org" id="orgName" title="Click to rename">Shakeel Electronics</span></div>
    <span class="rate-badge" id="rateBadge" title="Tap to change the RMB→PKR rate">¥1 = Rs 42.75</span>
    <button class="btn install" id="installBtn" style="display:none">Install</button>
    <button class="btn primary" id="addBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add purchase</button>
  </div>
</header>
<div class="wrap">
  <div class="tabs" id="tabs">
    <button data-tab="purchases" class="on">Sheet</button>
    <button data-tab="tobuy">To-buy</button>
    <button data-tab="category">Category</button>
    <button data-tab="pos">PO</button>
    <button data-tab="tracking">Track</button>
    <button data-tab="vendors">Vendors</button>
    <button data-tab="payments">Pay</button>
    <button data-tab="summary">More</button>
  </div>
  <div id="view"></div>
  <div class="footbar">
    <div style="display:flex;flex-direction:column;gap:3px"><span class="note" id="storageNote"></span><span class="note" id="autoSaveNote"></span></div>
    <div class="r">
      <button class="btn ghost sm" id="settingsBtn">Settings</button>
      <button class="btn ghost sm" id="autoSaveBtn"><span class="as-dot off"></span>Auto-save to folder</button>
      <button class="btn ghost sm" id="importBtn">Import backup</button>
      <button class="btn ghost sm" id="exportCsvBtn">Export CSV</button>
      <button class="btn ghost sm" id="exportJsonBtn">Backup data</button>
      <input type="file" id="importFile" accept="application/json" style="display:none"/>
    </div>
  </div>
</div>
<div class="scrim" id="scrim"></div>
<div class="toast" id="toast"></div>
<script>
/* ============================================================
   Purchases & Suppliers — import/purchase register (RMB→PKR)
   ============================================================ */
const KEY="purchases:data:v1";
const hasStore=(typeof window!=="undefined" && window.storage && typeof window.storage.get==="function");
const SEED={
  categories:["TCON","COF","SCALER","USED COF","ACF TAPES","LVDS","TAPES","OTHERS"],
  vendors:["CWZ","MEET","LI","NEW SLICE","23LA","GREEN","DOG","JENNY","RED","GZZ","NEW TCON","TANG","BALD","KEIDA","TJKJ","TEA","SHARP","MAY","BELLA","WAQAR","AAA","Reel Cof","ORANGE TCON","Cheiming","QUARTZ"],
  methods:["Bank Transfer","Cash","Alipay","WeChat Pay","Western Union","Other"],
  types:["Full Payment","Partial Payment","Advance"],
  statuses:["Ordered","Shipped","At Forwarder","In Transit","Customs","Received","Delivered"],
  forwarders:[]
};
const State={
  settings:{ org:"Shakeel Electronics", rate:42.75, currency:"Rs", countryCode:"92",
    categories:SEED.categories.slice(), vendors:SEED.vendors.slice(), methods:SEED.methods.slice(),
    types:SEED.types.slice(), statuses:SEED.statuses.slice(), forwarders:SEED.forwarders.slice(), seeded:false, autoSaveFolder:null, currentShipment:26, nextPO:1 },
  purchases:[], // {id,date,category,vendor,forwarder,item,qty,priceRMB,rate,status,createdAt,updatedAt}
  payments:[],  // {id,date,vendor,type,paidRMB,rate,method,ref,notes,createdAt}
  needs:[],     // {id,item,category,qty,targetRMB,note,createdAt}
  pos:[],       // {id,number,vendor,date,rate,lines:[{item,qty,priceRMB}],note,createdAt}
  tracking:[],  // {id,date,fromVendor,forwarder,item,qty,weight,status,createdAt}
  shipments:[], // {id,no,openedAt,closedAt}
};
let ui={ tab:"purchases", search:"", statusFilter:"", vendorFilter:"" };

/* ---------- storage ---------- */
async function load(){
  let d=null;
  if(hasStore){ try{ const r=await window.storage.get(KEY); if(r&&r.value) d=JSON.parse(r.value); }catch(e){} }
  if(!d) d=lsLoad();
  if(d){ State.settings=Object.assign(State.settings,d.settings||{}); State.purchases=d.purchases||[]; State.payments=d.payments||[]; State.needs=d.needs||[]; State.pos=d.pos||[]; State.tracking=d.tracking||[]; State.shipments=d.shipments||[]; }
  ["categories","vendors","methods","types","statuses"].forEach(k=>{ if(!State.settings[k]||!State.settings[k].length) State.settings[k]=SEED[k].slice(); });
  if(!State.settings.forwarders) State.settings.forwarders=[];
  // make sure the newer statuses (e.g. At Forwarder) are available
  if(!State.settings.statuses.includes("At Forwarder")) State.settings.statuses=SEED.statuses.slice();
  if(!Array.isArray(State.needs)) State.needs=[]; if(!Array.isArray(State.pos)) State.pos=[];
  if(!Array.isArray(State.shipments)) State.shipments=[];
  if(!State.settings.currentShipment) State.settings.currentShipment=26;
  if(!State.shipments.some(s=>s.no===State.settings.currentShipment))
    State.shipments.push({id:uid(),no:State.settings.currentShipment,openedAt:Date.now(),closedAt:null});
  // tag any legacy rows with the current shipment
  const cs=State.settings.currentShipment;
  State.purchases.forEach(p=>{ if(p.shipment==null) p.shipment=cs; });
  State.payments.forEach(p=>{ if(p.shipment==null) p.shipment=cs; });
  State.pos.forEach(p=>{ if(p.shipment==null) p.shipment=cs; });
  State.tracking.forEach(p=>{ if(p.shipment==null) p.shipment=cs; });
  if(ui.shipView===undefined) ui.shipView=State.settings.currentShipment;
}
function lsLoad(){ try{ const s=localStorage.getItem(KEY); return s?JSON.parse(s):null; }catch(e){ return null; } }
function lsSave(){ try{ localStorage.setItem(KEY,JSON.stringify(State)); return true; }catch(e){ return false; } }
let saveTimer=null,storageOK=true;
async function save(){ let ok=false; if(hasStore){ try{ await window.storage.set(KEY,JSON.stringify(State)); ok=true; }catch(e){} } if(lsSave()) ok=true; storageOK=ok; updateStorageNote(); }
function persist(){ State.settings.updatedAt=Date.now(); clearTimeout(saveTimer); saveTimer=setTimeout(save,120); if(dirHandle) writeToFolder(false); }
function updateStorageNote(){ const el=document.getElementById("storageNote"); if(!el) return;
  if(window.__cloudActive) return;
  if(!storageOK){ el.innerHTML=`<span style="color:var(--warn)">⚠ Couldn't save on this device — use “Backup data”.</span>`; }
  else if(dirHandle&&State.settings.autoSaveFolder){ el.textContent=""; } else { el.textContent="Saved automatically on this device."; } }
function applyLoaded(d){ if(!d) return; State.settings=Object.assign(State.settings,d.settings||{}); for(const k of Object.keys(State)){ if(k!=="settings"&&Array.isArray(State[k])&&Array.isArray(d[k])) State[k]=d[k]; } }

/* ---------- helpers ---------- */
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
function esc(s){ return String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
const C=()=>State.settings.currency;
function money(n){ const s=Math.abs(n).toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:0}); return (n<0?"-":"")+s; }
function money2(n){ const s=Math.abs(n).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}); return (n<0?"-":"")+s; }
function localISO(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }
const todayISO=()=>localISO(new Date());
function pTotals(p){ const rmb=(p.qty||0)*(p.priceRMB||0); const rate=p.rate||State.settings.rate; return { rmb, pkr:rmb*rate, unit:(p.priceRMB||0)*rate }; }
function vendorBalance(v){ // in RMB: purchased - paid  (positive = we still owe)
  const bought=sPurchases().filter(p=>p.vendor===v).reduce((s,p)=>s+(p.qty||0)*(p.priceRMB||0),0);
  const paid=sPayments().filter(x=>x.vendor===v).reduce((s,x)=>s+(x.paidRMB||0),0);
  return { bought, paid, balance: bought-paid };
}
function waNumber(phone){ if(!phone) return ""; let d=String(phone).replace(/[^\d+]/g,""); const cc=(State.settings.countryCode||"92").replace(/\D/g,""); if(d.startsWith("+"))d=d.slice(1); else if(d.startsWith("00"))d=d.slice(2); else if(d.startsWith("0"))d=cc+d.slice(1); else if(!d.startsWith(cc)&&d.length<=10)d=cc+d; return d; }

/* ---------- render ---------- */
function render(){
  document.getElementById("orgName").textContent=State.settings.org;
  document.getElementById("rateBadge").textContent=`¥1 = Rs ${State.settings.rate}`;
  document.querySelectorAll("#tabs [data-tab]").forEach(b=>b.classList.toggle("on",b.dataset.tab===ui.tab));
  if(ui.tab==="purchases") renderPurchases();
  else if(ui.tab==="tobuy") renderToBuy();
  else if(ui.tab==="category") renderCategory();
  else if(ui.tab==="pos") renderPOs();
  else if(ui.tab==="tracking") renderTracking();
  else if(ui.tab==="vendors") renderVendors();
  else if(ui.tab==="payments") renderPayments();
  else renderSummary();
}
function statTiles(){
  const cur=C();
  let totPKR=0, paidPKR=0;
  for(const p of sPurchases()){ totPKR+=pTotals(p).pkr; }
  for(const x of sPayments()){ paidPKR+=(x.paidRMB||0)*(x.rate||State.settings.rate); }
  let oweRMB=0; for(const v of vendorSet()){ const b=vendorBalance(v).balance; if(b>0) oweRMB+=b; }
  return `<div class="summary">
    <div class="stat accent"><div class="lab">Total purchased</div><div class="val">${cur} ${money(totPKR)}</div><div class="sub">${sPurchases().length} line${sPurchases().length===1?"":"s"}</div></div>
    <div class="stat"><div class="lab">Paid to vendors</div><div class="val" style="color:var(--paid)">${cur} ${money(paidPKR)}</div><div class="sub">${sPayments().length} payment${sPayments().length===1?"":"s"}</div></div>
    <div class="stat warn"><div class="lab">You still owe</div><div class="val">¥ ${money(oweRMB)}</div><div class="sub">${cur} ${money(oweRMB*State.settings.rate)}</div></div>
    <div class="stat"><div class="lab">Vendors</div><div class="val">${vendorSet().size}</div><div class="sub">active</div></div>
  </div>`;
}
function vendorSet(){ const s=new Set(); sPurchases().forEach(p=>p.vendor&&s.add(p.vendor)); sPayments().forEach(p=>p.vendor&&s.add(p.vendor)); return s; }

function curShip(){ return (ui.shipView!=null?ui.shipView:State.settings.currentShipment); }
function sPurchases(){ return State.purchases.filter(p=>p.shipment===curShip()); }
function sPayments(){ return State.payments.filter(p=>p.shipment===curShip()); }
function sPos(){ return State.pos.filter(p=>p.shipment===curShip()); }
function sTracking(){ return State.tracking.filter(p=>p.shipment===curShip()); }
function shipObj(no){ return State.shipments.find(s=>s.no===no); }
function shipLabel(no){ const s=shipObj(no); return (s&&s.name&&s.name.trim()) ? s.name.trim() : ("INVOICE NO "+no); }
function shipNos(){ return State.shipments.map(s=>s.no).sort((a,b)=>b-a); }
function shipRows(no){ return State.purchases.filter(p=>p.shipment===no); }
function shipBarHTML(){
  const nos=shipNos(); const sel=ui.shipView;
  const isOpen = sel===State.settings.currentShipment;
  const rows=shipRows(sel); let tot=0; rows.forEach(p=>tot+=pTotals(p).pkr);
  return `<div class="card" style="padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:linear-gradient(180deg,#FCFAF4,#fff);border-color:#E4D3A8">
    <div style="display:flex;align-items:center;gap:8px">
      <span style="font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)">Shipment</span>
      <select class="inp" id="shipSel" style="width:auto;padding:6px 10px;font-weight:700">${nos.map(n=>`<option value="${n}" ${n===sel?"selected":""}>${esc(shipLabel(n))}</option>`).join("")}</select>
      ${isOpen?`<span class="st Ordered" style="background:var(--green-soft);color:var(--green)">OPEN</span>`:`<span class="st">CLOSED</span>`}
    </div>
    <span style="font-size:12.5px;color:var(--muted)">${rows.length} items · <b class="mono" style="color:var(--green)">${C()} ${money(tot)}</b></span>
    <div style="margin-left:auto;display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn ghost sm" id="shipManage" title="Rename or delete this invoice">⚙</button>
      <button class="btn sm" id="arrivalBtn">📦 New arrival PDF</button>
      ${isOpen?`<button class="btn primary sm" id="finishShip">Finish → new shipment</button>`:""}
    </div>
  </div>`;
}
function renderPurchases(){
  const v=document.getElementById("view"); const cur=C();
  const q=ui.search.trim().toLowerCase();
  if(ui.shipView==null) ui.shipView=State.settings.currentShipment;
  let list=State.purchases.filter(p=>p.shipment===ui.shipView).sort((a,b)=> (b.createdAt||0)-(a.createdAt||0));
  if(ui.statusFilter) list=list.filter(p=>p.status===ui.statusFilter);
  if(q) list=list.filter(p=>((p.item||"")+" "+(p.vendor||"")+" "+(p.category||"")+" "+(p.status||"")).toLowerCase().includes(q));
  const cats=State.settings.categories, vendors=State.settings.vendors, statuses=State.settings.statuses;
  const catOpts=v=>`<option value=""></option>`+cats.map(c=>`<option ${v===c?"selected":""}>${esc(c)}</option>`).join("");
  const venOpts=v=>`<option value=""></option>`+vendors.map(c=>`<option ${v===c?"selected":""}>${esc(c)}</option>`).join("");
  const stOpts=v=>statuses.map(c=>`<option ${v===c?"selected":""}>${esc(c)}</option>`).join("");
  let html=statTiles()+shipBarHTML();
  html+=`<div class="toolbar"><div class="search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="psearch" placeholder="Search item, part no., vendor" value="${esc(ui.search)}"></div></div>
    <div class="seg" id="stFilter"><button class="${!ui.statusFilter?"on":""}" data-st="">All</button>${statuses.map(s=>`<button class="${ui.statusFilter===s?"on":""}" data-st="${esc(s)}">${esc(s)}</button>`).join("")}</div>`;
  html+=`<div class="gridbar"><button class="btn primary sm" id="addRow">＋ Add row</button><span class="cnt">${list.length} rows in this shipment</span></div>`;
  if(State.purchases.length===0){
    html+=`<div class="card"><div class="empty"><div class="big grot">Empty sheet</div><p>Tap <b>Add row</b> and just start typing — like Excel. Fill in the product now; add the vendor, price, qty or status whenever you get them. Totals calculate automatically.</p><button class="btn primary" id="addRow2" style="margin:0 auto">Add first row</button></div></div>`;
  }else{
    html+=`<div class="gridwrap"><table class="grid"><thead><tr>
      <th>#</th><th class="cw-item">Item / Part No.</th><th class="cw-cat">Category</th><th class="cw-vendor">Vendor</th>
      <th class="cw-num">Qty</th><th class="cw-num">¥/pc</th><th class="cw-num">Rate</th>
      <th style="text-align:right">Total Rs</th><th class="cw-status">Status</th><th class="cw-fwd">Forwarder</th><th></th></tr></thead><tbody id="gridBody">`;
    html+= list.map((p,i)=>{ const t=pTotals(p);
      return `<tr data-row="${p.id}">
        <td class="num">${i+1}</td>
        <td class="cw-item"><input data-f="item" value="${esc(p.item||"")}" placeholder="product…"></td>
        <td class="cw-cat"><select data-f="category">${catOpts(p.category)}</select></td>
        <td class="cw-vendor"><select data-f="vendor">${venOpts(p.vendor)}</select></td>
        <td class="cw-num"><input class="mono" data-f="qty" inputmode="numeric" value="${p.qty||""}"></td>
        <td class="cw-num"><input class="mono" data-f="priceRMB" inputmode="decimal" value="${p.priceRMB||""}"></td>
        <td class="cw-num"><input class="mono" data-f="rate" inputmode="decimal" value="${p.rate||State.settings.rate}"></td>
        <td class="calc" data-total>${money(t.pkr)}</td>
        <td class="cw-status"><select data-f="status">${stOpts(p.status||"Ordered")}</select></td>
        <td class="cw-fwd"><input data-f="forwarder" list="fwdlist" value="${esc(p.forwarder||"")}" placeholder="—"></td>
        <td class="del"><button data-del>✕</button></td>
      </tr>`; }).join("");
    html+=`</tbody></table></div><datalist id="fwdlist">${State.settings.forwarders.map(f=>`<option value="${esc(f)}">`).join("")}</datalist>`;
    if(list.length===0) html+=`<div style="text-align:center;color:var(--muted);font-size:13px;padding:16px">No rows match this filter.</div>`;
  }
  v.innerHTML=html;
  const ps=document.getElementById("psearch"); if(ps) ps.oninput=e=>{ ui.search=e.target.value; const s=e.target.selectionStart; renderPurchases(); const n=document.getElementById("psearch"); if(n){n.focus(); try{n.setSelectionRange(s,s);}catch(_){}} };
  v.querySelectorAll("[data-st]").forEach(b=>b.onclick=()=>{ ui.statusFilter=b.dataset.st; renderPurchases(); });
  ["addRow","addRow2"].forEach(id=>{ const b=document.getElementById(id); if(b) b.onclick=addBlankRow; });
  const ss2=document.getElementById("shipSel"); if(ss2) ss2.onchange=e=>{ ui.shipView=parseInt(e.target.value,10); renderPurchases(); };
  const fb=document.getElementById("finishShip"); if(fb) fb.onclick=finishShipment;
  const ab2=document.getElementById("arrivalBtn"); if(ab2) ab2.onclick=()=>arrivalPreview(ui.shipView);
  const smg=document.getElementById("shipManage"); if(smg) smg.onclick=()=>manageShipment(ui.shipView);
  wireGrid();
}
function manageShipment(no){
  const s=shipObj(no); if(!s) return;
  const rows=shipRows(no); let tot=0; rows.forEach(p=>tot+=pTotals(p).pkr);
  const isCur = no===State.settings.currentShipment;
  openScrim(`<div class="m-head"><h2>Manage invoice</h2><button class="btn ghost close" data-close style="margin-left:auto">✕</button></div>
    <div class="m-body">
      <div class="detail-sum" style="margin-bottom:14px">
        <div class="cell"><div class="l">Items</div><div class="v">${rows.length}</div></div>
        <div class="cell"><div class="l">Value</div><div class="v" style="font-size:14px">${C()} ${money(tot)}</div></div>
        <div class="cell"><div class="l">Status</div><div class="v" style="font-size:13px;color:${isCur?"var(--green)":"var(--muted)"}">${isCur?"OPEN":"CLOSED"}</div></div>
      </div>
      <label class="fld"><span class="lt">Invoice name</span><input class="inp" id="sh-name" value="${esc(s.name||"")}" placeholder="INVOICE NO ${no}"></label>
      <div class="hint">Leave blank to use the default name “INVOICE NO ${no}”. Each invoice keeps its own separate items.</div>
    </div>
    <div class="m-foot">
      <button class="btn danger" id="sh-del" style="margin-right:auto">Delete invoice</button>
      <button class="btn" data-close>Cancel</button>
      <button class="btn primary" id="sh-save">Save</button>
    </div>`);
  document.getElementById("sh-save").onclick=()=>{
    s.name=document.getElementById("sh-name").value.trim();
    persist(); renderPurchases(); closeScrim(); toast("Invoice renamed");
  };
  document.getElementById("sh-del").onclick=()=>{
    if(State.shipments.length<=1){ flash("You need at least one invoice"); return; }
    if(!confirm(`Delete "${shipLabel(no)}"?\n\nThis permanently removes its ${rows.length} item${rows.length===1?"":"s"}. This cannot be undone.`)) return;
    State.purchases=State.purchases.filter(p=>p.shipment!==no);
    State.payments=State.payments.filter(p=>p.shipment!==no);
    State.pos=State.pos.filter(p=>p.shipment!==no);
    State.tracking=State.tracking.filter(p=>p.shipment!==no);
    State.shipments=State.shipments.filter(x=>x.no!==no);
    if(State.settings.currentShipment===no){
      const remaining=State.shipments.map(x=>x.no).sort((a,b)=>b-a);
      State.settings.currentShipment=remaining[0];
    }
    ui.shipView=State.settings.currentShipment;

  };
}
function finishShipment(){
  const cur=State.settings.currentShipment;
  const rows=shipRows(cur);
  if(!confirm(`Finish "${shipLabel(cur)}" (${rows.length} items) and start a new empty invoice?\n\nThe old one stays saved — open it anytime from the dropdown.`)) return;
  const s=State.shipments.find(x=>x.no===cur); if(s) s.closedAt=Date.now();
  const next=cur+1;
  State.settings.currentShipment=next;
  State.shipments.push({id:uid(),no:next,openedAt:Date.now(),closedAt:null});
  ui.shipView=next;
  persist(); renderPurchases(); toast(`Started ${shipLabel(next)} — empty and ready`);
}
function wireGrid(rerender){
  rerender = rerender || renderPurchases;
  const body=document.getElementById("gridBody"); if(!body) return;
  body.querySelectorAll("tr[data-row]").forEach(tr=>{
    const p=State.purchases.find(x=>x.id===tr.dataset.row); if(!p) return;
    const recalc=()=>{ const cell=tr.querySelector("[data-total]"); if(cell) cell.textContent=money(pTotals(p).pkr); };
    tr.querySelectorAll("[data-f]").forEach(inp=>{
      const f=inp.dataset.f;
      const commit=()=>{ let val=inp.value; if(["qty","priceRMB","rate"].includes(f)) val=parseFloat(val)||0; p[f]=val; p.updatedAt=Date.now(); persist(); };
      inp.addEventListener("input",()=>{ if(["qty","priceRMB","rate"].includes(f)){ p[f]=parseFloat(inp.value)||0; recalc(); } });
      inp.addEventListener("change",commit);
      inp.addEventListener("blur",commit);
    });
    tr.querySelector("[data-del]").onclick=()=>{ if(confirm("Delete this row?")){ State.purchases=State.purchases.filter(x=>x.id!==p.id); persist(); rerender(); } };
  });
}

  const vendors=State.settings.vendors, statuses=State.settings.statuses;

      <td class="cw-item"><input data-f="item" value="${esc(t.item||"")}" placeholder="tracking no."></td>
      <td class="cw-num"><input class="mono" data-f="qty" inputmode="numeric" value="${t.qty||""}"></td>
      <td class="cw-num"><input data-f="weight" value="${esc(t.weight||"")}" placeholder="—"></td>
      <td class="cw-status"><select data-f="status">${stOpts(t.status||"Ordered")}</select></td>
      <td class="del"><button data-del>✕</button></td>
    </tr>`).join("");
    html+=`</tbody></table></div><datalist id="fwdlist">${State.settings.forwarders.map(f=>`<option value="${esc(f)}">`).join("")}</datalist>`;
  }
  v.innerHTML=html;

/* ---------- NEW ARRIVAL (item numbers only, for the WhatsApp group) ---------- */
function arrivalItems(no){
  const seen=new Set(); const out=[];
  for(const p of shipRows(no)){
    const it=(p.item||"").trim(); if(!it) continue;
    const k=it.toUpperCase(); if(seen.has(k)) continue; seen.add(k); out.push(it);
  }
  return out.sort((a,b)=>a.localeCompare(b));
}
function arrivalText(no){
  const items=arrivalItems(no);
  return `🆕 *NEW ARRIVAL* — ${State.settings.org}\n\n`+items.map((it,i)=>`${i+1}. ${it}`).join("\n")+`\n\n_${items.length} items now in stock._`;
}
function buildArrivalDoc(no){
  const { jsPDF }=window.jspdf;
  const items=arrivalItems(no);
  const doc=new jsPDF({unit:"pt",format:"a4"}); const L=48,R=548,W=R-L;
  const G=[16,86,74], GOLD=[176,138,62];
  doc.setFillColor(G[0],G[1],G[2]); doc.rect(0,0,595,92,"F");
  doc.setFont("helvetica","bold"); doc.setFontSize(21); doc.setTextColor(255,255,255);
  doc.text(State.settings.org, L, 42);
  doc.setFontSize(13); doc.setTextColor(226,214,180); doc.text("NEW ARRIVAL", L, 66);
  doc.setFont("helvetica","normal"); doc.setFontSize(10); doc.setTextColor(210,225,220);
  doc.text(`Shipment INVOICE NO ${no}`, R, 42, {align:"right"});
  doc.text(new Date().toLocaleDateString(), R, 60, {align:"right"});
  doc.setFillColor(GOLD[0],GOLD[1],GOLD[2]); doc.rect(0,92,595,4,"F");
  let y=128;
  doc.setFont("helvetica","bold"); doc.setFontSize(11); doc.setTextColor(16,86,74);
  doc.text(`${items.length} items now available`, L, y); y+=22;
  doc.setFont("helvetica","normal"); doc.setFontSize(12); doc.setTextColor(26,32,30);
  // two columns of item numbers
  const colW=W/2, perCol=Math.ceil(items.length/2)||1; let i=0;
  const startY=y;
  for(const col of [0,1]){
    y=startY;
    for(let k=0;k<perCol && i<items.length;k++,i++){
      if(y>770){ doc.addPage(); y=60; }
      const x=L+col*colW;
      doc.setTextColor(150,155,152); doc.setFontSize(9); doc.text(String(i+1).padStart(2,"0"), x, y);
      doc.setTextColor(26,32,30); doc.setFontSize(12); doc.text(String(items[i]).slice(0,30), x+22, y);
      doc.setDrawColor(238,240,238); doc.line(x, y+6, x+colW-20, y+6);
      y+=22;
    }
  }
  doc.setDrawColor(GOLD[0],GOLD[1],GOLD[2]); doc.line(L,800,R,800);
  doc.setFont("helvetica","normal"); doc.setFontSize(9); doc.setTextColor(140,145,142);
  doc.text(`${State.settings.org} · Contact us for prices & availability`, L, 815);
  return doc;
}

/* ---------- QUOTE REQUEST (send to vendor, one list per category) ---------- */
function rfqGroups(){
  // products still needing a price, grouped by category
  const g={};
  for(const p of State.purchases){
    if(p.priceRMB>0) continue;              // already priced
    const it=(p.item||"").trim(); if(!it) continue;
    const cat=(p.category||"Uncategorised");
    (g[cat]=g[cat]||[]).push({item:it, qty:p.qty||0});
  }
  // de-duplicate items within each category (sum qty)
  Object.keys(g).forEach(c=>{
    const m={};
    g[c].forEach(x=>{ const k=x.item.toUpperCase(); if(m[k]) m[k].qty+=x.qty; else m[k]={item:x.item,qty:x.qty}; });
    g[c]=Object.values(m).sort((a,b)=>a.item.localeCompare(b.item));
  });
  return g;
}

function rfqCategories(){
  const m={};
  for(const p of sPurchases()){
    if(!isIncomplete(p)) continue;
    const it=(p.item||"").trim(); if(!it) continue;
    const c=(p.category||"OTHERS").trim()||"OTHERS";
    (m[c]=m[c]||[]).push({item:it, qty:p.qty||0, ids:[p.id]});
  }
  Object.keys(m).forEach(c=>{
    const seen={}; const out=[];
    for(const r of m[c]){ const k=r.item.toUpperCase();
      if(seen[k]!=null){ out[seen[k]].qty += r.qty; out[seen[k]].ids.push(...r.ids); }
      else { seen[k]=out.length; out.push({item:r.item, qty:r.qty, ids:r.ids.slice()}); } }
    m[c]=out.sort((a,b)=>a.item.localeCompare(b.item));
  });
  return m;
}
function rfqText(cat, rows){
  return `*${State.settings.org}*\n*PRICE REQUEST — ${cat}*\n\n`
    + rows.map((r,i)=>`${i+1}. ${r.item}${r.qty?`  (qty ${r.qty})`:""}`).join("\n")
    + `\n\nPlease quote your best price per piece (¥) for the above. Thank you.`;
}
function buildRFQDoc(cat, rows){
  const { jsPDF }=window.jspdf;
  const doc=new jsPDF({unit:"pt",format:"a4"}); const L=48,R=548,W=R-L;
  const G=[16,86,74], GOLD=[176,138,62];
  doc.setFillColor(G[0],G[1],G[2]); doc.rect(0,0,595,92,"F");
  doc.setFont("helvetica","bold"); doc.setFontSize(20); doc.setTextColor(255,255,255); doc.text(State.settings.org, L, 42);
  doc.setFontSize(12); doc.setTextColor(226,214,180); doc.text("PRICE REQUEST / QUOTATION", L, 66);
  doc.setFont("helvetica","bold"); doc.setFontSize(14); doc.setTextColor(255,255,255); doc.text(cat, R, 45, {align:"right"});
  doc.setFont("helvetica","normal"); doc.setFontSize(9); doc.setTextColor(210,225,220); doc.text(new Date().toLocaleDateString(), R, 64, {align:"right"});
  doc.setFillColor(GOLD[0],GOLD[1],GOLD[2]); doc.rect(0,92,595,4,"F");
  let y=126;
  doc.setFont("helvetica","normal"); doc.setFontSize(10); doc.setTextColor(70,70,70);
  doc.text("Please fill in your best price per piece for each item below.", L, y); y+=24;
  const cQty=R-190, cPrice=R;
  doc.setFillColor(G[0],G[1],G[2]); doc.rect(L,y-14,W,22,"F");
  doc.setFont("helvetica","bold"); doc.setFontSize(9); doc.setTextColor(255,255,255);
  doc.text("#", L+6, y); doc.text("ITEM / PART NO.", L+28, y);
  doc.text("QTY", cQty, y, {align:"right"}); doc.text("YOUR PRICE (¥)", cPrice-4, y, {align:"right"});
  y+=22;
  doc.setFont("helvetica","normal"); doc.setFontSize(11); doc.setTextColor(26,32,30);
  rows.forEach((r,i)=>{
    if(y>760){ doc.addPage(); y=60; }
    if(i%2===1){ doc.setFillColor(246,248,246); doc.rect(L,y-13,W,20,"F"); }
    doc.setTextColor(150,155,152); doc.setFontSize(9); doc.text(String(i+1), L+6, y);
    doc.setTextColor(26,32,30); doc.setFontSize(11); doc.text(String(r.item).slice(0,42), L+28, y);
    doc.text(r.qty?String(r.qty):"—", cQty, y, {align:"right"});
    doc.setDrawColor(200,206,203); doc.roundedRect(cPrice-86, y-11, 82, 17, 3, 3);
    y+=20;
  });
  doc.setDrawColor(GOLD[0],GOLD[1],GOLD[2]); doc.line(L,800,R,800);
  doc.setFont("helvetica","normal"); doc.setFontSize(9); doc.setTextColor(140,145,142);
  doc.text(`${State.settings.org} · ${rows.length} items · ${cat}`, L, 815);
  doc.text("Thank you for your quotation.", R, 815, {align:"right"});
  return doc;
}
function openRFQ(){
  if(!ui.rfqOff) ui.rfqOff={};   // items unticked (excluded), keyed by CATEGORY|ITEM
  const draw=()=>{
    const m=rfqCategories();
    const cats=Object.keys(m).sort();
    if(!cats.length){ closeScrim(); flash("Nothing pending — add products without a price first"); return; }
    if(ui.rfqCat===undefined || !m[ui.rfqCat]) ui.rfqCat=cats[0];
    const cat=ui.rfqCat, rows=m[cat];
    const key=r=>cat+"|"+r.item.toUpperCase();
    const on=r=>!ui.rfqOff[key(r)];
    const chosen=rows.filter(on);
    openScrim(`<div class="m-head"><h2>Price request</h2><button class="btn ghost close" data-close style="margin-left:auto">✕</button></div>
      <div class="m-body">
        <div class="hint" style="margin:0 0 8px">Pick a category, then untick anything you don't want to ask about.</div>
        <div class="seg" id="rfqCats">${cats.map(c=>`<button class="${c===cat?"on":""}" data-rc="${esc(c)}">${esc(c)} <span style="opacity:.6">${m[c].length}</span></button>`).join("")}</div>
        <div style="background:linear-gradient(135deg,#10564A,#0C453B);color:#fff;border-radius:12px;padding:12px 14px;margin:12px 0;display:flex;align-items:center;gap:10px">
          <div><div style="font-weight:700;font-size:15px">${esc(cat)}</div>
          <div style="font-size:12px;opacity:.85">${chosen.length} of ${rows.length} selected</div></div>
          <button id="rfq-all" style="margin-left:auto;background:rgba(255,255,255,.18);color:#fff;border:none;border-radius:8px;padding:6px 10px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer">${chosen.length===rows.length?"Untick all":"Tick all"}</button>
        </div>
        <div style="max-height:38vh;overflow:auto">
          ${rows.map((r,i)=>`<div style="display:flex;gap:10px;align-items:center;padding:8px 0;border-bottom:1px solid var(--line);font-size:13.5px;opacity:${on(r)?1:.4}">
            <input type="checkbox" data-tick="${esc(r.item)}" ${on(r)?"checked":""} style="width:17px;height:17px;accent-color:var(--green);flex:none">
            <span style="font-weight:600;flex:1">${esc(r.item)}</span>
            ${r.qty?`<span class="mono" style="color:var(--muted);font-size:12px">qty ${r.qty}</span>`:""}
            <button data-drop="${esc(r.item)}" title="Delete this product" style="color:var(--warn);width:26px;flex:none;font-weight:700">✕</button>
          </div>`).join("")}
        </div>
      </div>
      <div class="m-foot"><button class="btn" id="rfq-copy">Copy</button><button class="btn" id="rfq-pdf">Save PDF</button><button class="btn wa" id="rfq-wa">Send on WhatsApp</button></div>`);
    scrim.querySelectorAll("[data-rc]").forEach(b=>b.onclick=()=>{ ui.rfqCat=b.dataset.rc; draw(); });
    scrim.querySelectorAll("[data-tick]").forEach(cb=>cb.onchange=()=>{
      const k=cat+"|"+cb.dataset.tick.toUpperCase();
      if(cb.checked) delete ui.rfqOff[k]; else ui.rfqOff[k]=1;
      draw();
    });
    scrim.querySelectorAll("[data-drop]").forEach(b=>b.onclick=()=>{
      const name=b.dataset.drop;
      const row=rows.find(r=>r.item===name); if(!row) return;
      if(!confirm(`Delete "${name}" from your products?\n\nThis removes it from the sheet completely.`)) return;
      State.purchases=State.purchases.filter(p=>!row.ids.includes(p.id));
      persist(); draw(); toast("Product deleted");
    });
    const go=(fn)=>{ if(!chosen.length){ flash("Tick at least one item"); return; } fn(); };
    document.getElementById("rfq-wa").onclick=()=>go(()=>{ const a=document.createElement("a"); a.href=`https://wa.me/?text=${encodeURIComponent(rfqText(cat,chosen))}`; a.target="_blank"; a.rel="noopener"; document.body.appendChild(a); a.click(); a.remove(); });
    document.getElementById("rfq-pdf").onclick=()=>go(()=>{ if(!(window.jspdf&&window.jspdf.jsPDF)){ flash("PDF engine loading — try again"); return; } buildRFQDoc(cat,chosen).save(`price-request-${cat.replace(/[^\w]+/g,"-")}.pdf`); toast("Saved to your Downloads folder"); });
    document.getElementById("rfq-copy").onclick=()=>go(async()=>{ try{ await navigator.clipboard.writeText(rfqText(cat,chosen)); toast("Copied"); }catch(e){ flash("Couldn't copy"); } });
    document.getElementById("rfq-all").onclick=()=>{
      if(chosen.length===rows.length){ rows.forEach(r=>ui.rfqOff[key(r)]=1); }
      else { rows.forEach(r=>delete ui.rfqOff[key(r)]); }
      draw();
    };
  };
  draw();
}

function changeRate(){ const n=prompt("Exchange rate — how many Rupees for ¥1?", State.settings.rate); if(n!=null){ const r=parseFloat(n); if(r>0){ State.settings.rate=r; persist(); render(); toast(`Rate set to ¥1 = Rs ${r}`); } } }

/* ---------- import / export ---------- */
function buildCsv(){
  const rows=[["#","Date","Category","Vendor","Item/Part No.","Qty","Price RMB","Rate","Total RMB","Total PKR","Unit PKR","Status"]];
  State.purchases.forEach((p,i)=>{ const t=pTotals(p); rows.push([i+1,p.date||"",p.category||"",p.vendor||"",p.item||"",p.qty,p.priceRMB,p.rate||State.settings.rate,t.rmb.toFixed(2),t.pkr.toFixed(2),t.unit.toFixed(2),p.status||""]); });
  return rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\r\n");
}
function downloadBlob(b,n){ const u=URL.createObjectURL(b); const a=document.createElement("a"); a.href=u; a.download=n; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(u),1000); }
function exportCsv(){ downloadBlob(new Blob([buildCsv()],{type:"text/csv"}),`purchases-${todayISO()}.csv`); toast("CSV exported"); }
function exportJson(){ downloadBlob(new Blob([JSON.stringify(State,null,2)],{type:"application/json"}),`purchases-backup-${todayISO()}.json`); toast("Backup downloaded"); }
function importJson(file){ const r=new FileReader(); r.onload=()=>{ try{ const d=JSON.parse(r.result); if(!Array.isArray(d.purchases)) throw 0; if(!confirm("Replace all purchases data with this backup?")) return; State.settings=Object.assign(State.settings,d.settings||{}); State.purchases=d.purchases||[]; State.payments=d.payments||[]; State.needs=d.needs||[]; State.pos=d.pos||[]; State.tracking=d.tracking||[]; State.shipments=d.shipments||[]; persist(); render(); toast("Backup restored"); }catch(e){ flash("Not a valid Purchases backup"); } }; r.readAsText(file); }

/* ---------- folder auto-save ---------- */
const FS_SUPPORTED=(typeof window!=="undefined" && "showDirectoryPicker" in window);
let dirHandle=null,fsTimer=null,fsLastSaved=null; const DATA_FILE="purchases.json",CSV_FILE="purchases.csv";
function idb(op,val){ return new Promise(res=>{ try{ const r=indexedDB.open("purchases-fs",1); r.onupgradeneeded=()=>r.result.createObjectStore("h"); r.onerror=()=>res(null); r.onsuccess=()=>{ const db=r.result; const tx=db.transaction("h",op==="get"?"readonly":"readwrite"); const st=tx.objectStore("h"); let rq=op==="get"?st.get("dir"):op==="set"?st.put(val,"dir"):st.delete("dir"); rq.onsuccess=()=>{ const out=op==="get"?rq.result:true; tx.oncomplete=()=>{db.close();res(out);}; }; rq.onerror=()=>{db.close();res(null);}; }; }catch(e){ res(null); } }); }
async function ensurePerm(h){ try{ const o={mode:"readwrite"}; if((await h.queryPermission(o))==="granted") return true; if((await h.requestPermission(o))==="granted") return true; }catch(e){} return false; }
async function writeFile(dir,name,text){ const fh=await dir.getFileHandle(name,{create:true}); const w=await fh.createWritable(); await w.write(text); await w.close(); }
async function writeToFolder(immediate){ if(!dirHandle) return; const doWrite=async()=>{ if(!(await ensurePerm(dirHandle))){ setAutoSaveState("warn"); return; } try{ await writeFile(dirHandle,DATA_FILE,JSON.stringify(State,null,2)); await writeFile(dirHandle,CSV_FILE,buildCsv()); fsLastSaved=new Date(); setAutoSaveState("on"); }catch(e){ setAutoSaveState("warn"); } }; clearTimeout(fsTimer); if(immediate) return doWrite(); fsTimer=setTimeout(doWrite,500); }
async function pickFolder(){ if(!FS_SUPPORTED){ flash("Folder auto-save needs Chrome or Edge"); return; } try{ const h=await window.showDirectoryPicker({mode:"readwrite",id:"purchases-autosave"}); dirHandle=h; await idb("set",h); State.settings.autoSaveFolder=h.name; persist(); await writeToFolder(true); toast(`Auto-saving to “${h.name}”`); }catch(e){ if(e&&e.name==="AbortError") return; flash("Browser blocked folder access — open in Chrome/Edge."); } }
async function turnOffAutoSave(){ dirHandle=null; fsLastSaved=null; State.settings.autoSaveFolder=null; await idb("del"); persist(); setAutoSaveState("off"); toast("Auto-save off"); }
function setAutoSaveState(state){ const btn=document.getElementById("autoSaveBtn"),note=document.getElementById("autoSaveNote"); if(!btn) return; const folder=State.settings.autoSaveFolder; const dot=c=>`<span class="as-dot ${c}"></span>`;
  if(state==="on"){ btn.innerHTML=dot("on")+`Saving to “${esc(folder||"folder")}”`; note.textContent=fsLastSaved?`Folder updated ${fsLastSaved.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"})}`:""; }
  else if(state==="warn"){ btn.innerHTML=dot("warn")+`Reconnect folder`; note.textContent=""; }
  else{ btn.innerHTML=dot("off")+`Auto-save to folder`; note.textContent=FS_SUPPORTED?"":"Open in Chrome/Edge to save into a folder"; } }
function openAutoSaveMenu(){ openScrim(`<div class="m-head"><h2>Folder auto-save</h2><button class="btn ghost close" data-close style="margin-left:auto">✕</button></div><div class="m-body"><p style="font-size:13.5px;color:var(--muted);margin:0">Saving to “${esc(State.settings.autoSaveFolder||"folder")}”. Files: ${DATA_FILE}, ${CSV_FILE}.</p></div><div class="m-foot"><button class="btn danger" id="as-off" style="margin-right:auto">Turn off</button><button class="btn" data-close>Close</button><button class="btn primary" id="as-change">Change folder</button></div>`);
  document.getElementById("as-off").onclick=()=>{ turnOffAutoSave(); closeScrim(); }; document.getElementById("as-change").onclick=()=>{ closeScrim(); pickFolder(); }; }
function onAutoSaveClick(){ if(dirHandle&&State.settings.autoSaveFolder){ ensurePerm(dirHandle).then(ok=>{ if(ok) writeToFolder(true); openAutoSaveMenu(); }); } else pickFolder(); }
async function loadFromFolderAndSync(){ let loaded=false; try{ const fh=await dirHandle.getFileHandle(DATA_FILE); const text=await (await fh.getFile()).text(); const d=JSON.parse(text); const ft=(d.settings&&d.settings.updatedAt)||0, lt=(State.settings&&State.settings.updatedAt)||0; if(ft>lt){ applyLoaded(d); render(); loaded=true; } }catch(e){} fsLastSaved=new Date(); setAutoSaveState("on"); writeToFolder(true); if(loaded) toast("Loaded latest from your folder"); }
async function autoConnectFolder(){ setAutoSaveState("off"); if(!FS_SUPPORTED) return; const h=await idb("get"); if(!h) return; dirHandle=h; let perm="prompt"; try{ perm=await h.queryPermission({mode:"readwrite"}); }catch(e){} if(perm==="granted"){ await loadFromFolderAndSync(); } else { dirHandle=null; setAutoSaveState("off"); } }

function openScrim(html){ scrim.innerHTML=`<div class="modal">${html}</div>`; requestAnimationFrame(()=>scrim.classList.add("show")); scrim.querySelectorAll("[data-close]").forEach(b=>b.onclick=closeScrim); }
