<style>
  :root{ --paper:#F4F5F2; --ink:#16211F; --muted:#6B7975; --line:#E2E6E1; --green:#10564A; --green-soft:#E7F0EC; --gold:#B08A3E; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overscroll-behavior:none;background:var(--paper)}
  body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif}
  #app{position:fixed;inset:0;display:flex;flex-direction:column}
  .frames{position:relative;flex:1;min-height:0;background:var(--paper)}
  .frames iframe{position:absolute;inset:0;width:100%;height:100%;border:0;background:var(--paper)}
  .frames iframe:not(.active){visibility:hidden;pointer-events:none}
  /* splash while a tab loads for the first time */
  .splash{position:absolute;inset:0;display:none;place-items:center;background:var(--paper);z-index:2}
  .splash.show{display:grid}
  .spinner{width:34px;height:34px;border-radius:50%;border:3px solid var(--green-soft);border-top-color:var(--green);animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  nav{
    display:flex;background:#fff;border-top:1px solid var(--line);
    padding-bottom:env(safe-area-inset-bottom);
    box-shadow:0 -2px 14px rgba(22,33,31,.05);
  }
  nav button{
    flex:1;border:0;background:none;cursor:pointer;-webkit-tap-highlight-color:transparent;
    display:flex;flex-direction:column;align-items:center;gap:3px;
    padding:9px 2px 8px;color:var(--muted);font-size:11px;font-weight:600;font-family:inherit;transition:color .15s;
  }
  nav button svg{width:23px;height:23px;stroke-width:2;transition:transform .15s}
  nav button.on{color:var(--green)}
  nav button.on svg{transform:translateY(-1px)}
  nav button .dot{width:4px;height:4px;border-radius:50%;background:var(--green);opacity:0;margin-top:1px;transition:opacity .15s}
  nav button.on .dot{opacity:1}
  @media (prefers-reduced-motion:reduce){ *{transition:none!important;animation:none!important} }
  .topbar{display:flex;align-items:center;gap:10px;padding:10px 14px;padding-top:calc(10px + env(safe-area-inset-top));background:#10564A;color:#fff}
  .topbar .nm{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;font-weight:700;font-size:15px;letter-spacing:-.01em}
  .topbar .sub{font-size:11px;opacity:.75;margin-left:2px}
  .topbar .sp{margin-left:auto}
  .ibtn{background:#B08A3E;color:#26200E;border:none;border-radius:9px;padding:7px 12px;font-weight:700;font-size:12.5px;font-family:inherit;cursor:pointer;display:none;align-items:center;gap:6px}
  .ibtn:hover{background:#C79B4A}
  .offline{display:none;background:#B7791F;color:#fff;font-size:12px;font-weight:600;text-align:center;padding:5px}
  .offline.show{display:block}
</style>
</head>

      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m7.5 4.27 9 5.15"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>
      <span>Buy</span><span class="dot"></span>
    </button>
  </nav>
</div>

<script>
  var V = "12"; // bump to force-refresh the sub-apps
  var frames = document.getElementById("frames");
  var splash = document.getElementById("splash");
  var loaded = {};   // tab -> iframe element

  function show(tab, src){
    // lazy-create the iframe on first open
    if(!loaded[tab]){
      splash.classList.add("show");
      var f = document.createElement("iframe");
      f.setAttribute("allow","clipboard-read; clipboard-write; fullscreen");
      f.src = src + "?v=" + V;
      f.addEventListener("load", function(){ splash.classList.remove("show"); });
      frames.appendChild(f);
      loaded[tab] = f;
    }
    // toggle visibility
    Object.keys(loaded).forEach(function(k){ loaded[k].classList.toggle("active", k===tab); });
  }

  document.getElementById("nav").addEventListener("click", function(e){
    var b = e.target.closest("[data-tab]"); if(!b) return;
    document.querySelectorAll("#nav button").forEach(function(x){ x.classList.toggle("on", x===b); });
    show(b.dataset.tab, b.dataset.src);
  });

  // open the default tab
  var first = document.querySelector("#nav button.on");
  show(first.dataset.tab, first.dataset.src);

  // ---- install as an app ----
  var deferred = null;
  var ibtn = document.getElementById("installBtn");
  function standalone(){ return (window.matchMedia && window.matchMedia("(display-mode: standalone)").matches) || window.navigator.standalone === true; }
  window.addEventListener("beforeinstallprompt", function(e){
    e.preventDefault(); deferred = e;
    if(!standalone()) ibtn.style.display = "inline-flex";
  });
  window.addEventListener("appinstalled", function(){ ibtn.style.display="none"; deferred=null; });
  ibtn.addEventListener("click", async function(){
    if(deferred){ deferred.prompt(); await deferred.userChoice; deferred=null; ibtn.style.display="none"; return; }
    var ios = /iphone|ipad|ipod/i.test(navigator.userAgent);
    alert(ios
      ? "To install:\n\n1. Tap the Share button\n2. Tap 'Add to Home Screen'\n3. Tap Add"
      : "To install:\n\n1. Open the browser menu (three dots)\n2. Tap 'Install app' or 'Add to Home screen'\n3. Confirm");
  });
  if(!standalone() && /iphone|ipad|ipod/i.test(navigator.userAgent)) ibtn.style.display = "inline-flex";

  // ---- offline indicator ----
  var ob = document.getElementById("offlineBar");
  function netState(){ ob.classList.toggle("show", !navigator.onLine); }
  window.addEventListener("online", netState);
  window.addEventListener("offline", netState);
  netState();
</script>
<script>
/* offline support */
if("serviceWorker" in navigator){ window.addEventListener("load",function(){ navigator.serviceWorker.register("sw.js").catch(function(){}); }); }
</script>
