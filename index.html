<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Shakeel Electronics — Apps</title>
<meta name="theme-color" content="#10564A" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--paper:#F4F5F2;--panel:#FFF;--ink:#16211F;--muted:#6B7975;--line:#E2E6E1;--green:#10564A;--green-hi:#0C453B;--green-soft:#E7F0EC;--gold:#B08A3E;--shadow:0 1px 2px rgba(22,33,31,.04),0 10px 30px rgba(22,33,31,.08);--ease:cubic-bezier(.22,.61,.36,1)}
  *{box-sizing:border-box}html,body{margin:0}
  body{background:var(--paper);color:var(--ink);font-family:"Inter",system-ui,sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;padding:calc(40px + env(safe-area-inset-top)) 20px 60px}
  .grot{font-family:"Space Grotesk",sans-serif}
  .wrap{max-width:560px;margin:0 auto}
  .head{text-align:center;margin-bottom:34px}
  .logo{width:64px;height:64px;border-radius:16px;margin:0 auto 16px;background:linear-gradient(180deg,#146052,#0C453B);display:grid;place-items:center;box-shadow:var(--shadow)}
  .logo svg{width:34px;height:34px;color:#fff}
  h1{font-family:"Space Grotesk";font-size:24px;font-weight:700;margin:0 0 4px;letter-spacing:-.02em}
  .head p{margin:0;color:var(--muted);font-size:14px}
  .cards{display:flex;flex-direction:column;gap:14px}
  a.card{display:flex;align-items:center;gap:16px;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px;text-decoration:none;color:inherit;box-shadow:var(--shadow);transition:.18s var(--ease)}
  a.card:hover,a.card:active{transform:translateY(-3px);border-color:#cbd4cf}
  .ic{width:54px;height:54px;border-radius:14px;flex-shrink:0;display:grid;place-items:center;background:var(--green-soft);color:var(--green)}
  .ic svg{width:28px;height:28px}
  .ic.gold{background:#F6EFDD;color:var(--gold)}
  .ic.blue{background:#E1EFF3;color:#1F6F8B}
  .tt{font-family:"Space Grotesk";font-weight:600;font-size:17px}
  .ds{font-size:13px;color:var(--muted);margin-top:2px}
  .arw{margin-left:auto;color:#B7C1BC}
  .foot{text-align:center;margin-top:30px;color:#9AA6A2;font-size:12px;line-height:1.7}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></div>
    <h1 class="grot">Shakeel Electronics</h1>
    <p>Your shop apps — tap to open</p>
  </div>
  <div class="cards">
    <a class="card" href="ledger.html">
      <div class="ic gold"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 2 3 14h8l-1 8 11-12h-8l1-8z"/></svg></div>
      <div><div class="tt">Ledger</div><div class="ds">Customer dues, payments & collections</div></div>
      <span class="arw"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></span>
    </a>
    <a class="card" href="stockbox.html">
      <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg></div>
      <div><div class="tt">StockBox</div><div class="ds">Which box a product is in & how many</div></div>
      <span class="arw"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></span>
    </a>
    <a class="card" href="orderbook.html">
      <div class="ic blue"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="m9 14 2 2 4-4"/></svg></div>
      <div><div class="tt">Order Book</div><div class="ds">Who ordered what & track till delivered</div></div>
      <span class="arw"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></span>
    </a>
  </div>
  <div class="foot">Tip: open any app, then use your browser's<br><b>Add to Home screen</b> to install it.</div>
</div>
</body>
</html>
