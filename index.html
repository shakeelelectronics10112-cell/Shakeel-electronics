<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0F1917; --ink-2:#38443F; --muted:#6B7975; --faint:#9AA6A2;
    --line:#E4E8E4; --line-2:#D2D8D3; --paper:#F5F6F3; --panel:#FFFFFF;
    --brand:#0E4F44; --brand-2:#0A3E35; --brand-soft:#E6F0EC; --brand-ink:#0B3A32;
    --gold:#B08A3E; --gold-soft:#FBF3E2;
    --good:#2E7D5B; --good-soft:#E4F1EA;
    --warn:#B0492C; --warn-soft:#F8EAE4;
    --info:#1F6F8B; --info-soft:#E4F0F4;
    --r:16px; --r-sm:11px;
    --sh:0 1px 2px rgba(15,25,23,.04), 0 10px 30px rgba(15,25,23,.06);
    --sh-lg:0 20px 60px rgba(15,25,23,.16);
    --ease:cubic-bezier(.22,.61,.36,1);
    --nav-h:64px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{background:var(--paper);color:var(--ink);font-family:Inter,system-ui,-apple-system,sans-serif;
       -webkit-font-smoothing:antialiased;display:flex;flex-direction:column;overflow:hidden}
  button{font-family:inherit;border:none;background:none;color:inherit;cursor:pointer}
  .mono{font-family:"JetBrains Mono",ui-monospace,monospace;font-variant-numeric:tabular-nums}
  .grot{font-family:"Space Grotesk",system-ui,sans-serif}

  /* ---------- top bar ---------- */
  .topbar{flex:0 0 auto;background:var(--brand);color:#fff;padding:12px 16px;
          padding-top:calc(12px + env(safe-area-inset-top));display:flex;align-items:center;gap:12px;
          box-shadow:0 1px 0 rgba(255,255,255,.06) inset, 0 2px 12px rgba(0,0,0,.10)}
  .logo{width:32px;height:32px;border-radius:9px;background:linear-gradient(140deg,#17705F,#0A3E35);
        display:grid;place-items:center;flex:0 0 auto;border:1px solid rgba(255,255,255,.16)}
  .logo span{font-family:"Space Grotesk";font-weight:700;font-size:14px;color:#E8D9AE}
  .bwrap{min-width:0}
  .bname{font-family:"Space Grotesk";font-weight:700;font-size:15.5px;letter-spacing:-.01em;line-height:1.15;
         white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .btag{font-size:10.5px;color:#9FC4B9;letter-spacing:.06em;text-transform:uppercase;font-weight:600}
  .tb-actions{margin-left:auto;display:flex;align-items:center;gap:8px}
  .iconbtn{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;
           background:rgba(255,255,255,.10);transition:.15s}
  .iconbtn:hover{background:rgba(255,255,255,.18)}
  .iconbtn svg{width:17px;height:17px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .install{display:none;align-items:center;gap:6px;background:var(--gold);color:#241D0B;font-weight:700;
           font-size:12.5px;padding:7px 12px;border-radius:9px;white-space:nowrap}
  .install:hover{background:#C39A4B}

  .netbar{flex:0 0 auto;display:none;background:#8A6A2A;color:#fff;font-size:12px;font-weight:600;
          text-align:center;padding:6px 10px}
  .netbar.show{display:block}

  /* ---------- stage ---------- */
  .stage{flex:1 1 auto;position:relative;overflow:hidden}
  .stage iframe{position:absolute;inset:0;width:100%;height:100%;border:0;background:var(--paper);
                opacity:0;transition:opacity .18s var(--ease)}
  .stage iframe.on{opacity:1;z-index:2}
  .pane{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;
        padding:18px 16px calc(20px + env(safe-area-inset-bottom));display:none}
  .pane.on{display:block;z-index:2}

  /* ---------- dashboard ---------- */
  .hello{margin:2px 0 16px}
  .hello h1{font-family:"Space Grotesk";font-size:22px;font-weight:700;margin:0;letter-spacing:-.02em}
  .hello p{margin:3px 0 0;font-size:13px;color:var(--muted)}

  .kpis{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:14px;
       box-shadow:var(--sh);position:relative;overflow:hidden;cursor:pointer;transition:.16s var(--ease)}
  .kpi:active{transform:scale(.985)}
  .kpi .top{display:flex;align-items:center;gap:7px;margin-bottom:9px}
  .kpi .ic{width:26px;height:26px;border-radius:8px;display:grid;place-items:center;flex:0 0 auto}
  .kpi .ic svg{width:14px;height:14px;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
  .kpi .lb{font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
  .kpi .val{font-family:"JetBrains Mono";font-size:21px;font-weight:700;letter-spacing:-.02em;line-height:1.1}
  .kpi .sub{font-size:11.5px;color:var(--muted);margin-top:4px}
  .kpi.owed .ic{background:var(--good-soft)} .kpi.owed .ic svg{stroke:var(--good)} .kpi.owed .val{color:var(--good)}
  .kpi.owe  .ic{background:var(--warn-soft)} .kpi.owe  .ic svg{stroke:var(--warn)} .kpi.owe  .val{color:var(--warn)}
  .kpi.ship .ic{background:var(--info-soft)} .kpi.ship .ic svg{stroke:var(--info)}
  .kpi.stock .ic{background:var(--gold-soft)} .kpi.stock .ic svg{stroke:var(--gold)}
  .kpi .skel{height:21px;width:70%;border-radius:6px;background:linear-gradient(90deg,#EDEFEC,#F6F7F5,#EDEFEC);
             background-size:200% 100%;animation:sh 1.2s infinite}
  @keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}

  .sect{font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);
        margin:22px 2px 10px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}

  .apps{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .app{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:15px 14px;
       box-shadow:var(--sh);text-align:left;transition:.16s var(--ease);display:flex;flex-direction:column;gap:9px}
  .app:hover{border-color:var(--line-2);transform:translateY(-2px);box-shadow:0 6px 22px rgba(15,25,23,.09)}
  .app:active{transform:translateY(0)}
  .app .ic{width:36px;height:36px;border-radius:10px;display:grid;place-items:center}
  .app .ic svg{width:18px;height:18px;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .app .t{font-weight:700;font-size:14.5px;letter-spacing:-.01em}
  .app .d{font-size:11.5px;color:var(--muted);line-height:1.4}
  .app .badge{position:absolute}
  .i-ledger{background:var(--good-soft)} .i-ledger svg{stroke:var(--good)}
  .i-buy{background:var(--warn-soft)} .i-buy svg{stroke:var(--warn)}
  .i-label{background:var(--info-soft)} .i-label svg{stroke:var(--info)}
  .i-stock{background:var(--gold-soft)} .i-stock svg{stroke:var(--gold)}
  .i-order{background:var(--brand-soft)} .i-order svg{stroke:var(--brand)}

  .row{display:flex;align-items:center;gap:12px;padding:13px 15px;border-bottom:1px solid var(--line)}
  .row:last-child{border-bottom:none}
  .row .av{width:34px;height:34px;border-radius:9px;background:var(--brand-soft);color:var(--brand);
           display:grid;place-items:center;font-family:"Space Grotesk";font-weight:700;font-size:12px;flex:0 0 auto}
  .row .m{flex:1;min-width:0}
  .row .n{font-weight:600;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .row .s{font-size:11.5px;color:var(--muted);margin-top:1px}
  .row .a{font-family:"JetBrains Mono";font-weight:700;font-size:13.5px;color:var(--warn)}
  .emptyline{padding:26px 16px;text-align:center;color:var(--muted);font-size:13px}

  /* ---------- bottom nav ---------- */
  nav{flex:0 0 auto;display:flex;background:rgba(255,255,255,.94);backdrop-filter:blur(12px);
      border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom);z-index:5}
  nav button{flex:1;padding:9px 2px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;
             color:var(--faint);transition:color .15s;position:relative}
  nav button svg{width:21px;height:21px;fill:none;stroke:currentColor;stroke-width:1.9;
                 stroke-linecap:round;stroke-linejoin:round}
  nav button span{font-size:10px;font-weight:600;letter-spacing:.01em}
  nav button.on{color:var(--brand)}
  nav button.on::before{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);
                        width:26px;height:2.5px;border-radius:0 0 3px 3px;background:var(--brand)}

  /* ---------- login gate ---------- */
  #gate{position:fixed;inset:0;z-index:999;background:linear-gradient(160deg,#0E4F44,#08312A);
        display:flex;align-items:center;justify-content:center;padding:24px}
  #gate .box{width:100%;max-width:380px;background:#fff;border-radius:20px;padding:28px 24px;
             box-shadow:0 30px 80px rgba(0,0,0,.35)}
  #gate .lg{width:52px;height:52px;border-radius:14px;margin:0 auto 16px;
            background:linear-gradient(140deg,#17705F,#0A3E35);display:grid;place-items:center}
  #gate .lg span{font-family:"Space Grotesk";font-weight:700;font-size:20px;color:#E8D9AE}
  #gate h2{font-family:"Space Grotesk";font-size:19px;font-weight:700;text-align:center;margin:0 0 4px}
  #gate p.sub{text-align:center;font-size:13px;color:var(--muted);margin:0 0 20px}
  #gate label{display:block;margin-bottom:12px}
  #gate .lt{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px}
  #gate input{width:100%;font-family:inherit;font-size:15px;padding:12px 13px;border:1px solid var(--line-2);
              border-radius:11px;background:#fff}
  #gate input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
  #gate .go{width:100%;background:var(--brand);color:#fff;font-weight:700;font-size:15px;padding:13px;
            border-radius:11px;margin-top:6px;transition:.15s}
  #gate .go:hover{background:var(--brand-2)}
  #gate .go[disabled]{opacity:.6}
  #gate .err{font-size:13px;color:var(--warn);background:var(--warn-soft);padding:9px 11px;
             border-radius:9px;margin-bottom:12px;display:none}
  #gate .err.show{display:block}
  #gate .foot{text-align:center;font-size:11.5px;color:var(--faint);margin-top:16px;line-height:1.5}
  body.locked{overflow:hidden}

  /* ---------- login ---------- */
  #lock{position:fixed;inset:0;z-index:100;background:linear-gradient(160deg,#0E4F44,#072A24);
        display:flex;align-items:center;justify-content:center;padding:22px;
        padding-top:calc(22px + env(safe-area-inset-top))}
  #lock.hide{display:none}
  .lbox{width:min(380px,100%);background:#fff;border-radius:20px;padding:26px 22px;
        box-shadow:0 30px 80px rgba(0,0,0,.35)}
  .lmark{width:48px;height:48px;border-radius:13px;background:linear-gradient(140deg,#17705F,#0A3E35);
         display:grid;place-items:center;margin:0 auto 14px}
  .lmark span{font-family:"Space Grotesk";font-weight:700;font-size:19px;color:#E8D9AE}
  .lbox h2{font-family:"Space Grotesk";font-size:19px;font-weight:700;text-align:center;margin:0 0 3px}
  .lbox .sub{text-align:center;font-size:12.5px;color:var(--muted);margin-bottom:20px}
  .lfld{margin-bottom:12px}
  .lfld label{display:block;font-size:11.5px;font-weight:700;color:var(--muted);margin-bottom:5px;
              letter-spacing:.03em;text-transform:uppercase}
  .lfld input{width:100%;font-family:inherit;font-size:15px;padding:12px 13px;border:1.5px solid var(--line-2);
              border-radius:11px;background:#fff}
  .lfld input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
  .lbtn{width:100%;background:var(--brand);color:#fff;font-weight:700;font-size:15px;padding:13px;
        border-radius:11px;margin-top:6px;transition:.15s}
  .lbtn:hover{background:var(--brand-2)}
  .lbtn:disabled{opacity:.6}
  .lerr{background:var(--warn-soft);color:var(--warn);font-size:12.5px;font-weight:600;padding:9px 11px;
        border-radius:9px;margin-bottom:12px;display:none}
  .lerr.show{display:block}
  .lnote{font-size:11.5px;color:var(--faint);text-align:center;margin-top:14px;line-height:1.5}
  .signout{font-size:11px}
</style>
</head>
<body>

<div id="gate">
  <div class="box">
    <div class="lg"><span>SE</span></div>
    <h2 class="grot">Shakeel Electronics</h2>

<script>
var V = "26";  // cache-buster: bump when you upload new app files

/* ---------- navigation ---------- */
var stage = document.getElementById("stage");
var frames = {};
function show(tab, src){
  document.querySelectorAll("#nav button").forEach(function(b){
    b.classList.toggle("on", b.dataset.tab === tab);
  });
  document.getElementById("home").classList.toggle("on", tab === "home");
  Object.keys(frames).forEach(function(k){ frames[k].classList.toggle("on", k === tab); });
  if(tab === "home" || !src) return;
  if(!frames[tab]){
    var f = document.createElement("iframe");
    f.src = src + "?v=" + V;
    f.setAttribute("allow", "clipboard-write");
    stage.appendChild(f);
    frames[tab] = f;
    requestAnimationFrame(function(){ f.classList.add("on"); });
  }
}
document.getElementById("nav").addEventListener("click", function(e){
  var b = e.target.closest("button[data-tab]");
  if(b) show(b.dataset.tab, b.dataset.src);
});
document.querySelectorAll("[data-go]").forEach(function(el){
  el.addEventListener("click", function(){
    var t = el.dataset.go;
    var btn = document.querySelector('#nav button[data-tab="' + t + '"]');
    if(btn) show(t, btn.dataset.src);
  });
});
document.getElementById("refreshBtn").onclick = function(){ location.reload(); };

/* ---------- greeting ---------- */
(function(){
  var h = new Date().getHours();
  document.getElementById("greet").textContent =
    h < 12 ? "Good morning" : h < 17 ? "Good afternoon" : "Good evening";
  document.getElementById("dateline").textContent =
    new Date().toLocaleDateString(undefined,{weekday:"long", day:"numeric", month:"long"});
})();

/* ---------- install ---------- */
var dp = null, ib = document.getElementById("installBtn");
function standalone(){
  return (window.matchMedia && window.matchMedia("(display-mode: standalone)").matches)
      || window.navigator.standalone === true;
}
window.addEventListener("beforeinstallprompt", function(e){
  e.preventDefault(); dp = e;
  if(!standalone()) ib.style.display = "inline-flex";
});
window.addEventListener("appinstalled", function(){ ib.style.display = "none"; dp = null; });
ib.onclick = async function(){
  if(dp){ dp.prompt(); await dp.userChoice; dp = null; ib.style.display = "none"; return; }
  var ios = /iphone|ipad|ipod/i.test(navigator.userAgent);
  alert(ios ? "To install:\n\n1. Tap Share\n2. Tap 'Add to Home Screen'\n3. Tap Add"
            : "To install:\n\n1. Open the browser menu (⋮)\n2. Tap 'Install app'\n3. Confirm");
};
if(!standalone() && /iphone|ipad|ipod/i.test(navigator.userAgent)) ib.style.display = "inline-flex";

/* ---------- offline banner ---------- */
var nb = document.getElementById("netbar");
function net(){ nb.classList.toggle("show", !navigator.onLine); }
window.addEventListener("online", net);
window.addEventListener("offline", net);
net();

/* ---------- service worker ---------- */
if("serviceWorker" in navigator){
  window.addEventListener("load", function(){
    navigator.serviceWorker.register("sw.js").catch(function(){});
  });
}
</script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script>
/* ---------- live dashboard ---------- */
(function(){
  var FB = {apiKey:"AIzaSyAQXOHU-_vZQ6fXDjdJvcvBg8dMx01X_tc",authDomain:"shakeel-shop.firebaseapp.com",
            projectId:"shakeel-shop",storageBucket:"shakeel-shop.firebasestorage.app",
            messagingSenderId:"60087476008",appId:"1:60087476008:web:73f7c946ae62a687a3ba1d"};
  var money = function(n){
    n = Math.round(n || 0);
    return (n < 0 ? "-" : "") + Math.abs(n).toLocaleString();
  };
  var esc = function(s){
    return String(s == null ? "" : s).replace(/[&<>"']/g, function(c){
      return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];
    });
  };
  var initials = function(n){
    return ((n || "").trim().split(/\s+/).map(function(w){ return w[0] || ""; })
            .slice(0,2).join("") || "?").toUpperCase();
  };
  var set = function(id, html){ var e = document.getElementById(id); if(e) e.innerHTML = html; };
  var syncline = document.getElementById("syncline");

  var data = { ledger:null, purchases:null };

  if(typeof firebase === "undefined"){ syncline.textContent = "Offline — showing saved data"; return; }
  try{
    firebase.initializeApp(FB);
    var db = firebase.firestore();
    var gate = document.getElementById("gate");
    var gErr = document.getElementById("gErr");
    var gGo  = document.getElementById("gGo");
    var started = false;
    document.body.classList.add("locked");

    function fail(msg){ gErr.textContent = msg; gErr.classList.add("show"); }

    gGo.onclick = function(){
      var em = document.getElementById("gEmail").value.trim();
      var pw = document.getElementById("gPass").value;
      if(!em || !pw){ fail("Enter your email and password."); return; }
      gErr.classList.remove("show");
      gGo.disabled = true; gGo.textContent = "Signing in…";
      firebase.auth().signInWithEmailAndPassword(em, pw).catch(function(e){
        gGo.disabled = false; gGo.textContent = "Sign in";
        var c = e && e.code || "";
        fail(c.indexOf("wrong-password") >= 0 || c.indexOf("invalid-credential") >= 0
               ? "Wrong email or password."
             : c.indexOf("user-not-found") >= 0 ? "No account with that email."
             : c.indexOf("too-many-requests") >= 0 ? "Too many attempts — wait a moment."
             : c.indexOf("network") >= 0 ? "No internet connection."
             : "Couldn't sign in. Please try again.");
      });
    };
    document.getElementById("gPass").addEventListener("keydown", function(e){
      if(e.key === "Enter") gGo.click();
    });

    document.getElementById("outBtn").onclick = function(){
      if(confirm("Sign out of Shakeel Electronics?")) firebase.auth().signOut().then(function(){ location.reload(); });
    };

    firebase.auth().onAuthStateChanged(function(u){
      // an old anonymous session is no longer valid — throw it away
      if(u && u.isAnonymous){ firebase.auth().signOut(); return; }
      if(u){
        gate.style.display = "none";
        document.body.classList.remove("locked");
        if(!started){ started = true; watch(db); }
      } else {
        gate.style.display = "flex";
        document.body.classList.add("locked");
        gGo.disabled = false; gGo.textContent = "Sign in";
      }
    });
  }catch(e){ return; }

  function watch(db){
    ["ledger","purchases"].forEach(function(key){
      db.collection("shops").doc("main").collection("apps").doc(key)
        .onSnapshot(function(snap){
          data[key] = (snap.exists && snap.data() && snap.data().state) || null;
          paint();
          syncline.textContent = "☁ Synced · " + new Date().toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
        }, function(){ syncline.textContent = "Offline — showing saved data"; });
    });
  }

  function paint(){
    var L = data.ledger, P = data.purchases;
    var alerts = [];

    /* --- owed to you (ledger) --- */
    if(L && Array.isArray(L.members)){
      var txs = L.transactions || [];
      var bal = {};
      txs.forEach(function(t){
        if(!bal[t.memberId]) bal[t.memberId] = 0;
        if(t.type === "charge") bal[t.memberId] += (t.amount || 0);
        else if(t.type === "payment") bal[t.memberId] -= (t.amount || 0);
      });
      var owing = L.members.map(function(m){
        return { name:m.name, phone:m.phone, bal: bal[m.id] || 0 };
      }).filter(function(m){ return m.bal > 0.5; }).sort(function(a,b){ return b.bal - a.bal; });

      var total = owing.reduce(function(s,m){ return s + m.bal; }, 0);
      set("k-owed", "Rs " + money(total));
      set("k-owed-s", owing.length + " customer" + (owing.length === 1 ? "" : "s") + " owe you");

      owing.slice(0,4).forEach(function(m){
        alerts.push({
          av: initials(m.name),
          n: m.name,
          s: "Outstanding balance",
          a: "Rs " + money(m.bal),
          go: "ledger"
        });
      });
    }

    /* --- purchases: owe suppliers, in transit, invoice --- */
    if(P && Array.isArray(P.purchases)){
      var rate = (P.settings && P.settings.rate) || 42.75;
      var cur  = (P.settings && P.settings.currentShipment);
      var rows = P.purchases.filter(function(p){ return p.shipment === cur; });
      var pays = (P.payments || []).filter(function(p){ return p.shipment === cur; });

      var vend = {};
      rows.forEach(function(p){
        if(!p.vendor) return;
        vend[p.vendor] = (vend[p.vendor] || 0) + (p.qty || 0) * (p.priceRMB || 0);
      });
      pays.forEach(function(p){
        if(!p.vendor) return;
        vend[p.vendor] = (vend[p.vendor] || 0) - (p.paidRMB || 0);
      });
      var oweRmb = 0;
      Object.keys(vend).forEach(function(v){ if(vend[v] > 0.01) oweRmb += vend[v]; });
      set("k-owe", "¥ " + money(oweRmb));
      set("k-owe-s", "≈ Rs " + money(oweRmb * rate));

      var tracking = (P.tracking || []).filter(function(t){ return t.shipment === cur; });
      var moving = tracking.filter(function(t){
        return t.status && ["Shipped","At Forwarder","In Transit","Customs"].indexOf(t.status) >= 0;
      });
      set("k-ship", String(moving.length));
      set("k-ship-s", moving.length ? "parcels on the way" : "nothing moving");

      var ship = (P.shipments || []).filter(function(s){ return s.no === cur; })[0];
      var label = (ship && ship.name && ship.name.trim()) ? ship.name.trim() : ("INVOICE " + cur);
      var val = rows.reduce(function(s,p){
        return s + (p.qty || 0) * (p.priceRMB || 0) * (p.rate || rate);
      }, 0);
      set("k-inv", esc(label));
      set("k-inv-s", rows.length + " items · Rs " + money(val));

      var incomplete = rows.filter(function(p){
        return (p.item || "").trim() && (!p.vendor || !(p.priceRMB > 0));
      });
      if(incomplete.length){
        alerts.push({
          av: "🛒",
          n: incomplete.length + " product" + (incomplete.length === 1 ? "" : "s") + " need a price",
          s: "Ask your vendors for a quote",
          a: "",
          go: "purchases"
        });
      }
    }

    if(!alerts.length){
      set("attention", '<div class="emptyline">Nothing needs chasing right now 🎉</div>');
    } else {
      set("attention", alerts.map(function(a){
        return '<div class="row" data-jump="' + a.go + '" style="cursor:pointer">'
             + '<div class="av">' + esc(a.av) + '</div>'
             + '<div class="m"><div class="n">' + esc(a.n) + '</div><div class="s">' + esc(a.s) + '</div></div>'
             + '<div class="a">' + esc(a.a) + '</div></div>';
      }).join(""));
      document.querySelectorAll("[data-jump]").forEach(function(el){
        el.onclick = function(){
          var t = el.dataset.jump;
          var btn = document.querySelector('#nav button[data-tab="' + t + '"]');
          if(btn) btn.click();
        };
      });
    }
  }
})();
</script>
