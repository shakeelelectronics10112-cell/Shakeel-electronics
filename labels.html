<style>
  :root{--paper:#F4F5F2;--panel:#FFF;--ink:#16211F;--muted:#6B7975;--faint:#9AA6A2;--line:#E2E6E1;--line-strong:#CDD4CF;--green:#10564A;--green-hi:#0C453B;--green-soft:#E7F0EC;--warn:#B8492C;--warn-soft:#F7E9E1;--gold:#B08A3E;--shadow:0 1px 2px rgba(22,33,31,.04),0 8px 24px rgba(22,33,31,.06);--radius:14px;--ease:cubic-bezier(.22,.61,.36,1)}
  *{box-sizing:border-box}html,body{margin:0}
  body{background:var(--paper);color:var(--ink);font-family:"Inter",system-ui,sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;-webkit-tap-highlight-color:transparent}
  .grot{font-family:"Space Grotesk",sans-serif}
  .wrap{max-width:900px;margin:0 auto;padding:0 16px 90px;padding-bottom:calc(90px + env(safe-area-inset-bottom))}
  header.top{position:sticky;top:0;z-index:20;background:rgba(244,245,242,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  .top-inner{max-width:900px;margin:0 auto;padding:12px 16px;padding-top:calc(12px + env(safe-area-inset-top));display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .brand{font-family:"Space Grotesk";font-weight:700;font-size:19px;margin-right:auto}
  .brand b{color:var(--green)}
  .btn{display:inline-flex;align-items:center;gap:7px;font-size:13.5px;font-weight:600;padding:9px 14px;border-radius:10px;border:1px solid var(--line-strong);background:var(--panel);transition:.15s;white-space:nowrap}
  .btn:hover{border-color:var(--faint);transform:translateY(-1px)}
  .btn.primary{background:var(--green);color:#fff;border-color:var(--green)}.btn.primary:hover{background:var(--green-hi)}
  .btn.ghost{border-color:transparent;background:transparent;color:var(--muted)}.btn.ghost:hover{background:var(--line);color:var(--ink)}
  .btn.danger{color:var(--warn);border-color:transparent}.btn.danger:hover{background:var(--warn-soft)}
  .btn.gold{background:var(--gold);color:#26200E;border-color:var(--gold);font-weight:700}
  .btn.sm{padding:6px 11px;font-size:12.5px}
  .search{display:flex;align-items:center;gap:9px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:0 12px;margin:16px 0 12px}
  .search svg{width:16px;height:16px;color:var(--faint);flex-shrink:0}
  .search input{border:none;outline:none;background:none;font-family:inherit;font-size:14px;padding:11px 0;width:100%}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
  .arow{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--line);transition:background .12s}
  .arow:last-child{border-bottom:none}.arow:hover{background:#FAFBF9}
  .arow .av{width:42px;height:42px;border-radius:11px;flex-shrink:0;display:grid;place-items:center;font-family:"Space Grotesk";font-weight:700;font-size:14px;color:var(--green);background:var(--green-soft)}
  .arow .mid{flex:1;min-width:0;cursor:pointer}
  .arow .nm{font-weight:700;font-size:14.5px}
  .arow .ad{font-size:12.5px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .arow .ph{font-size:12px;color:var(--faint);margin-top:1px}
  .empty{padding:56px 20px;text-align:center;color:var(--muted)}
  .empty .big{font-family:"Space Grotesk";font-size:19px;color:var(--ink);font-weight:600;margin-bottom:6px}
  .empty p{max-width:380px;margin:0 auto 18px;font-size:14px}
  .scrim{position:fixed;inset:0;background:rgba(22,33,31,.34);backdrop-filter:blur(2px);z-index:40;display:flex;opacity:0;pointer-events:none;transition:opacity .26s var(--ease)}
  .scrim.show{opacity:1;pointer-events:auto}
  .modal{background:var(--panel);border-radius:16px;box-shadow:0 20px 60px rgba(22,33,31,.28);width:min(520px,calc(100% - 28px));margin:auto;max-height:92vh;overflow:auto;transform:translateY(14px) scale(.97);opacity:0;transition:.3s var(--ease)}
  .scrim.show .modal{transform:none;opacity:1}
  .m-head{padding:18px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px}
  .m-head h2{font-family:"Space Grotesk";font-size:17px;font-weight:600;margin:0}
  .m-body{padding:18px 20px}.m-foot{padding:14px 20px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;background:#FCFDFB;flex-wrap:wrap}
  label.fld{display:block;margin-bottom:13px}
  label.fld .lt{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px}
  .inp{width:100%;font-family:inherit;font-size:14px;padding:10px 12px;border:1px solid var(--line-strong);border-radius:10px;background:#fff}
  .inp:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px var(--green-soft)}
  textarea.inp{resize:vertical;min-height:76px;line-height:1.5}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .hint{font-size:12px;color:var(--faint);margin:-4px 0 12px}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;font-size:13.5px;font-weight:500;padding:11px 18px;border-radius:11px;z-index:60;opacity:0;transition:.25s}
  .toast.show{opacity:1;transform:translateX(-50%)}
  .footbar{display:flex;justify-content:space-between;gap:12px;margin-top:16px;flex-wrap:wrap}
  .footbar .note{font-size:12px;color:var(--faint)}

  /* ---------- THE LABEL (4in x 6in) — clean, no boxes ---------- */
  .labelbox{width:4in;height:6in;background:#fff;color:#000;padding:.22in .18in .16in;display:flex;flex-direction:column;
    font-family:Arial,"Helvetica Neue",Helvetica,sans-serif;border:1px solid #ccc}
  .lb-to{font-weight:700;font-size:17pt;letter-spacing:.10em;margin-bottom:.10in}
  .lb-rcv{text-align:center;margin-top:.02in}
  .lb-name{font-weight:700;font-size:21pt;line-height:1.28;letter-spacing:.01em;text-transform:uppercase}
  .lb-addr{font-weight:700;font-size:21pt;line-height:1.28;letter-spacing:.01em;text-transform:uppercase}
  .lb-phone{font-weight:700;font-size:21pt;line-height:1.28;letter-spacing:.02em;margin-top:.02in}
  .lb-mid{flex:1}
  .lb-from{text-align:center}
  .lb-fline{font-weight:700;font-size:15pt;letter-spacing:.01em;text-transform:uppercase}
  .lb-fsub{font-weight:700;font-size:12.5pt;margin-top:.04in;text-transform:uppercase}
  .lb-fref{font-weight:700;font-size:12.5pt;margin-top:.03in;letter-spacing:.04em}
  .lb-foot{text-align:center;margin-top:.30in}
  .lb-f1{font-weight:700;font-size:10.5pt;text-transform:uppercase}
  .lb-f2{font-weight:700;font-size:12pt;margin-top:.04in;text-transform:uppercase}
  .preview-shell{background:#E7E9E6;padding:16px;display:flex;justify-content:center;border-radius:12px;overflow:auto}
  .preview-scale{transform:scale(.82);transform-origin:top center}
  @media (max-width:520px){ .preview-scale{transform:scale(.62)} }

  /* print — page size is injected at print time into #pageStyle */
  #printArea{display:none}
  @media print{
    html,body{background:#fff !important;margin:0 !important;padding:0 !important;width:auto;height:auto;overflow:hidden}
    body>*{display:none !important}
    #printArea{display:block !important;position:relative;margin:0;padding:0;overflow:hidden}
    #printArea .labelbox{border:none !important;box-shadow:none !important}
  }
  .preview-shell{background:#E7E9E6;padding:16px;display:flex;justify-content:center;border-radius:12px;overflow:auto}
  .preview-scale{transform:scale(.82);transform-origin:top center}
  @media (max-width:520px){ .preview-scale{transform:scale(.62)} }

  /* print */
  #printArea{display:none}
  @media print{
    html,body{background:#fff !important;margin:0 !important;padding:0 !important}
    body>*{display:none !important}
    #printArea{display:block !important;position:absolute;top:0;left:0;margin:0;padding:0}
    #printArea .labelbox{border:none;box-shadow:none}
  }
</style>
</head>

const esc=s=>String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const initials=n=>((n||"").trim().split(/\s+/).map(w=>w[0]||"").slice(0,2).join("")||"?").toUpperCase();

async function load(){
  let d=null;
  if(hasStore){ try{ const r=await window.storage.get(KEY); if(r&&r.value) d=JSON.parse(r.value); }catch(e){} }
  if(!d){ try{ const s=localStorage.getItem(KEY); if(s) d=JSON.parse(s); }catch(e){} }
  if(d){ State.settings=Object.assign(State.settings,d.settings||{}); State.addresses=d.addresses||[]; }
  // migrate the old true/false rotate setting
  if(State.settings.rot===undefined) State.settings.rot = (State.settings.rotate===false ? 0 : 270);
}
function lsSave(){ try{ localStorage.setItem(KEY,JSON.stringify(State)); return true; }catch(e){ return false; } }
let t1=null, storageOK=true;
async function save(){ let ok=false; if(hasStore){ try{ await window.storage.set(KEY,JSON.stringify(State)); ok=true; }catch(e){} } if(lsSave()) ok=true; storageOK=ok; note(); }
function persist(){ State.settings.updatedAt=Date.now(); clearTimeout(t1); t1=setTimeout(save,120); }
function note(){ const el=document.getElementById("storageNote"); if(!el) return;
  if(window.__cloudActive) return;
  el.textContent = storageOK ? "Saved automatically on this device." : "⚠ Couldn't save — use Backup data."; }
function applyLoaded(d){ if(!d) return; State.settings=Object.assign(State.settings,d.settings||{}); if(Array.isArray(d.addresses)) State.addresses=d.addresses; }

/* ---------- render ---------- */
function render(){
  const v=document.getElementById("view");
  const q=ui.q.trim().toLowerCase();
  let list=State.addresses.slice().sort((a,b)=>(b.lastPrinted||0)-(a.lastPrinted||0) || (a.name||"").localeCompare(b.name||""));
  if(q) list=list.filter(a=>((a.name||"")+" "+(a.line1||"")+" "+(a.line2||"")+" "+(a.city||"")+" "+(a.phone||"")).toLowerCase().includes(q));
  if(State.addresses.length===0){
    v.innerHTML=`<div class="card"><div class="empty"><div class="big grot">No addresses saved</div><p>Add a customer's address once — then every time you send them a parcel, it's one tap to print the sticker.</p><button class="btn primary" id="add2" style="margin:0 auto">Add first address</button></div></div>`;
    document.getElementById("add2").onclick=()=>openForm();
    return;
  }
  if(list.length===0){ v.innerHTML=`<div class="card"><div class="empty"><div class="big grot">No matches</div></div></div>`; return; }
  v.innerHTML=`<div class="card">`+list.map(a=>`<div class="arow">
      <div class="av">${esc(initials(a.name))}</div>
      <div class="mid" data-open="${a.id}">
        <div class="nm">${esc(a.name)}</div>
        <div class="ad">${esc([a.line1,a.line2,a.city].filter(Boolean).join(", "))}</div>
        <div class="ph">${esc(a.phone||"")}${a.prints?` · printed ${a.prints}×`:""}</div>
      </div>
      <button class="btn primary sm" data-pdf="${a.id}">🖨 Print</button>
      <button class="btn ghost sm" data-edit="${a.id}">✏️</button>
    </div>`).join("")+`</div>`;
  v.querySelectorAll("[data-pdf]").forEach(b=>b.onclick=()=>pdfLabel(b.dataset.pdf));
  v.querySelectorAll("[data-edit]").forEach(b=>b.onclick=()=>openForm(State.addresses.find(a=>a.id===b.dataset.edit)));
  v.querySelectorAll("[data-open]").forEach(b=>b.onclick=()=>openPreview(b.dataset.open));
}

/* ---------- the label ---------- */
function labelHTML(a){
  const s=State.settings;
  const lines=[a.line1,a.line2,a.city].filter(Boolean);
  return `<div class="labelbox">
    <div class="lb-to">TO :</div>
    <div class="lb-rcv">
      <div class="lb-name">${esc(a.name||"")}</div>
      ${lines.length?`<div class="lb-addr">${lines.map(esc).join("<br>")}</div>`:""}
      ${a.phone?`<div class="lb-phone">${esc(a.phone)}</div>`:""}
    </div>
    <div class="lb-mid"></div>
    <div class="lb-from">
      <div class="lb-fline">FROM : ${esc(s.org)}</div>
      <div class="lb-fsub">${esc(s.person)}${s.phone?" : "+esc(s.phone):""}</div>
      ${s.ref?`<div class="lb-fref">${esc(s.ref)}</div>`:""}
    </div>
    <div class="lb-foot">
      ${s.tag1?`<div class="lb-f1">${esc(s.tag1)}</div>`:""}
      ${s.tag2?`<div class="lb-f2">${esc(s.tag2)}</div>`:""}
    </div>
  </div>`;
}
function doPrint(html){
  const rot = ((State.settings.rot|0) % 360 + 360) % 360;   // 0 | 90 | 180 | 270
  const sideways = (rot===90 || rot===270);
  const pageW = sideways ? "6in" : "4in";
  const pageH = sideways ? "4in" : "6in";

  document.getElementById("pageStyle").textContent =
    `@page { size: ${pageW} ${pageH}; margin: 0; }`;

  const pa = document.getElementById("printArea");
  pa.innerHTML = html;
  pa.style.width  = pageW;
  pa.style.height = pageH;

  const box = pa.querySelector(".labelbox");
  if(box){
    box.style.width  = "4in";
    box.style.height = "6in";
    box.style.position = "absolute";
    box.style.transformOrigin = "top left";
    if(rot===0){
      box.style.top="0"; box.style.left="0"; box.style.transform="none";
    } else if(rot===180){
      box.style.top="6in"; box.style.left="4in"; box.style.transform="rotate(180deg)";
    } else if(rot===90){
      box.style.top="0"; box.style.left="6in"; box.style.transform="rotate(90deg)";
    } else { // 270
      box.style.top="4in"; box.style.left="0"; box.style.transform="rotate(-90deg)";
    }
  }
  setTimeout(()=>window.print(), 80);
}
window.addEventListener("afterprint",()=>{
  document.getElementById("pageStyle").textContent="";
  document.getElementById("printArea").innerHTML="";
});
function printLabel(id){
  const a=State.addresses.find(x=>x.id===id); if(!a) return;
  a.prints=(a.prints||0)+1; a.lastPrinted=Date.now(); persist(); render();
  doPrint(labelHTML(a));
  toast("Sending to printer…");
}
function openPreview(id){
  const a=State.addresses.find(x=>x.id===id); if(!a) return;
  openScrim(`<div class="m-head"><h2>${esc(a.name)}</h2><button class="btn ghost close" data-close style="margin-left:auto">✕</button></div>
    <div class="m-body">
      <div class="preview-shell"><div class="preview-scale">${labelHTML(a)}</div></div>
      <div class="hint" style="margin-top:10px">4 × 6 inch sticker. Rotation: <b>${State.settings.rot}°</b> — change it in ⚙ Sender if it doesn't land on the sticker correctly.</div>
    </div>
    <div class="m-foot">
      <button class="btn" id="p-edit">Edit</button>
      <button class="btn primary" id="p-print">🖨 Print sticker</button>
    </div>`);
  document.getElementById("p-print").onclick=()=>{ closeScrim(); setTimeout(()=>pdfLabel(id),200); };
  document.getElementById("p-edit").onclick=()=>openForm(a);
}

/* ---------- PDF label: exactly 4in x 6in, no browser header/footer ---------- */
function buildLabelPDF(a){
  const { jsPDF }=window.jspdf;
  const s=State.settings;
  const rot=((s.rot|0)%360+360)%360;
  const sideways=(rot===90||rot===270);
  // page is what the printer feeds; label art is always 4 wide x 6 tall
  const pw = sideways ? 6 : 4, ph = sideways ? 4 : 6;
  const doc=new jsPDF({unit:"in", format:[pw,ph], orientation: pw>ph?"landscape":"portrait"});

  // draw onto a 4x6 canvas, then place rotated
  const W=4, H=6, M=0.20;
  const lines=[a.line1,a.line2,a.city].filter(Boolean);
  const draw=(page)=>{
    const T=[];
    T.push({t:"TO :", y:0.52, size:19, align:"left"});
    let y=1.30;
    T.push({t:(a.name||"").toUpperCase(), y, size:21}); y+=0.34;
    lines.forEach(l=>{ T.push({t:l.toUpperCase(), y, size:21}); y+=0.34; });
    if(a.phone){ T.push({t:a.phone, y, size:21}); y+=0.34; }
    let fy=4.30;
    T.push({t:"FROM : "+(s.org||"").toUpperCase(), y:fy, size:15}); fy+=0.24;
    if(s.person||s.phone) { T.push({t:((s.person||"")+(s.phone?" : "+s.phone:"")).toUpperCase(), y:fy, size:12.5}); fy+=0.21; }
    if(s.ref){ T.push({t:s.ref.toUpperCase(), y:fy, size:12.5}); fy+=0.21; }
    let gy=5.42;
    if(s.tag1){ T.push({t:s.tag1.toUpperCase(), y:gy, size:9.5}); gy+=0.19; }
    if(s.tag2){ T.push({t:s.tag2.toUpperCase(), y:gy, size:10.5}); }
    return T;
  };

  const items=draw();
  for(const it of items){
    doc.setFont("helvetica","bold");
    doc.setFontSize(it.size);
    const lx = it.align==="left" ? M : W/2;
    const ly = it.y;
    let X, Y, ang=0, al = it.align==="left" ? "left" : "center";
    if(rot===0){ X=lx; Y=ly; ang=0; }
    else if(rot===180){ X=W-lx; Y=H-ly; ang=180; }
    else if(rot===270){ X=ly; Y=H-lx; ang=90; }   // page 6x4
    else { X=pw-ly; Y=lx; ang=270; }              // rot 90, page 6x4
    doc.text(it.t, X, Y, {align:al, angle:ang, baseline:"alphabetic"});
  }
  return doc;
}
function pdfLabel(id){
  const a=State.addresses.find(x=>x.id===id); if(!a) return;
  if(!(window.jspdf&&window.jspdf.jsPDF)){ flash("PDF engine loading — try again"); return; }
  a.prints=(a.prints||0)+1; a.lastPrinted=Date.now(); persist(); render();
  const doc=buildLabelPDF(a);
  const url=doc.output("bloburl");
  window.open(url,"_blank");
  toast("Label PDF opened — press print");
}

/* ---------- address form ---------- */
function openForm(existing){
  const a=existing||{};
  openScrim(`<div class="m-head"><h2>${existing?"Edit address":"New address"}</h2><button class="btn ghost close" data-close style="margin-left:auto">✕</button></div>
    <div class="m-body">
      <label class="fld"><span class="lt">Customer / shop name</span><input class="inp" id="f-name" value="${esc(a.name||"")}" placeholder="SUPER ELECTRONICS"></label>
      <label class="fld"><span class="lt">Address line 1</span><input class="inp" id="f-l1" value="${esc(a.line1||"")}" placeholder="BOSTON PLAZA BASEMENT"></label>
      <label class="fld"><span class="lt">Address line 2 <span style="font-weight:400;color:var(--faint)">(optional)</span></span><input class="inp" id="f-l2" value="${esc(a.line2||"")}" placeholder="CMH ROAD"></label>
      <div class="two">
        <label class="fld"><span class="lt">City</span><input class="inp" id="f-city" value="${esc(a.city||"")}" placeholder="JEHLUM CANT"></label>
        <label class="fld"><span class="lt">Phone</span><input class="inp" id="f-phone" value="${esc(a.phone||"")}" placeholder="0332-9780465"></label>
      </div>
      <label class="fld"><span class="lt">Note <span style="font-weight:400;color:var(--faint)">(not printed)</span></span><input class="inp" id="f-note" value="${esc(a.note||"")}" placeholder="e.g. regular customer"></label>
    </div>
    <div class="m-foot">
      ${existing?`<button class="btn danger" id="f-del" style="margin-right:auto">Delete</button>`:""}
      <button class="btn" data-close>Cancel</button>
      ${existing?"":`<button class="btn" id="f-saveprint">Save &amp; print</button>`}
      <button class="btn primary" id="f-save">${existing?"Save":"Save"}</button>
    </div>`);
  document.getElementById("f-name").focus();
  const grab=()=>({
    name:document.getElementById("f-name").value.trim(),
    line1:document.getElementById("f-l1").value.trim(),
    line2:document.getElementById("f-l2").value.trim(),
    city:document.getElementById("f-city").value.trim(),
    phone:document.getElementById("f-phone").value.trim(),
    note:document.getElementById("f-note").value.trim()
  });
  const commit=(alsoPrint)=>{
    const d=grab();
    if(!d.name){ flash("Enter the customer name"); return; }
    let id;
    if(existing){ Object.assign(existing,d); id=existing.id; }
    else { id=uid(); State.addresses.push(Object.assign({id,createdAt:Date.now(),prints:0},d)); }
    persist(); render(); closeScrim(); toast(existing?"Address updated":"Address saved");
    if(alsoPrint) setTimeout(()=>pdfLabel(id),220);
  };
  document.getElementById("f-save").onclick=()=>commit(false);
  const sp=document.getElementById("f-saveprint"); if(sp) sp.onclick=()=>commit(true);
  if(existing) document.getElementById("f-del").onclick=()=>{
    if(!confirm(`Delete ${existing.name}?`)) return;
    State.addresses=State.addresses.filter(x=>x.id!==existing.id);
    persist(); render(); closeScrim(); toast("Address deleted");
  };
}

  const s=State.settings;
  openScrim(`<div class="m-head"><h2>Sender details (FROM)</h2><button class="btn ghost close" data-close style="margin-left:auto">✕</button></div>
    <div class="m-body">
      <div class="hint" style="margin:0 0 12px">These print on every sticker — set them once.</div>
      <label class="fld"><span class="lt">Shop name</span><input class="inp" id="s-org" value="${esc(s.org)}"></label>
      <div class="two">
        <label class="fld"><span class="lt">Your name</span><input class="inp" id="s-person" value="${esc(s.person)}"></label>
        <label class="fld"><span class="lt">Your phone</span><input class="inp" id="s-phone" value="${esc(s.phone)}"></label>
      </div>
      <label class="fld"><span class="lt">Reference / account no.</span><input class="inp" id="s-ref" value="${esc(s.ref||"")}"></label>
      <label class="fld"><span class="lt">Footer line 1</span><input class="inp" id="s-t1" value="${esc(s.tag1||"")}"></label>
      <label class="fld"><span class="lt">Footer line 2</span><input class="inp" id="s-t2" value="${esc(s.tag2||"")}"></label>
      <div style="border-top:1px solid var(--line);padding-top:14px;margin-top:4px">
        <span class="lt" style="display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:4px">Print rotation</span>
        <div class="hint" style="margin:0 0 9px">If the label prints sideways, upside-down, or off the sticker — try another option and print again.</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          ${[[0,"Normal","No rotation"],[180,"Upside-down","Rotate 180°"],[270,"Sideways ↺","Rotate 90° left"],[90,"Sideways ↻","Rotate 90° right"]]
            .map(([deg,t,sub])=>`<button type="button" class="rotbtn" data-rot="${deg}" style="text-align:left;border:2px solid ${s.rot===deg?"var(--green)":"var(--line-strong)"};background:${s.rot===deg?"var(--green-soft)":"#fff"};border-radius:10px;padding:9px 11px">
              <div style="font-weight:700;font-size:13px;color:${s.rot===deg?"var(--green)":"var(--ink)"}">${t}</div>
              <div style="font-size:11.5px;color:var(--muted)">${sub}</div></button>`).join("")}
        </div>
      </div>
    </div>
    <div class="m-foot"><button class="btn" data-close>Cancel</button><button class="btn primary" id="s-save">Save</button></div>`);
  let pickRot = s.rot;
  scrim.querySelectorAll(".rotbtn").forEach(b=>b.onclick=()=>{
    pickRot = parseInt(b.dataset.rot,10);
    scrim.querySelectorAll(".rotbtn").forEach(x=>{
      const on = parseInt(x.dataset.rot,10)===pickRot;
      x.style.borderColor = on?"var(--green)":"var(--line-strong)";
      x.style.background  = on?"var(--green-soft)":"#fff";
      x.querySelector("div").style.color = on?"var(--green)":"var(--ink)";
    });
  });
  document.getElementById("s-save").onclick=()=>{
    s.rot = pickRot;
    s.org=document.getElementById("s-org").value.trim()||s.org;
    s.person=document.getElementById("s-person").value.trim();
    s.phone=document.getElementById("s-phone").value.trim();
    s.ref=document.getElementById("s-ref").value.trim();
    s.tag1=document.getElementById("s-t1").value.trim();
    s.tag2=document.getElementById("s-t2").value.trim();
    persist(); render(); closeScrim(); toast("Saved");
  };
}

/* ---------- backup ---------- */
function exportJson(){
  const b=new Blob([JSON.stringify(State,null,2)],{type:"application/json"});
  const u=URL.createObjectURL(b); const a=document.createElement("a");
  a.href=u; a.download=`labels-backup-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(u),1000);
  toast("Backup downloaded");
}
function importJson(file){
  const r=new FileReader();
  r.onload=()=>{ try{ const d=JSON.parse(r.result); if(!Array.isArray(d.addresses)) throw 0;
    if(!confirm("Replace all saved addresses with this backup?")) return;
    applyLoaded(d); persist(); render(); toast("Backup restored");
  }catch(e){ flash("Not a valid Labels backup"); } };
  r.readAsText(file);
}

/* ---------- modal / toast ---------- */
const scrim=document.getElementById("scrim");
function openScrim(html){ scrim.innerHTML=`<div class="modal">${html}</div>`; requestAnimationFrame(()=>scrim.classList.add("show")); scrim.querySelectorAll("[data-close]").forEach(b=>b.onclick=closeScrim); }
function closeScrim(){ scrim.classList.remove("show"); setTimeout(()=>{ if(!scrim.classList.contains("show")) scrim.innerHTML=""; },220); }
scrim.addEventListener("click",e=>{ if(e.target===scrim) closeScrim(); });
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeScrim(); });
let tt=null;
function toast(m){ const t=document.getElementById("toast"); t.textContent=m; t.style.background=""; t.classList.add("show"); clearTimeout(tt); tt=setTimeout(()=>t.classList.remove("show"),1900); }
function flash(m){ const t=document.getElementById("toast"); t.textContent=m; t.style.background="var(--warn)"; t.classList.add("show"); clearTimeout(tt); tt=setTimeout(()=>t.classList.remove("show"),1900); }

/* ---------- install ---------- */
let dp=null; const ib=document.getElementById("installBtn");
window.addEventListener("beforeinstallprompt",e=>{ e.preventDefault(); dp=e; ib.style.display="inline-flex"; });
ib.onclick=async()=>{ if(dp){ dp.prompt(); await dp.userChoice; dp=null; ib.style.display="none"; } };

/* ---------- wire ---------- */
document.getElementById("addBtn").onclick=()=>openForm();
document.getElementById("settingsBtn").onclick=openSettings;
document.getElementById("q").addEventListener("input",e=>{ ui.q=e.target.value; render(); });
document.getElementById("exportBtn").onclick=exportJson;
document.getElementById("importBtn").onclick=()=>document.getElementById("importFile").click();
document.getElementById("importFile").addEventListener("change",e=>{ if(e.target.files[0]) importJson(e.target.files[0]); e.target.value=""; });
